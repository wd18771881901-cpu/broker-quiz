:"A",explanation:"气韵生动。"},{id:1319,type:"single",subject:"subject2",module:"艺术基础",question:"《阿拉木汗》是（  ）民歌。",options:["新疆维吾尔族","蒙古族","藏族","朝鲜族"],answer:"A",explanation:"新疆。"},{id:1320,type:"judge",subject:"subject2",module:"艺术基础",question:"贝多芬被称为乐圣。",answer:"correct",options:["正确","错误"],explanation:"乐圣。"},{id:1321,type:"judge",subject:"subject2",module:"艺术基础",question:"莫扎特被称为交响乐之父。",answer:"wrong",options:["正确","错误"],explanation:"海顿才是。"},{id:1322,type:"judge",subject:"subject2",module:"艺术基础",question:"柴可夫斯基是俄罗斯浪漫乐派作曲家。",answer:"correct",options:["正确","错误"],explanation:"俄罗斯浪漫乐派。"},{id:1323,type:"judge",subject:"subject2",module:"艺术基础",question:"三一律要求戏剧时间、地点、行动一致。",answer:"correct",options:["正确","错误"],explanation:"古典戏剧规则。"},{id:1324,type:"judge",subject:"subject2",module:"艺术基础",question:"评剧起源于河北省滦南县。",answer:"correct",options:["正确","错误"],explanation:"河北滦南。"},{id:1325,type:"multi",subject:"subject2",module:"艺术基础",question:"柴可夫斯基三大芭蕾舞剧包括（  ）。",options:["《天鹅湖》","《睡美人》","《胡桃夹子》","《红色娘子军》"],answer:["A","B","C"],explanation:"红色娘子军不是。"},{id:1326,type:"multi",subject:"subject2",module:"艺术基础",question:"莎士比亚四大悲剧包括（  ）。",options:["《哈姆雷特》","《奥赛罗》","《李尔王》","《麦克白》"],answer:["A","B","C","D"],explanation:"四大悲剧。"},{id:1327,type:"multi",subject:"subject2",module:"艺术基础",question:"民族乐器按演奏方式可分为（  ）。",options:["吹奏","拉弦","弹拨","打击"],answer:["A","B","C","D"],explanation:"四大类。"},{id:1328,type:"multi",subject:"subject2",module:"艺术基础",question:"国际标准舞包括两大类（  ）。",options:["摩登舞","拉丁舞","民族舞","古典舞"],answer:["A","B"],explanation:"摩登和拉丁。"},{id:1329,type:"single",subject:"subject2",module:"演出管理",question:"灯光控制台分为手动和（  ）控制台。",options:["电脑","语音","意念","手势"],answer:"A",explanation:"手动和电脑。"},{id:1330,type:"single",subject:"subject2",module:"演出管理",question:"调音台核心功能是（  ）。",options:["信号混合处理","放大信号","播放音乐","录音"],answer:"A",explanation:"信号混合处理。"},{id:1331,type:"single",subject:"subject2",module:"演出管理",question:"舞台吊杆系统主要功能是（  ）。",options:["悬挂布景和灯具","供电","通风","消防"],answer:"A",explanation:"悬挂布景灯具。"},{id:1332,type:"single",subject:"subject2",module:"演出管理",question:"声压级单位是（  ）。",options:["分贝(dB)","赫兹(Hz)","瓦特(W)","伏特(V)"],answer:"A",explanation:"分贝。"},{id:1333,type:"single",subject:"subject2",module:"演出管理",question:"舞台地板弹性是为了保护（  ）。",options:["演员的关节","观众","灯光","音响"],answer:"A",explanation:"保护演员关节。"},{id:1334,type:"single",subject:"subject1",module:"法律法规",question:"根据《民法典》规定，因紧急避险造成损害的，由谁承担民事责任？",options:["紧急避险人承担全部责任","由引起险情发生的人承担民事责任","紧急避险人不承担任何责任","由紧急避险人和引起险情发生的人共同承担"],answer:"B",explanation:"《民法典》第182条规定，因紧急避险造成损害的，由引起险情发生的人承担民事责任。"},{id:1335,type:"single",subject:"subject1",module:"法律法规",question:"《民法典》规定，向人民法院请求保护民事权利的诉讼时效期间为（  ）。",options:["一年","二年","三年","五年"],answer:"C",explanation:"《民法典》第188条规定，诉讼时效期间为三年。"},{id:1336,type:"single",subject:"subject1",module:"法律法规",question:"下列哪项不属于《民法典》规定的民事法律行为的有效条件？",options:["行为人具有相应的民事行为能力","意思表示真实","不违反法律、行政法规的强制性规定","行为人必须年满十八周岁"],answer:"D",explanation:"十六周岁以上以自己劳动收入为主要生活来源的未成年人视为完全民事行为能力人。"},{id:1337,type:"single",subject:"subject1",module:"法律法规",question:"《民法典》中关于不可抗力的表述，正确的是（  ）。",options:["不能预见、不能避免且不能克服的客观情况","仅包括自然灾害","当事人不承担任何责任","战争不属于不可抗力"],answer:"A",explanation:"不可抗力是不能预见、不能避免且不能克服的客观情况，包括自然灾害、政府行为等。"},{id:1338,type:"single",subject:"subject1",module:"法律法规",question:"根据《消费者权益保护法》，经营者有欺诈行为的，应增加赔偿消费者受到的损失，增加赔偿的金额为价款的（  ）。",options:["一倍","二倍","三倍","十倍"],answer:"C",explanation:"《消费者权益保护法》第55条规定，增加赔偿金额为价款的三倍。"},{id:1339,type:"single",subject:"subject1",module:"法律法规",question:"《劳动合同法》规定，劳动者试用期最长不得超过（  ）。",options:["一个月","三个月","六个月","一年"],answer:"C",explanation:"《劳动合同法》第19条规定，劳动合同期限三年以上或无固定期限的，试用期不得超过六个月。"},{id:1340,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，下列哪项不属于著作财产权？",options:["复制权","发行权","署名权","改编权"],answer:"C",explanation:"署名权属于著作人身权，不属于著作财产权。"},{id:1341,type:"single",subject:"subject1",module:"法律法规",question:"演出经纪合同本质上属于哪种合同类型？",options:["买卖合同","委托合同","行纪合同","居间合同"],answer:"B",explanation:"演出经纪合同本质上是委托合同的特殊形式。"},{id:1342,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，音乐作品的保护期为（  ）。",options:["作者终生及其死后50年","作者终生及其死后30年","作品发表后50年","永久保护"],answer:"A",explanation:"《著作权法》第23条规定，公民作品保护期为作者终生及其死后50年。"},{id:1343,type:"single",subject:"subject1",module:"法律法规",question:"《反不正当竞争法》规定，经营者不得实施的混淆行为不包括（  ）。",options:["擅自使用他人有一定影响的商品名称","擅自使用他人有一定影响的包装","销售低于成本价的自有商品","擅自使用他人有一定影响的主体名称"],answer:"C",explanation:"销售自有商品不属于混淆行为。"},{id:1344,type:"single",subject:"subject1",module:"法律法规",question:"根据《民法典》，下列哪种合同是无效合同？",options:["因重大误解订立的合同","在危困状态中订立的显失公平的合同","违反法律、行政法规强制性规定的合同","被欺诈订立的合同"],answer:"C",explanation:"违反法律、行政法规强制性规定的合同无效。重大误解、欺诈等属于可撤销合同。"},{id:1345,type:"single",subject:"subject1",module:"法律法规",question:"《个人信息保护法》规定的核心原则不包括（  ）。",options:["合法、正当、必要原则","目的限制原则","经济效益最大化原则","诚信原则"],answer:"C",explanation:"处理个人信息应遵循合法、正当、必要、诚信、目的限制等原则。"},{id:1346,type:"single",subject:"subject1",module:"文化市场法规",question:"营业性演出许可证的有效期为（  ）。",options:["一年","两年","三年","五年"],answer:"B",explanation:"营业性演出经营许可证有效期为两年。"},{id:1347,type:"single",subject:"subject1",module:"文化市场法规",question:"举办大型群众性演出活动，预计参加人数达到（  ）人以上的，应向公安机关申请安全许可。",options:["500","1000","2000","5000"],answer:"B",explanation:"《大型群众性活动安全管理条例》规定，1000人以上需申请安全许可。"},{id:1348,type:"single",subject:"subject1",module:"文化市场法规",question:"下列哪项行为违反《营业性演出管理条例》？",options:["演出场所为演出团体提供场地","演员即兴发挥表演","演出中出现有害社会公德的内容","演出团体自行安排曲目"],answer:"C",explanation:"营业性演出不得有危害社会公德的内容。"},{id:1349,type:"single",subject:"subject1",module:"文化市场法规",question:"举办外国文艺表演团体来华演出，需报哪个部门审批？",options:["县级文化主管部门","市级文化主管部门","省级文化主管部门","国务院文化主管部门"],answer:"D",explanation:"举办涉外营业性演出应报国务院文化主管部门审批。"},{id:1350,type:"single",subject:"subject1",module:"文化市场法规",question:"临时搭建舞台等设施的，应由（  ）进行安全检测。",options:["演出经纪机构","有专业资质的检测机构","演出场所经营单位","当地文化主管部门"],answer:"B",explanation:"临时搭建演出设施应由有专业资质的检测机构进行安全检测。"},{id:1351,type:"multi",subject:"subject1",module:"法律法规",question:"根据《民法典》，下列哪些属于人格权？",options:["生命权","身体权","所有权","隐私权"],answer:"A,B,D",explanation:"人格权包括生命权、身体权、健康权、隐私权等。所有权属于财产权。"},{id:1352,type:"multi",subject:"subject1",module:"法律法规",question:"下列哪些属于受《著作权法》保护的作品？",options:["音乐作品","舞蹈作品","时事新闻","杂技艺术作品"],answer:"A,B,D",explanation:"时事新闻不适用著作权法保护。"},{id:1353,type:"single",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中，属于社会层面的价值取向是（  ）。",options:["富强、民主、文明、和谐","自由、平等、公正、法治","爱国、敬业、诚信、友善","创新、协调、绿色、开放"],answer:"B",explanation:"社会层面：自由、平等、公正、法治。"},{id:1354,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义最本质的特征是（  ）。",options:["人民当家作主","中国共产党领导","改革开放","依法治国"],answer:"B",explanation:"中国特色社会主义最本质的特征是中国共产党领导。"},{id:1355,type:"single",subject:"subject1",module:"思想政治",question:"推动社会主义文化繁荣兴盛，必须坚持以（  ）为中心的创作导向。",options:["经济效益","人民","市场","评奖"],answer:"B",explanation:"必须坚持以人民为中心的创作导向。"},{id:1356,type:"single",subject:"subject1",module:"思想政治",question:"新时代我国社会的主要矛盾是（  ）。",options:["人民日益增长的物质文化需要同落后的社会生产之间的矛盾","人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","生产力与生产关系之间的矛盾","经济基础与上层建筑之间的矛盾"],answer:"B",explanation:"党的十九大指出，我国社会主要矛盾已转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。"},{id:1357,type:"single",subject:"subject1",module:"法律法规",question:"根据《民法典》，第一顺序继承人不包括（  ）。",options:["配偶","子女","父母","兄弟姐妹"],answer:"D",explanation:"第一顺序继承人包括配偶、子女、父母。兄弟姐妹属于第二顺序继承人。"},{id:1358,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人在签约前应充分了解艺人的核心要素不包括（  ）。",options:["艺术特长","市场定位","个人隐私信息","发展潜力"],answer:"C",explanation:"不应过度收集与经纪业务无关的个人隐私信息。"},{id:1359,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人在处理艺人危机公关时，首先应该（  ）。",options:["立即召开新闻发布会","了解事实真相并评估影响","在社交媒体上发布声明","删除所有负面评论"],answer:"B",explanation:"处理危机公关首先应了解事实真相并评估影响。"},{id:1360,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目的成本构成中，属于固定成本的是（  ）。",options:["演员酬金","场地租赁费","宣传推广费","舞台搭建费"],answer:"B",explanation:"场地租赁费是相对固定的支出。"},{id:1361,type:"single",subject:"subject2",module:"经纪实务",question:"以下哪种方式不是演出营销的有效手段？",options:["社交媒体推广","KOL合作推广","虚假宣传演出阵容","票务优惠活动"],answer:"C",explanation:"虚假宣传违反法律法规，损害信誉。"},{id:1362,type:"single",subject:"subject2",module:"经纪实务",question:'演出合同中"不可抗力"条款通常不包括（  ）。',options:["自然灾害","政府行为","演员个人原因不能演出","社会异常事件"],answer:"C",explanation:"演员个人原因通常不属于不可抗力。"},{id:1363,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人进行艺人品牌定位时，应优先考虑（  ）。",options:["艺人个人喜好","市场需求和差异化竞争优势","经纪公司利润最大化","模仿其他成功艺人"],answer:"B",explanation:"品牌定位应优先考虑市场需求和差异化竞争优势。"},{id:1364,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪活动中，经纪费用收取方式不包括（  ）。",options:["固定比例提成","阶梯式提成","一次性买断艺人收入","基本服务费加提成"],answer:"C",explanation:"一次性买断艺人全部收入严重侵害艺人权益。"},{id:1365,type:"single",subject:"subject2",module:"演出管理",question:"大型演出活动安全方案的核心内容不包括（  ）。",options:["观众疏散方案","消防安全预案","商业赞助方案","突发事件应急预案"],answer:"C",explanation:"商业赞助方案属于商业运营范畴，不属于安全方案。"},{id:1366,type:"single",subject:"subject2",module:"演出管理",question:"演出活动报批程序中，以下哪个部门的审批在先？",options:["公安机关安全许可","文化主管部门演出许可","消防部门安全检查","城管部门场地审批"],answer:"B",explanation:"应先向文化主管部门申请演出许可，再向公安机关申请安全许可。"},{id:1367,type:"single",subject:"subject2",module:"演出管理",question:"演出场所的舞台监督在演出过程中主要负责（  ）。",options:["票务管理","灯光音响操控","演出流程的统筹协调与执行","演员化妆造型"],answer:"C",explanation:"舞台监督负责演出流程的统筹协调与执行。"},{id:1368,type:"single",subject:"subject2",module:"演出管理",question:"演出项目预算编制时，以下哪项不是直接成本？",options:["场地租金","设备租赁费","经纪公司日常运营费","演员差旅费"],answer:"C",explanation:"经纪公司日常运营费属于间接成本。"},{id:1369,type:"single",subject:"subject2",module:"演出管理",question:"根据演出行业惯例，票房收入通常不包括（  ）。",options:["现场售票收入","网络直播收入","赞助收入","VIP包厢收入"],answer:"B",explanation:"网络直播收入属于演出衍生收入，不计入传统票房。"},{id:1370,type:"single",subject:"subject2",module:"演出管理",question:"演出项目的风险评估中，票房不达预期属于（  ）。",options:["自然灾害风险","政策风险","运营风险","技术风险"],answer:"C",explanation:"票房不达预期属于运营风险。"},{id:1371,type:"single",subject:"subject2",module:"艺术基础",question:'以下哪位是中国京剧"四大名旦"之一？',options:["梅兰芳","程砚秋","荀慧生","以上都是"],answer:"D",explanation:'"四大名旦"包括梅兰芳、程砚秋、荀慧生和尚小云。'},{id:1372,type:"single",subject:"subject2",module:"艺术基础",question:'交响乐队中，被称为"乐器之王"的是（  ）。',options:["小提琴","钢琴","大提琴","竖琴"],answer:"B",explanation:'钢琴被称为"乐器之王"，音域宽广、表现力丰富。'},{id:1373,type:"single",subject:"subject2",module:"艺术基础",question:"芭蕾舞起源于哪个国家？",options:["法国","意大利","俄罗斯","英国"],answer:"B",explanation:"芭蕾舞起源于意大利文艺复兴时期，后在法国发展壮大。"},{id:1374,type:"single",subject:"subject2",module:"艺术基础",question:'以下哪个剧种被称为"中国戏曲之母"？',options:["京剧","昆曲","越剧","豫剧"],answer:"B",explanation:'昆曲被称为"中国戏曲之母"，2001年被列入人类非物质文化遗产。'},{id:1375,type:"single",subject:"subject2",module:"艺术基础",question:"话剧《雷雨》的作者是（  ）。",options:["老舍","曹禺","巴金","郭沫若"],answer:"B",explanation:"《雷雨》是曹禺的代表作，中国现代话剧经典之作。"},{id:1376,type:"single",subject:"subject2",module:"艺术基础",question:"歌剧《茶花女》的作曲家是（  ）。",options:["莫扎特","威尔第","普契尼","比才"],answer:"B",explanation:"《茶花女》由意大利作曲家威尔第创作。"},{id:1377,type:"single",subject:"subject2",module:"艺术基础",question:"以下哪部作品是贝多芬的代表作？",options:["《四季》","《命运交响曲》","《天鹅湖》","《卡门》"],answer:"B",explanation:"《命运交响曲》是贝多芬最著名的作品之一。"},{id:1378,type:"single",subject:"subject2",module:"艺术基础",question:"《义勇军进行曲》的曲作者是（  ）。",options:["冼星海","聂耳","刘天华","赵元任"],answer:"B",explanation:"《义勇军进行曲》由聂耳作曲，是中华人民共和国国歌。"},{id:1379,type:"single",subject:"subject2",module:"艺术基础",question:'中国传统绘画"四君子"指的是（  ）。',options:["梅兰竹菊","琴棋书画","诗词歌赋","风花雪月"],answer:"A",explanation:'"四君子"指梅、兰、竹、菊，象征傲骨、清幽、坚贞、高洁。'},{id:1380,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人的基本职业素养包括（  ）。",options:["良好的沟通协调能力","敏锐的市场洞察力","丰富的法律知识","必备的财务知识"],answer:"A,B,C,D",explanation:"演出经纪人需要具备多方面的职业素养。"},{id:1381,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪合同的必备条款包括（  ）。",options:["合同双方基本信息","经纪服务范围和期限","经纪费用及支付方式","违约责任条款"],answer:"A,B,C,D",explanation:"演出经纪合同应明确双方信息、服务范围、费用和违约责任等核心条款。"},{id:1382,type:"multi",subject:"subject2",module:"演出管理",question:"大型演出活动安全管理的重点环节包括（  ）。",options:["入场安检","观众疏导","消防管理","应急医疗"],answer:"A,B,C,D",explanation:"安全管理需从多方面综合保障。"},{id:1383,type:"multi",subject:"subject2",module:"艺术基础",question:"以下哪些属于中国戏曲的基本特征？",options:["虚拟性","程式化","综合性","写实性"],answer:"A,B,C",explanation:"中国戏曲三大基本特征是虚拟性、程式化和综合性。"}];function I0(n,i){if(n.type==="judge"){const o=n.answer;return i.length===1&&i[0]===o}if(n.type==="single"){const o=n.answer;return i.length===1&&i[0]===o}if(n.type==="multi"){const o=n.answer;if(i.length!==o.l
