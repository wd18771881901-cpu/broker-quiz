备案。"},{id:11,type:"judge",subject:"subject1",module:"法律法规",question:"《民法典》自2021年1月1日起施行。",answer:"correct",options:["正确","错误"],explanation:"《中华人民共和国民法典》于2020年5月28日通过，自2021年1月1日起施行。"},{id:12,type:"judge",subject:"subject1",module:"法律法规",question:"自然人从出生时起到死亡时止，具有民事权利能力。",answer:"correct",options:["正确","错误"],explanation:"《民法典》第13条规定，自然人从出生时起到死亡时止，具有民事权利能力，依法享有民事权利，承担民事义务。"},{id:13,type:"judge",subject:"subject1",module:"法律法规",question:"不满八周岁的未成年人为无民事行为能力人，由其法定代理人代理实施民事法律行为。",answer:"correct",options:["正确","错误"],explanation:"《民法典》第20条规定，不满八周岁的未成年人为无民事行为能力人，由其法定代理人代理实施民事法律行为。"},{id:14,type:"judge",subject:"subject1",module:"法律法规",question:"十六周岁以上的未成年人，视为完全民事行为能力人。",answer:"wrong",options:["正确","错误"],explanation:"十六周岁以上的未成年人，以自己的劳动收入为主要生活来源的，视为完全民事行为能力人。"},{id:15,type:"judge",subject:"subject1",module:"法律法规",question:"著作权自作品创作完成之日起产生。",answer:"correct",options:["正确","错误"],explanation:"《著作权法》规定，中国公民、法人或者非法人组织的作品，不论是否发表，依照本法享有著作权。即著作权自创作完成之日起产生。"},{id:16,type:"judge",subject:"subject1",module:"法律法规",question:"演出场所临时搭建舞台、看台的，应当依法办理安全审批手续。",answer:"correct",options:["正确","错误"],explanation:"临时搭建舞台、看台需要进行安全审批，确保结构安全和消防安全达标。"},{id:17,type:"judge",subject:"subject1",module:"法律法规",question:"行政许可的实施机关可以对被许可人生产经营的产品依法进行抽样检查。",answer:"correct",options:["正确","错误"],explanation:"《行政许可法》规定，行政机关可以依法对被许可人从事行政许可事项的活动进行监督检查。"},{id:18,type:"judge",subject:"subject1",module:"法律法规",question:"行政机关实施行政许可，不得收取任何费用。",answer:"wrong",options:["正确","错误"],explanation:"行政机关实施行政许可和对行政许可事项进行监督检查，不得收取任何费用。但法律、行政法规另有规定的除外。"},{id:19,type:"judge",subject:"subject1",module:"法律法规",question:"行政处罚的设定和实施必须以事实为依据，与违法行为的事实、性质、情节以及社会危害程度相当。",answer:"correct",options:["正确","错误"],explanation:"《行政处罚法》规定了过罚相当原则，处罚必须与违法行为的事实、性质、情节及社会危害程度相当。"},{id:20,type:"judge",subject:"subject1",module:"法律法规",question:"不满十四周岁的人有违法行为的，不予行政处罚。",answer:"correct",options:["正确","错误"],explanation:"《行政处罚法》规定，不满十四周岁的未成年人有违法行为的，不予行政处罚，责令监护人加以管教。"},{id:21,type:"judge",subject:"subject1",module:"思想政治",question:"习近平新时代中国特色社会主义思想是当代中国马克思主义、二十一世纪马克思主义。",answer:"correct",options:["正确","错误"],explanation:"习近平新时代中国特色社会主义思想是当代中国马克思主义、二十一世纪马克思主义，是中华文化和中国精神的时代精华。"},{id:22,type:"judge",subject:"subject1",module:"思想政治",question:"中国特色社会主义最本质的特征是中国共产党领导。",answer:"correct",options:["正确","错误"],explanation:"宪法明确规定，中国共产党领导是中国特色社会主义最本质的特征。"},{id:23,type:"judge",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中国家层面的价值目标是富强、民主、文明、和谐。",answer:"correct",options:["正确","错误"],explanation:"社会主义核心价值观国家层面：富强、民主、文明、和谐；社会层面：自由、平等、公正、法治；个人层面：爱国、敬业、诚信、友善。"},{id:24,type:"judge",subject:"subject1",module:"法律法规",question:"消费者在购买、使用商品时，其合法权益受到损害的，只能向销售者要求赔偿。",answer:"wrong",options:["正确","错误"],explanation:"消费者可以向销售者要求赔偿，也可以向生产者要求赔偿。属于生产者责任的，销售者赔偿后有权向生产者追偿。"},{id:25,type:"judge",subject:"subject1",module:"法律法规",question:"经营者不得以格式条款、通知、声明、店堂告示等方式，作出排除或者限制消费者权利的规定。",answer:"correct",options:["正确","错误"],explanation:"《消费者权益保护法》规定，经营者不得以格式条款、通知、声明、店堂告示等方式作出排除或者限制消费者权利等不公平、不合理的规定。"},{id:26,type:"judge",subject:"subject1",module:"法律法规",question:"演出活动的表演者对其表演享有表明表演者身份和保护表演形象不受歪曲的权利。",answer:"correct",options:["正确","错误"],explanation:"《著作权法》规定表演者享有表明表演者身份、保护表演形象不受歪曲等人身权利。"},{id:27,type:"judge",subject:"subject1",module:"法律法规",question:"表演者对其表演享有的财产权利的保护期为50年，截止于该表演发生后第50年的12月31日。",answer:"correct",options:["正确","错误"],explanation:"《著作权法》规定，表演者财产权利保护期为50年，截止于表演发生后第50年的12月31日。"},{id:28,type:"judge",subject:"subject1",module:"法律法规",question:"反不正当竞争法所称的不正当竞争，是指经营者在生产经营活动中违反本法规定，扰乱市场竞争秩序的行为。",answer:"correct",options:["正确","错误"],explanation:"《反不正当竞争法》第2条规定，不正当竞争是指经营者在生产经营活动中违反本法规定，扰乱市场竞争秩序，损害其他经营者或者消费者的合法权益的行为。"},{id:29,type:"judge",subject:"subject1",module:"文化市场法规",question:"文艺表演团体不得自行举办营业性演出，必须通过演出经纪机构。",answer:"wrong",options:["正确","错误"],explanation:"文艺表演团体可以自行举办营业性演出，也可以委托演出经纪机构承办。"},{id:30,type:"judge",subject:"subject1",module:"文化市场法规",question:"演出经纪机构不得为没有合法手续的演出活动提供经纪服务。",answer:"correct",options:["正确","错误"],explanation:"演出经纪机构应当遵守法律法规，不得为未经批准的演出活动提供经纪服务。"},{id:31,type:"single",subject:"subject1",module:"文化市场法规",question:"全国演出经纪人员资格认定考试的主管部门是（  ）。",options:["教育部","文化和旅游部","人力资源和社会保障部","市场监督管理总局"],answer:"B",explanation:"全国演出经纪人员资格认定考试由文化和旅游部组织实施。"},{id:32,type:"single",subject:"subject1",module:"文化市场法规",question:"《营业性演出管理条例》所称营业性演出，不包括以下哪种情形（  ）。",options:["售票方式举办的文艺表演","接受赞助方式举办的文艺表演","学校内部免费文艺汇演","支付演出单位或者个人费用举办的文艺表演"],answer:"C",explanation:"学校内部免费文艺汇演不以营利为目的，不属于营业性演出。"},{id:33,type:"single",subject:"subject1",module:"文化市场法规",question:"演出经纪人员在经纪活动中应当遵循的首要原则是（  ）。",options:["利润最大化","自愿、公平、诚实信用","公平竞争","市场主导"],answer:"B",explanation:"演出经纪人员在经纪活动中应当遵循自愿、公平、诚实信用的原则。"},{id:34,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，举办营业性演出，应当向（  ）提出申请。",options:["县级以上人民政府文化主管部门","市场监督管理部门","公安机关","税务部门"],answer:"A",explanation:"举办营业性演出，应当向演出所在地县级人民政府文化主管部门提出申请。"},{id:35,type:"single",subject:"subject1",module:"文化市场法规",question:"演出经纪机构设立后，应当到（  ）依法办理登记手续。",options:["文化主管部门","市场监督管理部门","税务部门","公安机关"],answer:"B",explanation:"设立演出经纪机构应当依法到市场监督管理部门办理登记。"},{id:36,type:"single",subject:"subject1",module:"文化市场法规",question:"营业性演出不得有下列情形，除了（  ）。",options:["危害社会公共利益","扰乱社会公共秩序","演出内容积极向上、传播正能量","危害国家安全"],answer:"C",explanation:"演出内容积极向上、传播正能量是允许且鼓励的，不属于禁止情形。"},{id:37,type:"single",subject:"subject1",module:"文化市场法规",question:"演出经纪资格证书的有效期为（  ）。",options:["3年","5年","长期有效","2年"],answer:"C",explanation:"演出经纪人员资格证书长期有效，无需定期换证。"},{id:38,type:"single",subject:"subject1",module:"法律法规",question:"以下哪部法律与演出经纪活动的关系最为密切（  ）。",options:["刑法","著作权法","继承法","土地管理法"],answer:"B",explanation:"著作权法与演出活动中涉及的表演者权、作品表演权等知识产权问题密切相关。"},{id:39,type:"single",subject:"subject1",module:"文化市场法规",question:"举办大型群众性演出活动，承办者应当向（  ）申请安全许可。",options:["文化主管部门","公安机关","市场监督管理部门","消防部门"],answer:"B",explanation:"根据《大型群众性活动安全管理条例》，举办大型群众性活动应当向公安机关申请安全许可。"},{id:40,type:"single",subject:"subject1",module:"文化市场法规",question:"演出场所经营单位提供演出场地，应当核验（  ）。",options:["演出人员的身份证件","营业性演出许可证件","观众的身份证件","演出经纪人员的学历证书"],answer:"B",explanation:"演出场所经营单位应当核验举办单位的营业性演出许可证件，不得为未经批准的营业性演出提供场地。"},{id:41,type:"single",subject:"subject1",module:"法律法规",question:"根据《民法典》，演出经纪合同属于（  ）。",options:["买卖合同","委托合同","中介合同（居间合同）","承揽合同"],answer:"B",explanation:"演出经纪合同在《民法典》中归类为委托合同，演出经纪活动本质上是受托办理相关事务。"},{id:42,type:"single",subject:"subject1",module:"文化市场法规",question:"演出活动因不可抗力取消的，演出举办单位应当（  ）。",options:["自行承担责任","及时公告并依法处理退票事宜","延期举办无需通知","退还部分票款"],answer:"B",explanation:"演出活动因不可抗力取消的，演出举办单位应当及时公告，并依法处理退票事宜。"},{id:43,type:"single",subject:"subject1",module:"文化市场法规",question:"以下关于营业性演出许可证的说法，正确的是（  ）。",options:["仅对演出场所核发","对演出经营单位核发","仅对演出经纪机构核发","由税务机关核发"],answer:"B",explanation:"营业性演出许可证对文艺表演团体、演出经纪机构、演出场所经营单位等各类演出经营主体核发。"},{id:44,type:"single",subject:"subject1",module:"文化市场法规",question:"演出经纪人员不得同时为（  ）以上的演出经纪机构从事经纪活动。",options:["1个","2个","3个","不限制"],answer:"B",explanation:"演出经纪人员不得同时为两个以上的演出经纪机构从事经纪活动，防止利益冲突。"},{id:45,type:"single",subject:"subject1",module:"法律法规",question:"侵犯演出表演者著作权的，应当承担的责任不包括（  ）。",options:["停止侵害","赔偿损失","追究刑事责任","强制劳动"],answer:"D",explanation:"侵犯著作权应承担民事责任（停止侵害、赔偿损失等），情节严重可追究刑事责任，但不包括强制劳动。"},{id:46,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，下列哪项不属于著作人身权（  ）。",options:["发表权","署名权","改编权","保护作品完整权"],answer:"C",explanation:"改编权属于著作财产权。著作人身权包括发表权、署名权、修改权和保护作品完整权。"},{id:47,type:"single",subject:"subject1",module:"法律法规",question:"法人的民事权利能力和民事行为能力，（  ）。",options:["从成立时产生，到解散时消灭","从成立时产生，到终止时消灭","从登记时产生，到注销时消灭","从营业时产生，到停业时消灭"],answer:"B",explanation:"《民法典》规定，法人的民事权利能力和民事行为能力，从法人成立时产生，到法人终止时消灭。"},{id:48,type:"single",subject:"subject1",module:"法律法规",question:"行政许可申请可以通过（  ）方式提出。",options:["信函、电报、电传、传真、电子数据交换和电子邮件等","仅限书面申请","仅限当面申请","仅限电子申请"],answer:"A",explanation:"《行政许可法》规定申请人可以信函、电报、电传、传真、电子数据交换和电子邮件等方式提出行政许可申请。"},{id:49,type:"single",subject:"subject1",module:"法律法规",question:"下列行政处罚种类中，属于行为罚的是（  ）。",options:["罚款","没收违法所得","责令停产停业","警告"],answer:"C",explanation:"责令停产停业属于行为罚（能力罚），限制或剥夺了被处罚人的行为能力。"},{id:50,type:"single",subject:"subject1",module:"法律法规",question:"《消费者权益保护法》规定的消费者权益不包括（  ）。",options:["安全保障权","自主选择权","强制交易权","公平交易权"],answer:"C",explanation:"强制交易权不是消费者的合法权益，相反，《消费者权益保护法》禁止强制交易行为。"},{id:51,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义事业的领导核心是（  ）。",options:["工人阶级","中国共产党","人民军队","知识分子"],answer:"B",explanation:"中国共产党是中国特色社会主义事业的领导核心。"},{id:52,type:"single",subject:"subject1",module:"思想政治",question:"我国社会主要矛盾已经转化为（  ）。",options:["人民日益增长的物质文化需要同落后的社会生产之间的矛盾","人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","生产力和生产关系之间的矛盾","经济基础和上层建筑之间的矛盾"],answer:"B",explanation:"党的十九大报告指出，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。"},{id:53,type:"single",subject:"subject1",module:"法律法规",question:"合同生效后，当事人就质量、价款或者报酬、履行地点等内容没有约定或者约定不明确的，首先应当（  ）。",options:["由人民法院裁决","协议补充","按照交易习惯确定","适用相关法律推定"],answer:"B",explanation:"《民法典》规定，合同生效后，当事人就质量等内容没有约定或约定不明确的，可以协议补充。"},{id:54,type:"single",subject:"subject1",module:"法律法规",question:"当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担（  ）。",options:["行政责任","违约责任","刑事责任","侵权责任"],answer:"B",explanation:"《民法典》规定，当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担违约责任。"},{id:55,type:"single",subject:"subject1",module:"文化市场法规",question:"营业性演出许可证审批时限为自受理申请之日起（  ）日内作出决定。",options:["10日","15日","20日","30日"],answer:"C",explanation:"文化主管部门应当自受理申请之日起20日内作出决定。"},{id:56,type:"single",subject:"subject1",module:"文化市场法规",question:"营业性演出许可证的有效期为（  ）年。",options:["1年","2年","3年","5年"],answer:"B",explanation:"营业性演出许可证有效期为2年。"},{id:57,type:"single",subject:"subject1",module:"法律法规",question:"根据《行政许可法》，下列可以设定行政许可的是（  ）。",options:["国务院部门规章","地方政府规章","法律、行政法规、地方性法规","其他规范性文件"],answer:"C",explanation:"《行政许可法》规定，法律、行政法规、地方性法规可以设定行政许可。"},{id:58,type:"single",subject:"subject1",module:"法律法规",question:"经营者提供商品或者服务有欺诈行为的，应当按照消费者的要求增加赔偿其受到的损失，增加赔偿的金额为消费者购买商品的价款或者接受服务的费用的（  ）倍。",options:["一倍","两倍","三倍","五倍"],answer:"C",explanation:"《消费者权益保护法》规定，经营者有欺诈行为的，应增加赔偿金额为价款的三倍。"},{id:59,type:"single",subject:"subject1",module:"法律法规",question:"《广告法》规定，广告不得含有虚假或者引人误解的内容，不得（  ）。",options:["使用数据","使用科学依据","欺骗、误导消费者","使用名人代言"],answer:"C",explanation:"《广告法》规定，广告不得含有虚假或者引人误解的内容，不得欺骗、误导消费者。"},{id:60,type:"single",subject:"subject1",module:"思想政治",question:"新发展理念不包括以下哪项（  ）。",options:["创新","协调","改革","共享"],answer:"C",explanation:"新发展理念包括创新、协调、绿色、开放、共享，不包括改革。"},{id:61,type:"single",subject:"subject1",module:"法律法规",question:"行政处罚中，限制人身自由的行政处罚只能由（  ）设定。",options:["法律","行政法规","地方性法规","部门规章"],answer:"A",explanation:"《行政处罚法》规定，限制人身自由的行政处罚只能由法律设定。"},{id:62,type:"single",subject:"subject1",module:"法律法规",question:"根据《民法典》，因自愿实施紧急救助行为造成受助人损害的，救助人不承担（  ）。",options:["行政责任","民事责任","刑事责任","道德责任"],answer:"B",explanation:"《民法典》第184条规定，因自愿实施紧急救助行为造成受助人损害的，救助人不承担民事责任。"},{id:63,type:"single",subject:"subject1",module:"文化市场法规",question:"个体演员和个体演出经纪人从事营业性演出活动需要（  ）。",options:["不需要任何许可","需要取得营业性演出许可证","需要取得演出经纪资格证书","需要公安机关批准"],answer:"B",explanation:"个体演员和个体演出经纪人从事营业性演出活动，需要取得营业性演出许可证。"},{id:64,type:"single",subject:"subject1",module:"思想政治",question:"（  ）是社会主义民主政治的本质属性。",options:["人民当家作主","党的领导","依法治国","人民民主专政"],answer:"A",explanation:"人民当家作主是社会主义民主政治的本质属性。"},{id:65,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，视听作品的著作权由（  ）享有。",options:["导演","编剧","制作者","主演"],answer:"C",explanation:"《著作权法》规定，视听作品中的电影作品、电视剧作品的著作权由制作者享有。"},{id:66,type:"multi",subject:"subject1",module:"文化市场法规",question:"营业性演出管理条例规定的演出经营主体包括（  ）。",options:["文艺表演团体","演出经纪机构","演出场所经营单位","个人独资企业"],answer:["A","B","C"],explanation:"演出经营主体主要包括文艺表演团体、演出经纪机构和演出场所经营单位三类。"},{id:67,type:"multi",subject:"subject1",module:"文化市场法规",question:"演出经纪人员的义务包括（  ）。",options:["遵守法律法规","遵守职业道德","保障演出质量","为演出机构获取最大利润"],answer:["A","B","C"],explanation:"演出经纪人员应遵守法律法规和职业道德，保障演出质量。为机构获取最大利润不是法定义务。"},{id:68,type:"multi",subject:"subject1",module:"文化市场法规",question:"以下哪些活动需要办理营业性演出审批手续（  ）。",options:["商业演唱会","赈灾义演","大学校园内部文艺汇演（仅面向本校师生）","商业话剧演出"],answer:["A","B","D"],explanation:"大学校园内部汇演仅面向本校师生，不以营利为目的，不属于营业性演出。"},{id:69,type:"multi",subject:"subject1",module:"法律法规",question:"依据《民法典》，民事主体从事民事活动应遵循的基本原则包括（  ）。",options:["自愿原则","公平原则","诚实信用原则","效率优先原则"],answer:["A","B","C"],explanation:"《民法典》规定民事主体从事民事活动应遵循自愿、公平、诚实信用等原则，效率优先不是民法基本原则。"},{id:70,type:"multi",subject:"subject1",module:"法律法规",question:"演出经纪合同一般应包含的主要条款有（  ）。",options:["经纪事项和范围","经纪期限","报酬及支付方式","违约责任"],answer:["A","B","C","D"],explanation:"演出经纪合同一般包含经纪事项、期限、报酬方式、违约责任等条款，四项均属于合同主要条款。"},{id:71,type:"multi",subject:"subject1",module:"法律法规",question:"下列属于著作权财产权的是（  ）。",options:["复制权","发行权","表演权","署名权"],answer:["A","B","C"],explanation:"复制权、发行权、表演权属于著作财产权，署名权属于著作人身权。"},{id:72,type:"multi",subject:"subject1",module:"法律法规",question:"根据《民法典》，下列合同属于法定要式合同的有（  ）。",options:["建设工程合同","保证合同","买卖合同","融资租赁合同"],answer:["A","B","D"],explanation:"建设工程合同、保证合同、融资租赁合同等法律规定必须采用书面形式的合同属于要式合同。买卖合同不要求必须采用书面形式。"},{id:73,type:"multi",subject:"subject1",module:"法律法规",question:"根据《行政处罚法》，行政处罚的种类包括（  ）。",options:["警告","罚款","没收违法所得","行政拘留"],answer:["A","B","C","D"],explanation:"行政处罚的种类包括警告、罚款、没收违法所得、没收非法财物、责令停产停业、行政拘留等。"},{id:74,type:"multi",subject:"subject1",module:"思想政治",question:"中国共产党第二十次全国代表大会提出的中心任务是（  ）。",options:["全面建成社会主义现代化强国","实现第二个百年奋斗目标","以中国式现代化全面推进中华民族伟大复兴","全面深化改革"],answer:["A","B","C"],explanation:"党的二十大报告指出，从现在起，中国共产党的中心任务就是团结带领全国各族人民全面建成社会主义现代化强国、实现第二个百年奋斗目标，以中国式现代化全面推进中华民族伟大复兴。"},{id:75,type:"multi",subject:"subject1",module:"法律法规",question:"消费者在消费活动中享有以下哪些权利（  ）。",options:["安全保障权","知悉真情权","自主选择权","公平交易权"],answer:["A","B","C","D"],explanation:"消费者享有安全保障权、知悉真情权、自主选择权、公平交易权等多项权利。"},{id:76,type:"multi",subject:"subject1",module:"文化市场法规",question:"营业性演出内容不得出现（  ）。",options:["违反宪法确定的基本原则的","危害国家统一的","煽动民族仇恨的","宣扬淫秽的"],answer:["A","B","C","D"],explanation:"《营业性演出管理条例》明确规定营业性演出不得出现违反宪法基本原则、危害国家统一、煽动民族仇恨、宣扬淫秽等内容。"},{id:77,type:"multi",subject:"subject1",module:"思想政治",question:"习近平新时代中国特色社会主义思想明确中国特色社会主义事业总体布局是（  ）。",options:["经济建设","政治建设","文化建设","社会建设、生态文明建设"],answer:["A","B","C","D"],explanation:"中国特色社会主义事业总体布局是经济建设、政治建设、文化建设、社会建设、生态文明建设五位一体。"},{id:78,type:"multi",subject:"subject1",module:"法律法规",question:"下列行为中属于不正当竞争行为的是（  ）。",options:["虚假宣传","商业诋毁","侵犯商业秘密","有奖销售"],answer:["A","B","C"],explanation:"虚假宣传、商业诋毁、侵犯商业秘密属于不正当竞争行为。有奖销售不一定是不正当竞争。"},{id:79,type:"multi",subject:"subject1",module:"法律法规",question:"根据《民法典》，法人分为（  ）。",options:["营利法人","非营利法人","特别法人","非法人组织"],answer:["A","B","C"],explanation:"《民法典》将法人分为营利法人、非营利法人和特别法人三类。非法人组织不是法人。"},{id:80,type:"multi",subject:"subject1",module:"法律法规",question:"下列关于行政许可的实施程序说法正确的有（  ）。",options:["申请与受理","审查与决定","听证","变更与延续"],answer:["A","B","C","D"],explanation:"行政许可的实施程序包括申请与受理、审查与决定、听证、变更与延续等环节。"},{id:81,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人是指从事演出经纪活动，为演出机构和个人提供居间、代理、行纪服务的从业人员。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人是指从事演出经纪活动，为演出相关机构和个人提供居间、代理、行纪服务的专业人员。"},{id:82,type:"judge",subject:"subject2",module:"经纪实务",question:"演出项目策划只需要考虑演出内容本身，不需要考虑市场因素。",answer:"wrong",options:["正确","错误"],explanation:"演出项目策划需要综合考虑演出内容、市场需求、受众群体、成本预算、风险评估等多方面因素。"},{id:83,type:"judge",subject:"subject2",module:"经纪实务",question:"大型演出活动是指演出场次观众人数达到1000人以上的演出活动。",answer:"correct",options:["正确","错误"],explanation:"根据相关规定，大型群众性活动是指预计参加人数达到1000人以上的活动。"},{id:84,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人在签订合同时，应当注意审查对方主体资格和履约能力。",answer:"correct",options:["正确","错误"],explanation:"签订合同时审查对方主体资格和履约能力是演出经纪人的基本职业要求，有助于降低合同风险。"},{id:85,type:"judge",subject:"subject2",module:"经纪实务",question:"演出门票可以随意加价销售。",answer:"wrong",options:["正确","错误"],explanation:"演出门票不得超出票面价格加价销售，演出票务经营需遵守相关管理规定，严禁倒卖演出门票。"},{id:86,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人可以通过网络平台进行演出宣传和票务销售。",answer:"correct",options:["正确","错误"],explanation:"网络平台已成为演出宣传和票务销售的重要渠道，演出经纪人可以合法利用互联网进行经纪活动。"},{id:87,type:"judge",subject:"subject2",module:"经纪实务",question:"演出活动中的舞台搭建不需要符合安全规范。",answer:"wrong",options:["正确","错误"],explanation:"演出活动中的舞台搭建必须严格遵守安全规范，确保结构稳固、用电安全，并配备必要的安全设施。"},{id:88,type:"judge",subject:"subject2",module:"演出管理",question:"文艺表演团体是指从事文艺表演活动的经营单位。",answer:"correct",options:["正确","错误"],explanation:"文艺表演团体是指从事文艺表演活动的经营单位，需取得营业性演出许可证。"},{id:89,type:"judge",subject:"subject2",module:"演出管理",question:"举办演出活动时，应当优先保障演职人员和观众的人身安全。",answer:"correct",options:["正确","错误"],explanation:"演出安全是演出活动的首要考虑因素，应当优先保障演职人员和观众的人身安全。"},{id:90,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人可以为没有演出资格的演出团体代理演出业务。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人不得为没有合法演出资格的主体代理演出业务，这是演出经纪人基本的职业底线。"},{id:91,type:"judge",subject:"subject2",module:"演出管理",question:"营业性演出审批时，不需要提交演出节目单。",answer:"wrong",options:["正确","错误"],explanation:"申请营业性演出审批需要提交演出节目单及节目内容说明，文化主管部门需要审核演出内容。"},{id:92,type:"judge",subject:"subject2",module:"演出管理",question:"演出场所经营单位可以为没有取得营业性演出许可证的演出活动提供场地。",answer:"wrong",options:["正确","错误"],explanation:"演出场所经营单位不得为未经批准的营业性演出提供场地，否则将承担相应法律责任。"},{id:93,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人签订合同应当采用书面形式。",answer:"correct",options:["正确","错误"],explanation:"为明确双方权利义务，减少纠纷，演出经纪合同应当采用书面形式。"},{id:94,type:"judge",subject:"subject2",module:"演出管理",question:"演出活动的音响、灯光等设备不需要专业人员操作。",answer:"wrong",options:["正确","错误"],explanation:"演出活动的音响、灯光等设备应由具有相应资质的专业人员操作，确保安全。"},{id:95,type:"judge",subject:"subject2",module:"演出管理",question:"营业性演出不得以假唱、假演奏等手段欺骗观众。",answer:"correct",options:["正确","错误"],explanation:"《营业性演出管理条例》明确禁止营业性演出以假唱、假演奏等手段欺骗观众。"},{id:96,type:"judge",subject:"subject2",module:"演出管理",question:"演出举办单位应当按照公安部门核定的观众人数印制和出售门票。",answer:"correct",options:["正确","错误"],explanation:"演出举办单位应当按照核准的观众人数、区域和应急方案发放和销售门票。"},{id:97,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人可以在合同中约定排他性经纪条款。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人可以在合同中与艺人约定排他性经纪条款，但需合理约定范围和期限。"},{id:98,type:"judge",subject:"subject2",module:"演出管理",question:"演出活动结束后，演出举办单位不需要向文化主管部门提交演出报告。",answer:"wrong",options:["正确","错误"],explanation:"演出举办单位应当在演出活动结束后向文化主管部门提交演出营业情况报告。"},{id:99,type:"judge",subject:"subject2",module:"演出管理",question:"举办临时性营业性演出活动，也需要依法取得文化主管部门的批准。",answer:"correct",options:["正确","错误"],explanation:"临时性营业性演出活动也需要依法取得文化主管部门的批准，包括临时搭建舞台、看台等情形。"},{id:100,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪机构在推广艺人时，可以适当夸大艺人的能力和影响力。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人在推广活动中应当遵循诚实信用原则，不得虚假宣传或夸大艺人的能力和影响力。"},{id:101,type:"judge",subject:"subject2",module:"演出管理",question:"演出场所的安全出口和疏散通道应当在演出期间保持畅通。",answer:"correct",options:["正确","错误"],explanation:"演出场所的安全出口和疏散通道在演出期间必须保持畅通，以确保紧急情况下观众能够及时疏散。"},{id:102,type:"judge",subject:"subject2",module:"演出管理",question:"演出经纪机构可以自行定价销售演出门票。",answer:"wrong",options:["正确","错误"],explanation:"演出门票价格应当合理定价，并遵守相关价格管理规定。对于政府指导价的演出项目，还需遵守指导价标准。"},{id:103,type:"judge",subject:"subject2",module:"演出管理",question:"营业性演出活动不得危害公共安全或者社会公共利益。",answer:"correct",options:["正确","错误"],explanation:"《营业性演出管理条例》明确规定，营业性演出活动不得危害公共安全或者社会公共利益。"},{id:104,type:"judge",subject:"subject2",module:"演出管理",question:"演出举办单位可以自行决定取消演出而无需向观众说明原因。",answer:"wrong",options:["正确","错误"],explanation:"演出举办单位取消演出的，应当及时公告并说明原因，依法处理退票事宜。"},{id:105,type:"judge",subject:"subject2",module:"艺术基础",question:'京剧被称为中国的"国粹"。',answer:"correct",options:["正确","错误"],explanation:'京剧是中国传统戏曲中最有代表性的剧种，被称为"国粹"，2006年入选第一批国家级非物质文化遗产名录。'},{id:106,type:"judge",subject:"subject2",module:"艺术基础",question:"芭蕾舞起源于法国。",answer:"wrong",options:["正确","错误"],explanation:"芭蕾舞起源于意大利，后在法国和俄罗斯得到发展和繁荣。"},{id:107,type:"judge",subject:"subject2",module:"艺术基础",question:"相声是中国传统的曲艺形式之一。",answer:"correct",options:["正确","错误"],explanation:"相声是中国传统的曲艺表演形式，以说、学、逗、唱为基本技巧。"},{id:108,type:"judge",subject:"subject2",module:"演出管理",question:"演出举办单位应当为演出购买公众责任险等保险。",answer:"correct",options:["正确","错误"],explanation:"为保障演出安全，演出举办单位应当购买公众责任险等保险，降低风险损失。"},{id:109,type:"judge",subject:"subject2",module:"演出管理",question:"演员在演出中可以随意发表言论，不受任何限制。",answer:"wrong",options:["正确","错误"],explanation:"演员在演出中的言论应当遵守法律法规，不得发表违反法律法规和社会公德的言论。"},{id:110,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人的收入来源主要是佣金收入。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人的主要收入来源是佣金收入，即按照合同约定从演出收入中提取一定比例的报酬。"},{id:111,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目策划的首要步骤是（  ）。",options:["确定预算","市场调研与分析","签约演员","选择场地"],answer:"B",explanation:"市场调研与分析是演出项目策划的首要步骤，只有了解市场需求才能进行后续的策划工作。"},{id:112,type:"single",subject:"subject2",module:"经纪实务",question:'演出经纪实务中，"票房"收入通常是指（  ）。',options:["演出赞助收入","演出门票销售总收入","衍生品销售收入","版权收入"],answer:"B",explanation:'"票房"收入指的是演出门票销售所获得的总收入，是演出收入的重要组成部分。'},{id:113,type:"single",subject:"subject2",module:"演出管理",question:"举办涉外营业性演出，应当向（  ）申请。",options:["县级文化主管部门","省级文化主管部门","国务院文化主管部门","外交部"],answer:"B",explanation:"举办涉外营业性演出，应当向省级人民政府文化主管部门提出申请。"},{id:114,type:"single",subject:"subject2",module:"经纪实务",question:"演出合同中最重要的条款是（  ）。",options:["封面设计","双方权利义务","字体大小","页码排版"],answer:"B",explanation:"双方权利义务是演出合同的核心条款，明确了各方的责任和权益。"},{id:115,type:"single",subject:"subject2",module:"经纪实务",question:"演出市场营销中，4P理论不包括以下哪项（  ）。",options:["产品（Product）","价格（Price）","利润（Profit）","促销（Promotion）"],answer:"C",explanation:"营销4P理论包括产品（Product）、价格（Price）、渠道（Place）和促销（Promotion），不包括利润。"},{id:116,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目的收入来源不包括（  ）。",options:["票房收入","赞助收入","衍生品收入","政府税收"],answer:"D",explanation:"政府税收是演出项目需要缴纳的费用，不是收入来源。演出收入来源主要包括票房、赞助、衍生品、版权等。"},{id:117,type:"single",subject:"subject2",module:"演出管理",question:"大型演出活动应急预案中，应当包含以下哪项内容（  ）。",options:["演员化妆流程","观众疏散方案","灯光设计方案","节目单编排"],answer:"B",explanation:"应急预案的核心内容是安全保障，观众疏散方案是大型演出安全预案的重要组成部分。"},{id:118,type:"single",subject:"subject2",module:"经纪实务",question:"以下哪项不属于演出经纪人的职业素养（  ）。",options:["良好的沟通协调能力","丰富的艺术鉴赏能力","熟悉法律法规","随意更改合同条款"],answer:"D",explanation:"随意更改合同条款违反职业道德和法律规定，不属于职业素养。"},{id:119,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目成本中，通常占比最大的是（  ）。",options:["场地租金","演艺人员出场费","宣传推广费","设备租赁费"],answer:"B",explanation:"在多数演出项目中，演艺人员出场费是成本中占比最大的部分。"},{id:120,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪合同的违约金条款应当（  ）。",options:["越高越好","合理约定，不得过分高于实际损失","不需要约定","由经纪机构单方面决定"],answer:"B",explanation:"根据法律规定，违约金应当合理约定，不得过分高于实际造成的损失。"},{id:121,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人在洽谈业务时，最重要的品质是（  ）。",options:["能言善辩","诚实信用","追求利润","灵活变通"],answer:"B",explanation:"诚实信用是演出经纪人最核心的职业品质，是建立长期合作关系的基础。"},{id:122,type:"single",subject:"subject2",module:"演出管理",question:"演出场所的安全通道宽度不得少于（  ）米。",options:["1.0","1.2","1.5","2.0"],answer:"B",explanation:"演出场所安全通道宽度不得少于1.2米，以确保紧急情况下人员疏散。"},{id:123,type:"single",subject:"subject2",module:"演出管理",question:"营业性演出需要变更演出内容的，应当（  ）。",options:["直接变更即可","重新报批","通知观众即可","不需要任何手续"],answer:"B",explanation:"营业性演出需要变更演出内容的，应当重新向文化主管部门报批。"},{id:124,type:"single",subject:"subject2",module:"演出管理",question:"演出经纪机构为演员安排演出活动时，应当尊重演员的（  ）。",options:["所有要求","人格尊严和合法权益","不受合同约束","一切决定"],answer:"B",explanation:"演出经纪机构应当尊重演员的人格尊严和合法权益，不得侵犯演员的正当权益。"},{id:125,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目的市场调研不包括（  ）。",options:["受众需求分析","竞争项目分析","竞争对手内部财务数据","演出市场趋势分析"],answer:"C",explanation:"竞争对手内部财务数据属于商业机密，不是市场调研的合法内容。市场调研主要关注市场需求、竞争态势和趋势。"},{id:126,type:"single",subject:"subject2",module:"演出管理",question:"演出门票实行实名制购票的，购票人需要提供（  ）信息。",options:["职业","姓名和身份证号","收入证明","学历"],answer:"B",explanation:"实名制购票需要购票人提供真实姓名和身份证号等信息，以确保票务管理的规范和安全。"},{id:127,type:"single",subject:"subject2",module:"演出管理",question:"演出举办单位发现演出内容违反规定的，应当（  ）。",options:["继续演出","采取措施予以制止并同时报告","自行修改内容","等待观众投诉"],answer:"B",explanation:"演出举办单位发现演出内容违反规定的，应当采取措施予以制止并同时向文化主管部门和公安机关报告。"},{id:128,type:"single",subject:"subject2",module:"艺术基础",question:'以下属于中国传统戏曲"生、旦、净、丑"行当中"旦"指的是（  ）。',options:["男性角色","女性角色","花脸角色","喜剧角色"],answer:"B",explanation:'"生"是男性角色，"旦"是女性角色，"净"是花脸角色，"丑"是喜剧角色。'},{id:129,type:"single",subject:"subject2",module:"艺术基础",question:"交响乐团通常由（  ）担任指挥。",options:["首席小提琴手","指挥家","团长","作曲家"],answer:"B",explanation:"交响乐团由专业的指挥家担任指挥，负责统一协调各声部的演奏。"},{id:130,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人在接洽演出业务时，首先需要确认的是（  ）。",options:["演出场地","演出项目是否具有合法审批","演员酬劳","宣传方案"],answer:"B",explanation:"演出经纪人首先需要确认演出项目是否具有合法审批手续，这是开展经纪活动的前提。"},{id:131,type:"single",subject:"subject2",module:"演出管理",question:"营业性演出活动的消防责任由（  ）承担。",options:["文化主管部门","演出场所经营单位","公安机关","消防部门"],answer:"B",explanation:"演出场所经营单位是演出场所消防安全的责任主体，应当确保消防设施完好有效。"},{id:132,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪合同纠纷的解决方式不包括（  ）。",options:["协商","调解","裁决","诉讼"],answer:"C",explanation:'合同纠纷的解决方式包括协商、调解、仲裁和诉讼。"裁决"不是一个独立的纠纷解决方式。'},{id:133,type:"single",subject:"subject2",module:"演出管理",question:"举办大型演唱会的安全责任主体是（  ）。",options:["公安机关","演出举办单位","演出场所","参演艺人"],answer:"B",explanation:"演出举办单位是大型演出活动的安全责任主体，应当负责安全保障工作。"},{id:134,type:"single",subject:"subject2",module:"演出管理",question:"演出审批机关在收到营业性演出申请后，应当进行（  ）。",options:["仅书面审查","书面审查和必要的实地检查","仅实地检查","不需要审查"],answer:"B",explanation:"文化主管部门收到申请后，应当进行书面审查和必要的实地检查，确保符合安全要求。"},{id:135,type:"single",subject:"subject2",module:"艺术基础",question:"音乐剧是一种融合了音乐、歌曲、对白和（  ）的综合舞台艺术形式。",options:["绘画","舞蹈","书法","雕塑"],answer:"B",explanation:"音乐剧是一种融合了音乐、歌曲、对白和舞蹈的综合舞台艺术形式。"},{id:136,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人签订经纪合同后，应当履行的义务不包括（  ）。",options:["按照合同约定办理经纪事务","维护委托人的合法权益","可以未经同意转委托他人","报告委托事务进展情况"],answer:"C",explanation:"未经委托人同意，经纪人不得擅自转委托他人办理委托事务。"},{id:137,type:"single",subject:"subject2",module:"演出管理",question:"营业性演出活动使用的舞台设备应当经（  ）检验合格后方可使用。",options:["文化主管部门","专业检测机构","公安机关","市场监督管理部门"],answer:"B",explanation:"演出活动中使用的舞台设备应当经专业检测机构检验合格后方可使用，确保设备安全可靠。"},{id:138,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人为演出项目选择赞助商时，最重要的考虑因素是（  ）。",options:["赞助金额越高越好","赞助商的品牌形象与演出项目契合度","赞助商的地理位置","赞助商的公司规模"],answer:"B",explanation:"选择赞助商时应考虑品牌形象与演出项目的契合度，避免品牌形象冲突。"},{id:139,type:"single",subject:"subject2",module:"演出管理",question:"演出门票销售实行（  ）制度。",options:["自由定价","明码标价","议价","政府定价"],answer:"B",explanation:"演出门票销售实行明码标价制度，票价应当公开透明。"},{id:140,type:"single",subject:"subject2",module:"艺术基础",question:'"昆曲"被联合国教科文组织列入（  ）名录。',options:["世界自然遗产","人类非物质文化遗产代表作","世界记忆遗产","世界文化遗产"],answer:"B",explanation:'昆曲于2001年被联合国教科文组织列入首批"人类口头和非物质遗产代表作"名录。'},{id:141,type:"single",subject:"subject2",module:"演出管理",question:"演出举办单位应当在演出日期（  ）日前向文化主管部门提交演出申请。",options:["3日","5日","7日","10日"],answer:"D",explanation:"演出举办单位应当在演出日期10日前向文化主管部门提交营业性演出申请。"},{id:142,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人促成演出交易成功后，获取报酬的方式通常是（  ）。",options:["固定工资","佣金（提成）","奖金","股权"],answer:"B",explanation:"演出经纪人通常通过佣金（提成）方式获取报酬，即按照演出收入的一定比例收取。"},{id:143,type:"single",subject:"subject2",module:"演出管理",question:"演出场所容纳的观众人数应当以（  ）核定的人数为准。",options:["演出举办单位自行确定","公安消防部门核定","文化主管部门核定","观众投票决定"],answer:"B",explanation:"演出场所容纳的观众人数应当以公安消防部门核定的人数为准，确保安全。"},{id:144,type:"single",subject:"subject2",module:"演出管理",question:"对于假唱行为，文化主管部门可以处以（  ）的罚款。",options:["1万元以上3万元以下","3万元以上5万元以下","5万元以上10万元以下","10万元以上"],answer:"C",explanation:"演出中以假唱、假演奏等手段欺骗观众的，由文化主管部门处以5万元以上10万元以下的罚款。"},{id:145,type:"single",subject:"subject2",module:"艺术基础",question:"以下属于民族乐器的是（  ）。",options:["钢琴","小提琴","二胡","萨克斯"],answer:"C",explanation:"二胡是中国传统民族乐器。钢琴和小提琴是西洋乐器，萨克斯也是西洋乐器。"},{id:146,type:"multi",subject:"subject2",module:"经纪实务",question:"演出市场营销的主要渠道包括（  ）。",options:["线下传统媒体宣传","社交媒体营销","电商平台票务合作","赞助商联合推广"],answer:["A","B","C","D"],explanation:"演出市场营销渠道包括传统媒体、社交媒体、电商平台、赞助商联合推广等多种形式。"},{id:147,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人在管理演出项目时，需要关注的风险因素包括（  ）。",options:["政策法规风险","市场需求变化风险","安全事故风险","演艺人员违约风险"],answer:["A","B","C","D"],explanation:"演出项目管理中需要全面关注政策法规、市场需求、安全事故和人员违约等各类风险因素。"},{id:148,type:"multi",subject:"subject2",module:"演出管理",question:"举办营业性演出需要提交的申请材料通常包括（  ）。",options:["营业性演出申请表","演出场所证明","演出节目单及演员名单","演出安全保卫方案"],answer:["A","B","C","D"],explanation:"申请营业性演出审批需要提交申请表、演出场所证明、节目单及演员名单、安全保卫方案等材料。"},{id:149,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人的主要工作内容涉及（  ）。",options:["演出项目策划","演出合同谈判与签订","演出活动组织与执行","演出票务管理"],answer:["A","B","C","D"],explanation:"演出经纪人的工作贯穿演出项目全流程，包括策划、签约、执行和票务管理等各个方面。"},{id:150,type:"multi",subject:"subject2",module:"艺术基础",question:"演出行业常见的演出类型包括（  ）。",options:["演唱会","话剧","舞蹈专场","曲艺杂技"],answer:["A","B","C","D"],explanation:"演出行业涵盖演唱会、话剧、舞蹈专场、曲艺杂技等多种演出类型。"},{id:151,type:"multi",subject:"subject2",module:"演出管理",question:"大型演出活动的安全管理包括（  ）。",options:["消防安全管理","用电安全管理","人流疏导管理","应急救援管理"],answer:["A","B","C","D"],explanation:"大型演出活动安全管理涵盖消防、用电、人流疏导和应急救援等多个方面。"},{id:152,type:"multi",subject:"subject2",module:"演出管理",question:"以下属于演出合同履约风险的有（  ）。",options:["演员临时拒演","演出设备故障","天气突变导致无法演出","票房销售不佳"],answer:["A","B","C"],explanation:"演员拒演、设备故障、天气突变属于合同履约风险。票房销售不佳属于市场风险。"},{id:153,type:"multi",subject:"subject2",module:"演出管理",question:"营业性演出活动现场安全保障措施包括（  ）。",options:["配备安保人员","设置安全隔离设施","安装消防设备","制定应急预案"],answer:["A","B","C","D"],explanation:"演出活动现场安全保障措施包括安保人员配备、安全隔离设施、消防设备安装和应急预案制定等。"},{id:154,type:"multi",subject:"subject2",module:"艺术基础",question:"以下属于中国戏曲主要剧种的有（  ）。",options:["京剧","越剧","黄梅戏","豫剧"],answer:["A","B","C","D"],explanation:'京剧、越剧、黄梅戏、豫剧都是中国主要的戏曲剧种，与评剧并称"五大戏曲剧种"。'},{id:155,type:"multi",subject:"subject2",module:"演出管理",question:"演出票务管理中，以下哪些行为是违法的（  ）。",options:["囤积票源","炒票","假票","实名制购票"],answer:["A","B","C"],explanation:"囤积票源、炒票和假票都是违法的票务行为。实名制购票是合法的票务管理制度。"},{id:156,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人在策划演出项目时，市场调研的内容包括（  ）。",options:["目标受众分析","竞争项目分析","市场价格分析","演出场地条件分析"],answer:["A","B","C","D"],explanation:"市场调研需要全面分析目标受众、竞争项目、市场价格和场地条件等信息。"},{id:157,type:"multi",subject:"subject2",module:"演出管理",question:"以下关于演出场所消防安全说法正确的有（  ）。",options:["安全出口数量不少于2个","疏散通道应保持畅通","应配备消防器材","可以锁闭安全出口"],answer:["A","B","C"],explanation:"演出场所应当有不少于2个安全出口，疏散通道保持畅通，配备消防器材。严禁锁闭安全出口。"},{id:158,type:"multi",subject:"subject2",module:"艺术基础",question:"以下属于西方古典音乐代表人物的有（  ）。",options:["贝多芬","莫扎特","巴赫","谭盾"],answer:["A","B","C"],explanation:"贝多芬、莫扎特、巴赫是西方古典音乐的代表人物。谭盾是当代中国作曲家。"},{id:159,type:"multi",subject:"subject2",module:"经纪实务",question:'演出经纪活动中的"三公"原则是指（  ）。',options:["公开","公平","公正","公认"],answer:["A","B","C"],explanation:'演出经纪活动应当遵循公开、公平、公正的原则。"公认"不是法定原则。'},{id:160,type:"multi",subject:"subject2",module:"演出管理",question:"演出活动结束后，演出举办单位需要做的工作包括（  ）。",options:["提交演出报告","结算相关款项","处理善后事宜","总结评估"],answer:["A","B","C","D"],explanation:"演出活动结束后，演出举办单位需要完成演出报告、款项结算、善后处理和总结评估等工作。"},{id:161,type:"judge",subject:"subject1",module:"文化市场法规",question:"演出经纪人员资格认定考试成绩合格的，自公布成绩之日起可以取得资格证书。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人员资格考试成绩合格的，可以取得演出经纪人员资格证书。"},{id:162,type:"judge",subject:"subject1",module:"文化市场法规",question:"个体演出经纪人可以同时经营演出经纪机构和文艺表演团体。",answer:"wrong",options:["正确","错误"],explanation:"个体演出经纪人和演出经营主体是不同的概念，个体演出经纪人需取得相应许可后才能从事经纪活动。"},{id:163,type:"judge",subject:"subject1",module:"法律法规",question:"合同当事人一方违约后，对方应当采取适当措施防止损失扩大。",answer:"correct",options:["正确","错误"],explanation:"《民法典》规定，当事人一方违约后，对方应当采取适当措施防止损失扩大，没有采取适当措施致使损失扩大的，不得就扩大的损失请求赔偿。"},{id:164,type:"single",subject:"subject1",module:"文化市场法规",question:"演出举办单位应当于演出日期前（  ）日向文化主管部门提交演出申请。",options:["3日","5日","7日","10日"],answer:"D",explanation:"举办营业性演出应当在演出日期10日前提出申请。"},{id:165,type:"single",subject:"subject1",module:"法律法规",question:"行政强制措施由（  ）设定。",options:["法律","行政法规","法律和行政法规","地方性法规"],answer:"C",explanation:"《行政强制法》规定，行政强制措施由法律和行政法规设定。"},{id:166,type:"single",subject:"subject1",module:"法律法规",question:"下列属于民法规定的特别法人的是（  ）。",options:["有限责任公司","医院","机关法人","合伙企业"],answer:"C",explanation:"机关法人是特别法人的一种。有限责任公司属于营利法人，医院属于非营利法人，合伙企业属于非法人组织。"},{id:167,type:"single",subject:"subject1",module:"法律法规",question:"委托代理中，代理人不履行或者不完全履行职责，造成被代理人损害的，应当承担（  ）。",options:["行政责任","民事责任","刑事责任","连带责任"],answer:"B",explanation:"代理人因不履行或不完全履行职责造成被代理人损害的，应当承担民事责任。"},{id:168,type:"single",subject:"subject1",module:"思想政治",question:"我国宪法规定，中华人民共和国的一切权力属于（  ）。",options:["人民","公民","工人阶级","人民代表"],answer:"A",explanation:"宪法规定，中华人民共和国的一切权力属于人民。"},{id:169,type:"multi",subject:"subject1",module:"法律法规",question:"《民法典》规定的民事法律行为有效条件包括（  ）。",options:["行为人具有相应的民事行为能力","意思表示真实","不违反法律、行政法规的强制性规定","不违背公序良俗"],answer:["A","B","C","D"],explanation:"民事法律行为有效的条件包括行为人具有民事行为能力、意思表示真实、不违反法律强制性规定、不违背公序良俗。"},{id:170,type:"multi",subject:"subject1",module:"法律法规",question:"根据《反不正当竞争法》，以下属于混淆行为的有（  ）。",options:["擅自使用与他人有一定影响的商品名称","擅自使用他人的企业名称","虚假宣传","商业贿赂"],answer:["A","B"],explanation:"擅自使用与他人有一定影响的商品名称、企业名称等属于混淆行为。虚假宣传和商业贿赂属于其他类型的不正当竞争行为。"},{id:181,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人可以将委托人的商业秘密泄露给他人。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人对在业务中知悉的委托人商业秘密负有保密义务，不得泄露给他人。"},{id:182,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人应当为委托人争取最优的合同条件。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人应当按照合同约定和诚实信用原则，为委托人争取最优的合同条件。"},{id:183,type:"judge",subject:"subject2",module:"演出管理",question:"外国文艺表演团体在中国演出，需要取得临时营业演出许可证。",answer:"correct",options:["正确","错误"],explanation:"外国文艺表演团体来华演出，需要向省级文化主管部门申请取得临时营业演出许可证。"},{id:184,type:"judge",subject:"subject2",module:"演出管理",question:"演出经纪机构可以代理未成年人从事营业性演出活动，无需监护人同意。",answer:"wrong",options:["正确","错误"],explanation:"未成年人从事营业性演出活动，演出经纪机构应当取得其监护人的书面同意，并依法保护未成年人的合法权益。"},{id:185,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪合同中经纪期限的约定应当（  ）。",options:["越长越好","合理确定，考虑双方需求","越短越好","不需要约定期限"],answer:"B",explanation:"经纪期限应当根据双方需求和实际情况合理确定，过短影响经纪效果，过长可能损害艺人权益。"},{id:186,type:"single",subject:"subject2",module:"演出管理",question:"演出场所应当配备应急照明设备，应急照明持续时间不少于（  ）分钟。",options:["20","30","45","60"],answer:"B",explanation:"演出场所应急照明持续时间不少于30分钟，以确保紧急情况下人员安全疏散。"},{id:187,type:"single",subject:"subject2",module:"演出管理",question:"演出活动中的舞台承重应当经（  ）检测合格。",options:["文化主管部门","专业检测机构","演出经纪人","观众"],answer:"B",explanation:"舞台承重等安全指标应当经专业检测机构检测合格，确保演出安全。"},{id:188,type:"single",subject:"subject2",module:"艺术基础",question:"以下属于舞蹈类型的有（  ）。",options:["芭蕾舞","现代舞","民族舞","以上都是"],answer:"D",explanation:"芭蕾舞、现代舞、民族舞都是常见的舞蹈类型。"},{id:189,type:"single",subject:"subject2",module:"演出管理",question:"演出过程中发生突发事件时，演出举办单位应当首先（  ）。",options:["继续演出","确保观众安全疏散","联系媒体","追究责任"],answer:"B",explanation:"演出过程中发生突发事件时，演出举办单位应当首先确保观众和演职人员安全疏散。"},{id:190,type:"multi",subject:"subject2",module:"演出管理",question:"演出经纪人在签订演出合同时应重点审查的条款包括（  ）。",options:["演出日期和场次","演出内容和演员","报酬及支付方式","知识产权归属"],answer:["A","B","C","D"],explanation:"签订演出合同时应重点审查演出日期场次、内容演员、报酬方式和知识产权归属等核心条款。"},{id:191,type:"multi",subject:"subject2",module:"演出管理",question:"以下属于演出场所安全要求的有（  ）。",options:["安全出口标识清晰","配备灭火器材","安装应急广播系统","有专业人员值守"],answer:["A","B","C","D"],explanation:"演出场所安全要求包括出口标识清晰、灭火器材配备、应急广播安装和专业人员值守等。"},{id:192,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪活动的基本方式包括（  ）。",options:["居间","代理","行纪","自营"],answer:["A","B","C"],explanation:"演出经纪活动的基本方式包括居间、代理和行纪三种。"},{id:193,type:"multi",subject:"subject2",module:"艺术基础",question:"中国戏曲的艺术特点包括（  ）。",options:["综合性","虚拟性","程式化","写实性"],answer:["A","B","C"],explanation:"中国戏曲的三大艺术特点是综合性、虚拟性和程式化。写实性是话剧等西方戏剧的特点。"},{id:194,type:"multi",subject:"subject2",module:"演出管理",question:"演出项目预算通常包括（  ）。",options:["演出制作费用","场地租赁费用","宣传推广费用","不可预见费"],answer:["A","B","C","D"],explanation:"演出项目预算应全面考虑制作费、场地费、宣传费和不可预见费等各项支出。"},{id:195,type:"multi",subject:"subject2",module:"演出管理",question:"以下关于演出票务管理说法正确的有（  ）。",options:["实行实名制购票","禁止囤票炒票","公开售票信息","设置合理的退票机制"],answer:["A","B","C","D"],explanation:"演出票务管理要求实名购票、禁止炒票、信息公开和合理退票。"},{id:196,type:"single",subject:"subject1",module:"思想政治",question:"中国式现代化的本质要求不包括（  ）。",options:["坚持中国共产党领导","坚持中国特色社会主义","全盘西化","推动构建人类命运共同体"],answer:"C",explanation:"中国式现代化的本质要求不包括全盘西化，全盘西化不符合中国特色社会主义道路。"},{id:197,type:"single",subject:"subject1",module:"法律法规",question:"《民法典》规定，向人民法院请求保护民事权利的诉讼时效期间为（  ）年。",options:["1","2","3","5"],answer:"C",explanation:"《民法典》规定，向人民法院请求保护民事权利的诉讼时效期间为3年。"},{id:198,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪合同的变更需要（  ）同意。",options:["经纪机构单方面","双方协商一致","文化主管部门","观众"],answer:"B",explanation:"演出经纪合同的变更需要双方协商一致，任何一方不得擅自变更合同条款。"},{id:199,type:"single",subject:"subject2",module:"演出管理",question:"演出项目执行过程中，演出经纪人的核心工作是（  ）。",options:["组织协调各方资源","签订更多合同","接受媒体采访","安排艺人私事"],answer:"A",explanation:"演出项目执行过程中，演出经纪人的核心工作是组织协调各方资源，确保演出顺利进行。"},{id:200,type:"single",subject:"subject2",module:"演出管理",question:"演出活动因天气原因取消的，门票应当（  ）。",options:["不予退还","全额退还","退还一半","兑换其他演出"],answer:"B",explanation:"演出活动因不可抗力（如天气原因）取消的，门票应当全额退还购票观众。"},{id:201,type:"judge",subject:"subject1",module:"模拟题一",question:"演出主办单位向文化主管部门提交营业性演出活动的申请未获得批文之前不能进行宣传。",answer:"wrong",options:["正确","错误"],explanation:""},{id:202,type:"judge",subject:"subject1",module:"模拟题一",question:"演出场所经营单位应当取得消防合格证。",answer:"correct",options:["正确","错误"],explanation:""},{id:203,type:"judge",subject:"subject1",module:"模拟题一",question:"演出经纪人就是指在演出市场上为实现演出产品的交易进行中介服务并获取佣金的文化商人。",answer:"correct",options:["正确","错误"],explanation:""},{id:204,type:"judge",subject:"subject1",module:"模拟题一",question:"承办者擅自变更大型群众性活动的时间、地点、内容或者擅自扩大大型群众性活动举办规模的，由公安机关处以5万元以上10万元以下罚款；有违法所得的，没收违法所得。",answer:"wrong",options:["正确","错误"],explanation:""},{id:205,type:"judge",subject:"subject1",module:"模拟题一",question:"举办节庆类营业性演出应当将整体方案报省级以上公安部门审核。",answer:"wrong",options:["正确","错误"],explanation:""},{id:206,type:"judge",subject:"subject1",module:"模拟题一",question:"营业性演出的演员阵容等发生变更的，如演出举办单位及时告知观众并说明理由的，观众不能要求退票。",answer:"wrong",options:["正确","错误"],explanation:""},{id:207,type:"judge",subject:"subject1",module:"模拟题一",question:"演员、剧本、观众、宣传、工作人员是演出的五大基本要素。",answer:"wrong",options:["正确","错误"],explanation:""},{id:208,type:"judge",subject:"subject1",module:"模拟题一",question:"申请举办营业性涉港澳台演出，应当在演出日期20日前将申请材料提交负责审批的文化主管部门。",answer:"correct",options:["正确","错误"],explanation:""},{id:209,type:"judge",subject:"subject1",module:"模拟题一",question:"设立文艺表演团体应当向市级文化主管部门提出申请，设立演出经纪机构应当向县级文化主管部门提出申请。",answer:"wrong",options:["正确","错误"],explanation:""},{id:210,type:"judge",subject:"subject1",module:"模拟题一",question:"最低票价标志着演出项目门槛的高低和普通观众心理承受能力的重要因素，因此一般不易太高，数量应越多越好。",answer:"wrong",options:["正确","错误"],explanation:""},{id:211,type:"judge",subject:"subject1",module:"模拟题一",question:"当市场同一时期同类演出项目相对集中时应该减少宣传费用，借势宣传。",answer:"wrong",options:["正确","错误"],explanation:""},{id:212,type:"judge",subject:"subject1",module:"模拟题一",question:"经纪人行业属于第二产业范畴，提供优质、高效的服务是经纪人在激烈的市场竞争中赖以生存和发展的关键。",answer:"wrong",options:["正确","错误"],explanation:""},{id:213,type:"judge",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例》，营业性演出的演员和场次发生变化时不需重新报批。",answer:"wrong",options:["正确","错误"],explanation:""},{id:214,type:"judge",subject:"subject1",module:"模拟题一",question:"某演出单位在演出中使用的视频内容包含色情恐怖的内容，这个行为违反了《营业性演出管理条例》第二十条的规定。",answer:"wrong",options:["正确","错误"],explanation:""},{id:215,type:"judge",subject:"subject1",module:"模拟题一",question:"公安部门审批营业性演出活动，应当核验该演出经纪机构申请营业性演出许可证时所提供的演出经纪人资格证书。",answer:"wrong",options:["正确","错误"],explanation:""},{id:216,type:"judge",subject:"subject1",module:"模拟题一",question:"根据《经纪人管理办法》规定，经纪人应当将所聘用的经纪执业人员的经纪人证书号码在经营场所明示。",answer:"correct",options:["正确","错误"],explanation:""},{id:217,type:"judge",subject:"subject1",module:"模拟题一",question:"举办营业性演出活动应该获得演出场地的许可，演出内容的许可，演出经营行为的许可以及演出活动安全保证的许可。",answer:"wrong",options:["正确","错误"],explanation:""},{id:218,type:"judge",subject:"subject1",module:"模拟题一",question:"文艺表演团体的演员是团体演员，不需缴纳个人所得税。",answer:"wrong",options:["正确","错误"],explanation:""},{id:219,type:"judge",subject:"subject1",module:"模拟题一",question:"艺术总监是一个剧目创作生产的总召集人和创作经费的总负责人。",answer:"wrong",options:["正确","错误"],explanation:""},{id:220,type:"judge",subject:"subject1",module:"模拟题一",question:"舞台成像灯、追光灯以及多媒体电脑灯都不属于舞台常规灯具。",answer:"wrong",options:["正确","错误"],explanation:""},{id:221,type:"judge",subject:"subject1",module:"模拟题一",question:"一发行公司从某唱片公司获得歌手演唱会发行权，在支付相关费用后，发行公司在作品发行前还应取得歌手的许可，并支付报酬。",answer:"correct",options:["正确","错误"],explanation:""},{id:222,type:"judge",subject:"subject1",module:"模拟题一",question:"具备较强的沟通能力是成为一名合格演出经纪人的基础，其他能力不作为其从业必要素质要求。",answer:"wrong",options:["正确","错误"],explanation:""},{id:223,type:"judge",subject:"subject1",module:"模拟题一",question:"成功的项目宣传方案应该找准宣传点，精确确定宣传经费并制定阶段性的宣传周期。",answer:"correct",options:["正确","错误"],explanation:""},{id:224,type:"judge",subject:"subject1",module:"模拟题一",question:"我国文化市场的社会主义属性是由我国社会主义市场经济体制决定的。",answer:"correct",options:["正确","错误"],explanation:""},{id:225,type:"judge",subject:"subject1",module:"模拟题一",question:"落实舞台工程时应当与工程公司签订正式合同，包括对技术人员以及设备型号、规格、档次、数量、使用时间等基本要求。",answer:"correct",options:["正确","错误"],explanation:""},{id:226,type:"judge",subject:"subject1",module:"模拟题一",question:"以巫术、传教为主的宗教表演艺术因其属于政治宗教活动的一部分，本身没有作为商品进入交易市场，因此不属于中国古代表演艺术的基本形式。",answer:"wrong",options:["正确","错误"],explanation:""},{id:227,type:"judge",subject:"subject1",module:"模拟题一",question:"依法取得营业执照或者事业单位法人证书、民办非企业单位登记证书的演出场所经营单位，应当自领取证照之日起10日内，持上述证照和有关消防、卫生批准文件，向所在地省级文化主管部门申请营业性演出许可证。",answer:"wrong",options:["正确","错误"],explanation:""},{id:228,type:"judge",subject:"subject1",module:"模拟题一",question:"达到5个以上省市的青年演员共同参演的营业性演出才可以称为“全国青年演员汇演”。",answer:"wrong",options:["正确","错误"],explanation:""},{id:229,type:"judge",subject:"subject1",module:"模拟题一",question:"演出剧目在向外做巡演推广的资料中需要提供演出档期、演员人数、演出报价等基本信息。",answer:"correct",options:["正确","错误"],explanation:""},{id:230,type:"single",subject:"subject1",module:"模拟题一",question:"以下不属于营业性演出的是（  ）。",options:["某新电影在小区内举办的宣传义演","国家乒乓球队在高校内举办的乒乓球推广赛事","某歌手为新剧推广举办的见面会","电视台在剧场举办的有明星参加的客户答谢会"],answer:"B",explanation:"国家乒乓球队在高校内举办的乒乓球推广赛事不属于营业性演出。"},{id:231,type:"single",subject:"subject1",module:"模拟题一",question:"关于舞台工程说法正确的是（  ）。",options:["舞台工程由视频、灯光和音响三个技术专业组成","一般在固定表演舞台的大型场馆举办文化活动应首先搭建一个临时基础舞台","舞美主要功能是根据剧节目对舞台表演的环境布景进行设计制作","临时搭建的机械舞台应当尽量扩大规模设计复杂以保障稳固安全"],answer:"C",explanation:"舞美主要功能是根据剧节目对舞台表演的环境布景进行设计制作。"},{id:232,type:"single",subject:"subject1",module:"模拟题一",question:"以下对于使用他人作品进行演出的著作权使用描述正确的是（  ）。",options:["使用他人作品演出，表演者应取得著作权人许可，并支付报酬","演出机构使用他人作品举办演出中，应当由表演者取得著作权人许可，并支付报酬","使用改编已有作品产生的新作品而进行演出，表演者不必向新作品著作权人支付报酬","使用翻译已有作品产生的新作品进行演出，表演者不必获得原作品著作权人许可"],answer:"A",explanation:"使用他人作品演出，表演者应取得著作权人许可并支付报酬。"},{id:233,type:"single",subject:"subject1",module:"模拟题一",question:"对我国文化市场的社会主义属性理解正确的有（  ）。",options:["我国文化市场是以国办与民办文化相结合，共同主导的文化市场","我国文化市场是经济导向型的有序竞争的市场","我国文化市场发展的根本目的是为了满足人民群众日益增长的精神文化需求","我国文化市场以经济效益为最高准则"],answer:"C",explanation:"我国文化市场发展的根本目的是满足人民群众日益增长的精神文化需求。"},{id:234,type:"single",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例》，以下关于演出场所经营单位相关规定描述不正确的是（  ）。",options:["演出场所经营单位应当核验演出举办单位制定的灭火、应急疏散预案","演出场所经营单位提供演出场地应当核验演出举办单位取得的批准文件","演出场所经营单位应当确保演出场所的建筑、设施符合国家安全标准和消防安全规范","演出场所经营单位应当定期检查消防安全设施状况，并及时维护、更新"],answer:"A",explanation:"灭火、应急疏散预案应由演出举办单位制定，而非演出场所经营单位核验。"},{id:235,type:"single",subject:"subject1",module:"模拟题一",question:"以下关于舞台布景表述正确的有（  ）。",options:["软景的立体效果比硬景好","硬景的空间透视感和立体感弱","舞台布景有硬景和软景之分","软景不能多次使用"],answer:"C",explanation:"舞台布景确实有硬景和软景之分。"},{id:236,type:"single",subject:"subject1",module:"模拟题一",question:"对经安全许可的大型群众性活动，以下对公安机关的工作内容描述不正确的是（  ）。",options:["组织相应警力维持活动现场周边的秩序","配合活动现场检票工作","预防和处置突发治安事件","查处贩卖假票活动"],answer:"B",explanation:"公安机关不负责配合检票工作，检票由演出举办单位负责。"},{id:237,type:"single",subject:"subject1",module:"模拟题一",question:"根据《大型群众性活动安全管理条例》，以下描述正确的是（  ）。",options:["大型群众性活动的场所单位对其场所内的活动负责","承办者的主要负责人是其举办的大型群众性活动的安全负责人","演出所在地公安部门应当为其管辖内的大型活动制定安全工作方案","承办者应当根据活动场地方制定的安全工作方案进行工作"],answer:"B",explanation:"承办者的主要负责人是大型群众性活动的安全负责人。"},{id:238,type:"single",subject:"subject1",module:"模拟题一",question:"根据《大型群众性活动安全管理条例》，以下描述正确的是（  ）。",options:["大型群众性活动的场所单位对其场所内的活动负责","承办者的主要负责人是其举办的大型群众性活动的安全负责人","演出所在地公安部门应当为其管辖内的大型活动制定安全工作方案","承办者应当根据活动场地方制定的安全工作方案进行工作"],answer:"B",explanation:"承办者的主要负责人是大型群众性活动的安全负责人。"},{id:239,type:"single",subject:"subject1",module:"模拟题一",question:"以下不属于演出视频设备的有（  ）。",options:["LED大屏","大功率投影机","视频编辑机","LED灯"],answer:"D",explanation:"LED灯属于灯光设备，不属于视频设备。"},{id:240,type:"single",subject:"subject1",module:"模拟题一",question:"以下关于大型群众性活动发生变更的说法描述不正确的是（  ）。",options:["承办者变更大型群众性活动地点的，应当依照条例的规定重新申请安全许可","承办者变更大型群众性活动时间的，应当经公安机关同意方可变更","承办者可以擅自变更活动的涉外演员阵容，但不得擅自变更活动时间","承办者取消举办大型群众性活动的，应当在原定举办活动时间之前书面告知作出安全许可决定的公安机关"],answer:"C",explanation:"承办者不得擅自变更活动的涉外演员阵容。"},{id:241,type:"single",subject:"subject1",module:"模拟题一",question:"根据《著作权法》规定，下列选项中依照本法不享有著作权的是（  ）。",options:["中国某作家在国外出版的小说","外国某歌手在外国发行的作品","某演出公司在中国创作的作品","外国某作家在中国未发表的小说"],answer:"B",explanation:"外国某歌手在外国发行的作品，不符合著作权法中关于外国人作品的保护条件。"},{id:242,type:"single",subject:"subject1",module:"模拟题一",question:"以下不属于舞台特殊效果设备的有（  ）。",options:["热焰火","染色灯","雪花机","冷焰火"],answer:"B",explanation:"染色灯属于常规灯光设备，不属于特殊效果设备。"},{id:243,type:"single",subject:"subject1",module:"模拟题一",question:"根据《经纪人管理办法》规定，经纪人和委托人签订经纪合同，应当附有（ ）的签名。",options:["监督该项经纪业务的负责人","执行该项经纪业务的经纪执业人员","执行该项经纪业务的经纪公司负责人","审核该项经纪业务的主管部门负责人"],answer:"B",explanation:"应当附有执行该项经纪业务的经纪执业人员的签名。"},{id:244,type:"single",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例》属于文化主管部门核验的文件是（  ）。",options:["演出经纪人员资格证书换发","演出主办单位营业性演出许可证","舞台、看台搭建公司资质证明","大型活动安全方案"],answer:"B",explanation:"文化主管部门核验演出主办单位的营业性演出许可证。"},{id:245,type:"single",subject:"subject1",module:"模拟题一",question:"要成为国际演艺家庭的一员，就要尊重对方的游戏规则。这句话体现了演出经纪人的哪个专业素质要求（  ）。",options:["具有较强的国际艺术鉴赏力","对国际演出经纪经营知识有所了解","具有较强的外语能力","具有较高的国际演出经纪理论水平"],answer:"B",explanation:"这句话体现的是对国际演出经纪经营知识有所了解的要求。"},{id:246,type:"single",subject:"subject1",module:"模拟题一",question:"以下关于维护观众进出场秩序的说法正确的是（  ）。",options:["根据安保情况及入口数合理安排观众进场时间","入场观众人数拥挤时应及时增加检票人员","入场观众人数过多时应暂停检票以广播等设备说明并稳定观众情绪","演出结束后开放出场门并引导观众按合理路线离场"],answer:"B",explanation:"入场观众人数拥挤时应及时增加检票人员。"},{id:247,type:"single",subject:"subject1",module:"模拟题一",question:"申请举办营业性涉外演出，应提交资金安排计划书和复印件，以下不属于该证明文件的是（  ）。",options:["申请单位开户银行出具的法人存款证明","银行等金融机构同意贷款的证明","其他单位同意借款、赞助的证明","其他单位出具的同意担保证明"],answer:"A",explanation:"法人存款证明不能直接作为资金安排计划书使用。"},{id:248,type:"single",subject:"subject1",module:"模拟题一",question:"以下关于保障演职人员安全的描述正确的是（  ）。",options:["使用特技器材进行表演的演员必须向演出所在地文化主管部门报备","演员必须至少参加3次以上排练以熟悉舞台结构","演出单位为演员提供的演出舞台及相关舞台设施必须符合国家有关安全标准","在舞台拆卸台过程中演出场所单位负责人应对施工过程进行监督"],answer:"C",explanation:"演出舞台及相关设备必须符合国家有关安全标准。"},{id:249,type:"single",subject:"subject1",module:"模拟题一",question:"以下行为属于侵犯艺人肖像权的行为的是（  ）。",options:["代言企业使用艺人形象印制宣传海报","某电视台使用艺人音乐录影带片段进行广告宣传","媒体使用艺人授权形象制作礼品","艺人主演剧节目用艺人所演出角色片段制作宣传片"],answer:"B",explanation:"未经授权使用艺人音乐录影带片段进行广告宣传属于侵犯肖像权。"},{id:250,type:"single",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例》已经备案的演出场所经营单位可以在（ ）举办营业性演出。",options:["任何演出场所","合作的演出场所","本单位经营的演出场所","所在地县级范围内的演出场所"],answer:"C",explanation:"备案的演出场所经营单位只能在本单位经营的演出场所举办营业性演出。"},{id:251,type:"single",subject:"subject1",module:"模拟题一",question:"我国演出市场三大基本制度是指（  ）。",options:["营业性演出管理制度、演出经纪合同制度、演出安全制度","营业性演出备案制度、演出内容管理制度、演出合同制度","营业性演出行政许可制度、演出经纪制度、演出合同制度","营业性演出行政许可制度、演出内容审查制度、演出经纪合同制度"],answer:"C",explanation:"三大基本制度是营业性演出行政许可制度、演出经纪制度和演出合同制度。"},{id:252,type:"single",subject:"subject1",module:"模拟题一",question:"举办演出活动时应特别注意观众区域的划分及引导，以下措施正确的是（  ）。",options:["在临时性演出场所举办大型演出观众区域与缓冲区域应当由文化主管单位划定","在演出场馆内各主要通道及各观众区域之间应由场馆指定安保人员引导观众入场","演出场馆应当按照核准的观众数量、划定的观众区域印制和出售门票","因舞台搭建而被严重遮挡的观众席位不可出售"],answer:"D",explanation:"因舞台搭建而被严重遮挡的观众席位不可出售，这是保护观众权益的要求。"},{id:253,type:"single",subject:"subject1",module:"模拟题一",question:"以下行为不违反《营业性演出管理条例》第二十五条规定的是（  ）。",options:["表演方式利用人体缺陷等招徕观众的","表演内容恐怖、残忍的","表演内容有饮酒、大声喧哗情节的","表演内容危害社会公德的"],answer:"C",explanation:"表演内容有饮酒、大声喧哗情节不违反第二十五条规定。"},{id:254,type:"single",subject:"subject1",module:"模拟题一",question:"以下关于文化市场的表述正确的是（  ）。",options:["音像市场属于文化市场","文化市场的运行必须符合社会主义市场经济规律","文化市场具有商品经济的一般性，即文化商品主要具有价值和使用价值","我国文化市场特点是以集体经济为市场核心"],answer:"A",explanation:"音像市场属于文化市场的范畴。"},{id:255,type:"single",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例》规定，个体演员和个体演出经纪人应当自领取营业执照之日起（ ）内向所在地县级人民政府文化主管部门备案。",options:["3日","10日","15日","20日"],answer:"D",explanation:"个体演员和个体演出经纪人应当自领取营业执照之日起20日内备案。"},{id:256,type:"single",subject:"subject1",module:"模拟题一",question:"产品的生命周期过程是（  ）。",options:["萌芽、发生、发展到衰退、退出市场","发生、发展、成熟到衰退、退出市场","发生、发展、成长到衰退、退出市场","萌芽、成长、成熟到衰退、退出市场"],answer:"B",explanation:"产品生命周期分为发生、发展、成熟、衰退、退出市场五个阶段。"},{id:257,type:"single",subject:"subject1",module:"模拟题一",question:"以下属于经纪人规范从业行为的是（  ）。",options:["收取当事人佣金应当开具发票，并依法缴纳税收","根据工作复杂程度不同向当事人索取佣金以外的酬劳","记录与当事人的聊天记录及当事人的隐私信息","记录经纪业务成交情况，并保存五年以上"],answer:"A",explanation:"收取佣金应开具发票并依法纳税是规范从业行为。"},{id:258,type:"single",subject:"subject1",module:"模拟题一",question:"市场是商品经济的范畴，关于市场的含义说法不正确的是（  ）。",options:["集市贸易属于市场","市场由市场主体和市场客体构成","商品的管理者与消费者构成了市场的主体","各种商品和服务构成市场的客体"],answer:"C",explanation:"市场主体是商品的生产者和经营者，而非管理者与消费者。"},{id:259,type:"single",subject:"subject1",module:"模拟题一",question:"以下描述不正确的是（  ）。",options:["佣金是经纪人从事经纪活动的主观目的","佣金是信息提供者信息商品的销售收入","佣金是委托人依照双方约定因经纪业务而支付的报酬","佣金所反映的经济关系和性质上与回扣不同"],answer:"B",explanation:"佣金不是信息提供者信息商品的销售收入，那是信息费。"},{id:260,type:"multi",subject:"subject1",module:"模拟题一",question:"某商场计划邀请艺人出席其开业庆典，在与经纪人沟通中，应提供哪些基本信息（  ）。",options:["活动时间、地点及内容","商场是否配备有休息室和化妆间","活动中是否需要配合采访及企业互动","活动对艺人表演的需求"],answer:["A","C","D"],explanation:"商场是否配备休息室和化妆间不属于必须提供的基本信息。"},{id:261,type:"multi",subject:"subject1",module:"模拟题一",question:"以下属于舞台舞美搭建公司常用的演出合同的是（  ）。",options:["舞美搭建人员的雇佣合同","舞台舞美结构工程承揽合同","舞台舞美灯光设备租赁合同","演出项目推广代理合同"],answer:["B","C"],explanation:"常用合同包括结构工程承揽合同和灯光设备租赁合同。"},{id:262,type:"multi",subject:"subject1",module:"模拟题一",question:"下列关于营业性演出许可证的表述不正确的是（  ）。",options:["营业性演出许可证包括二份正本和二份副本","营业性演出许可证的有效期为3年","吊销、注销文艺表演团体营业性演出许可证的，应当报地市级文化主管部门备案","吊销、注销演出经纪机构营业性演出许可证的，应当报文化部备案"],answer:["A","B","C"],explanation:"许可证为一正一副，有效期为2年，注销文艺表演团体许可证应报文化部备案。"},{id:263,type:"multi",subject:"subject1",module:"模拟题一",question:"关于个人所得税，以下说法错误的是（  ）。",options:["个体演员的个人所得税须由个人缴纳","文艺表演团体的演员不用缴纳个人所得税","演出举办单位不应为演员代扣代缴个人所得税","演出举办单位应该为演员代扣代缴个人所得税"],answer:["B","C"],explanation:"文艺表演团体的演员也必须缴纳个人所得税，演出举办单位应当代扣代缴。"},{id:264,type:"multi",subject:"subject1",module:"模拟题一",question:"举办外国的或者港澳台地区的文艺表演团体、个人参加的营业性演出，应当符合下列条件（  ）。",options:["有与其举办的营业性演出相适应的场地","有2年以上举办营业性演出的经历","1年内无违法违规记录","有与其举办的营业性演出相适应的资金"],answer:["B","D"],explanation:"应当有2年以上举办营业性演出的经历和相适应的资金。"},{id:265,type:"multi",subject:"subject1",module:"模拟题一",question:"演出场所应当履行的消防安全职责有（  ）。",options:["制定灭火和应急疏散预案","保障疏散通道、安全出口、消防车通道畅通","组织防火检查，及时消除火灾隐患","组织进行有针对性的消防演练"],answer:["A","B","C","D"],explanation:"四项均属于演出场所应履行的消防安全职责。"},{id:266,type:"multi",subject:"subject1",module:"模拟题一",question:"下列哪些违反消防法的行为，会被处以五千元以上五万元以下的罚款（  ）。",options:["损坏、挪用或者擅自拆除、停用消防设施、器材的","占用、堵塞、封闭疏散通道、安全出口或者其他妨碍安全疏散行为","埋压、圈占遮挡消火栓或者占用防火间距的","占用、堵塞、封闭消防车通道，妨碍消防车通行的"],answer:["A","B","C","D"],explanation:"四种行为均属于违反消防法应处五千元以上五万元以下罚款的行为。"},{id:267,type:"multi",subject:"subject1",module:"模拟题一",question:"以下描述正确的是（  ）。",options:["佣金所产生的作用范围与回扣相似","佣金产生的原因与回扣相似","信息费是因提供有价值信息而对信息提供者所支付的价款","信息费与佣金在性质上是相同的"],answer:["A","B","C"],explanation:"信息费与佣金在性质上是不同的，佣金是经纪服务报酬。"},{id:268,type:"multi",subject:"subject1",module:"模拟题一",question:"申请设立文艺表演团体应当准备什么资料（  ）。",options:["专职演员证明","器材设备资料","演出场所的资格证明","不低于50万元的资金证明"],answer:["A","B"],explanation:"申请设立文艺表演团体需要专职演员证明和器材设备资料。"},{id:269,type:"multi",subject:"subject1",module:"模拟题一",question:"在户外演出时因电力故障导致演出中断，演出举办单位反应不当的是（  ）。",options:["组织人员维护现场秩序，疏导观众退场","报公安部门并由公安部门决定是否退票","报文化部门并由文化部门决定是否退票","组织观众在现场等候电力恢复"],answer:["B","C"],explanation:"演出中断后的处理应由演出举办单位自行决定，而非报公安或文化部门决定。"},{id:270,type:"multi",subject:"subject1",module:"模拟题一",question:"以下不属于市场机制基本要素的是（  ）。",options:["公平机制","竞争机制","市场需求机制","政府干预机制"],answer:["A","C","D"],explanation:"市场机制基本要素包括竞争机制、价格机制、供求机制等。"},{id:271,type:"multi",subject:"subject1",module:"模拟题一",question:"根据《演出经纪人员管理办法》规定，以下不属于文化主管部门核验演出经纪人员演出经纪资格证书情况的是（  ）。",options:["文化主管部门颁发演出经纪机构营业性演出许可证时","文化主管部门换发演出经纪机构营业性演出许可证时","文化主管部门审批营业执照时","文化主管部门核发与管理演出经纪资格证时"],answer:["C","D"],explanation:"营业执照由工商行政管理部门审批，经纪资格证由行业协会管理。"},{id:272,type:"multi",subject:"subject1",module:"模拟题一",question:"以下不属于演出经纪机构举办营业性演出应当履行义务的是（  ）。",options:["负责演出场地的日常检测","负责演出产品的创作与制作","负责演出活动的宣传","负责演出现场的调度管理"],answer:["A","B"],explanation:"演出场地日常检测和演出产品创作不属于经纪机构的义务。"},{id:273,type:"multi",subject:"subject1",module:"模拟题一",question:"以下关于举办营业性涉外和涉港澳台演出出入境手续办理的表述错误的是（  ）。",options:["举办港澳台地区演员的演出不需要办理出入境手续","举办涉外演出，国外团体、个人应由团体或个人自行办理出入境手续","举办涉港澳台或涉外演出，举办单位都应统一办理出入境手续","国外演员在中国境内工作1年以内不需要办理工作签证"],answer:["A","B","D"],explanation:"港澳台演出也需办理出入境手续，应统一办理，来华工作均需工作签证。"},{id:274,type:"multi",subject:"subject1",module:"模拟题一",question:"以下不符合《营业性演出管理条例》的是（  ）。",options:["演出举办单位应当为文化稽查人员预留门票","公安部门对演出进行现场监管应当出示门票","政府部门可以购买门票用于本单位干部观摩学习","政府工作人员不得向演出经营单位索要门票"],answer:["A","B","C"],explanation:"不能为稽查人员预留门票，公安监管应出示证件，政府不能购买门票用于观摩。"},{id:275,type:"multi",subject:"subject1",module:"模拟题一",question:"根据《营业性演出管理条例实施细则》规定，募捐义演的演出收入捐赠给社会公益事业，其中演出收入指（  ）。",options:["网络播出收入","捐赠款物","宣传费用","与演出活动相关的全部收入"],answer:["A","B","D"],explanation:"演出收入包括网络播出收入、捐赠款物和与演出活动相关的全部收入，不包括宣传费用。"},{id:276,type:"multi",subject:"subject1",module:"模拟题一",question:"以下对保障舞台设施设备安全描述不正确的是（  ）。",options:["受委托舞台工程企业应当获得演出场所认定的资质等级证书","演出中所使用的设施设备必须符合国家相关安全标准","演出承办单位应定期对演出场馆固定设施设备进行安全检查","临时搭建的舞台设施设备须经过省级以上文化主管部门安全检测"],answer:["A","C","D"],explanation:"资质由专业机构认定，定期检查由场馆负责，临时舞台由公安机关消防机构检测。"},{id:277,type:"multi",subject:"subject1",module:"模拟题一",question:"根据《反不正当竞争法》规定，以下说法正确的是（  ）。",options:["经营者在市场交易中应当遵循公平、诚实信用的原则","不正当竞争是指经营者违反规定，扰乱社会经济秩序的行为","经营者是指从事商品经营或者营利性服务的法人和其他经济组织，个人不包括在内","经营者在市场交易中应当遵循客户至上促进最大经济效益的原则"],answer:["A","B"],explanation:"反不正当竞争法规定经营者包括个人，应遵循自愿、平等、公平、诚实信用原则。"},{id:278,type:"multi",subject:"subject1",module:"模拟题一",question:"大型群众性活动的承办者在提交安全许可申请时应提交的资料有（  ）。",options:["承办者合法成立的证明","活动方案及说明","安全负责人的身份证明","多家共同承办时还应提交联合承办协议"],answer:["A","B","C","D"],explanation:"四项均属于安全许可申请时应提交的资料。"},{id:279,type:"multi",subject:"subject1",module:"模拟题一",question:"合同订立后也可出现变更、转让与解除的情况，其中合同转让包括（  ）。",options:["合同权利的转让","合同义务的转让","合同权利和义务的概括转让","合同中特定当事人的债权转让"],answer:["A","B","C"],explanation:"合同转让包括权利转让、义务转让和概括转让。"},{id:270,type:"judge",subject:"subject1",module:"思想政治",question:"习近平新时代中国特色社会主义思想是当代中国马克思主义、二十一世纪马克思主义。",answer:"correct",options:["正确","错误"],explanation:"习近平新时代中国特色社会主义思想是马克思主义中国化时代化的最新成果。"},{id:271,type:"judge",subject:"subject1",module:"思想政治",question:"中国特色社会主义最本质的特征是中国共产党领导。",answer:"correct",options:["正确","错误"],explanation:"党的十九大报告明确指出，中国特色社会主义最本质的特征是中国共产党领导。"},{id:272,type:"judge",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中，国家层面的价值目标是自由、平等、公正、法治。",answer:"wrong",options:["正确","错误"],explanation:"自由、平等、公正、法治是社会层面的价值目标，国家层面是富强、民主、文明、和谐。"},{id:273,type:"judge",subject:"subject1",module:"思想政治",question:"我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。",answer:"correct",options:["正确","错误"],explanation:"党的十九大报告对我国社会主要矛盾作出了新的重大判断。"},{id:274,type:"judge",subject:"subject1",module:"思想政治",question:"文化自信是一个国家、一个民族发展中更基本、更深沉、更持久的力量。",answer:"correct",options:["正确","错误"],explanation:"党的十九大报告将文化自信提升到重要战略高度。"},{id:275,type:"judge",subject:"subject1",module:"思想政治",question:"社会主义文艺是人民的文艺，必须坚持以人民为中心的创作导向。",answer:"correct",options:["正确","错误"],explanation:"习近平在文艺工作座谈会上指出，社会主义文艺是人民的文艺。"},{id:276,type:"judge",subject:"subject1",module:"思想政治",question:"新发展理念中，创新居于首位，是引领发展的第一动力。",answer:"correct",options:["正确","错误"],explanation:"创新、协调、绿色、开放、共享的新发展理念中，创新是第一动力。"},{id:277,type:"judge",subject:"subject1",module:"思想政治",question:"我国宪法规定，国家尊重和保障人权。",answer:"correct",options:["正确","错误"],explanation:"2004年宪法修正案将'国家尊重和保障人权'写入宪法。"},{id:278,type:"judge",subject:"subject1",module:"思想政治",question:"中国特色社会主义文化，源自于中华民族五千多年文明历史所孕育的中华优秀传统文化。",answer:"correct",options:["正确","错误"],explanation:"十九大报告指出中国特色社会主义文化源自中华优秀传统文化、革命文化和社会主义先进文化。"},{id:279,type:"judge",subject:"subject1",module:"思想政治",question:"推进文化自信自强，就是要全盘继承中国传统文化，不需要创新和发展。",answer:"wrong",options:["正确","错误"],explanation:"推进文化自信自强要推动中华优秀传统文化创造性转化、创新性发展。"},{id:280,type:"judge",subject:"subject1",module:"思想政治",question:"中华民族伟大复兴的中国梦，核心内涵是国家富强、民族振兴、人民幸福。",answer:"correct",options:["正确","错误"],explanation:"中国梦的核心内涵是实现国家富强、民族振兴、人民幸福。"},{id:281,type:"judge",subject:"subject1",module:"思想政治",question:"全面依法治国总目标是建设中国特色社会主义法治体系、建设社会主义法治国家。",answer:"correct",options:["正确","错误"],explanation:"党的十八届四中全会明确了全面依法治国的总目标。"},{id:282,type:"judge",subject:"subject1",module:"思想政治",question:"社会主义核心价值观在公民个人层面的价值准则是爱国、敬业、诚信、友善。",answer:"correct",options:["正确","错误"],explanation:"公民个人层面的价值准则：爱国、敬业、诚信、友善。"},{id:283,type:"judge",subject:"subject1",module:"思想政治",question:"构建人类命运共同体思想的核心理念是世界各国共同掌握世界命运。",answer:"wrong",options:["正确","错误"],explanation:"人类命运共同体理念的核心理念是建设持久和平、普遍安全、共同繁荣、开放包容、清洁美丽的世界。"},{id:284,type:"judge",subject:"subject1",module:"思想政治",question:"中华优秀传统文化是中华民族的根和魂，是中国特色社会主义植根的文化沃土。",answer:"correct",options:["正确","错误"],explanation:"中华优秀传统文化是中华民族的精神命脉和文化基因。"},{id:285,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义进入新时代，我国社会主要矛盾已经转化为（  ）。",options:["人民日益增长的物质文化需要同落后的社会生产之间的矛盾","人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","人民日益增长的物质需要同落后的社会生产之间的矛盾","经济发展与环境保护之间的矛盾"],answer:"B",explanation:"党的十九大报告指出，我国社会主要矛盾已经发生转化。"},{id:286,type:"single",subject:"subject1",module:"思想政治",question:"新发展理念中，引领发展的第一动力是（  ）。",options:["协调","创新","绿色","开放"],answer:"B",explanation:"创新是引领发展的第一动力。"},{id:287,type:"single",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中，属于公民个人层面价值准则的是（  ）。",options:["富强、民主、文明、和谐","自由、平等、公正、法治","爱国、敬业、诚信、友善","创新、协调、绿色、开放"],answer:"C",explanation:"公民个人层面的价值准则是爱国、敬业、诚信、友善。"},{id:288,type:"single",subject:"subject1",module:"思想政治",question:"全面依法治国的总目标是（  ）。",options:["建设中国特色社会主义法律体系","建设中国特色社会主义法治体系、建设社会主义法治国家","实现司法公正","全面推进依法行政"],answer:"B",explanation:"党的十八届四中全会明确了全面依法治国的总目标。"},{id:289,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义最本质的特征是（  ）。",options:["人民当家作主","中国共产党领导","依法治国","改革开放"],answer:"B",explanation:"党的十九大报告明确指出，中国特色社会主义最本质的特征是中国共产党领导。"},{id:290,type:"single",subject:"subject1",module:"思想政治",question:"我国宪法规定，中华人民共和国的一切权力属于（  ）。",options:["公民","人民","人民代表大会","中国共产党"],answer:"B",explanation:"宪法第二条规定，中华人民共和国的一切权力属于人民。"},{id:291,type:"single",subject:"subject1",module:"思想政治",question:"推进文化自信自强，要推动中华优秀传统文化（  ）。",options:["全盘继承","创造性转化、创新性发展","照搬照抄","完全西化"],answer:"B",explanation:"推动中华优秀传统文化创造性转化、创新性发展。"},{id:292,type:"single",subject:"subject1",module:"思想政治",question:"中华民族伟大复兴中国梦的本质是（  ）。",options:["国家富强、民族振兴、人民幸福","经济高速增长","全面建成小康社会","实现社会主义现代化"],answer:"A",explanation:"中国梦的本质是国家富强、民族振兴、人民幸福。"},{id:293,type:"single",subject:"subject1",module:"思想政治",question:"中国共产党人的初心和使命是（  ）。",options:["实现社会主义现代化","为中国人民谋幸福、为中华民族谋复兴","全面建成小康社会","实现中华民族伟大复兴"],answer:"B",explanation:"中国共产党人的初心和使命就是为中国人民谋幸福、为中华民族谋复兴。"},{id:294,type:"single",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中，属于社会层面价值取向的是（  ）。",options:["富强、民主、文明、和谐","自由、平等、公正、法治","爱国、敬业、诚信、友善","创新、协调、绿色、开放"],answer:"B",explanation:"社会层面的价值取向是自由、平等、公正、法治。"},{id:295,type:"single",subject:"subject1",module:"思想政治",question:"新发展格局中，要构建以（  ）为主体、国内国际双循环相互促进的新发展格局。",options:["国内大循环","国际大循环","国际贸易","经济全球化"],answer:"A",explanation:"要构建以国内大循环为主体、国内国际双循环相互促进的新发展格局。"},{id:296,type:"single",subject:"subject1",module:"思想政治",question:"我国基本经济制度是（  ）。",options:["公有制为主体、多种所有制经济共同发展","纯公有制经济","纯私有制经济","混合所有制经济"],answer:"A",explanation:"我国实行公有制为主体、多种所有制经济共同发展的基本经济制度。"},{id:297,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义文化建设的灵魂是（  ）。",options:["马克思主义","中国特色社会主义理论体系","社会主义核心价值观","中华优秀传统文化"],answer:"C",explanation:"社会主义核心价值观是当代中国精神的集中体现，是中国特色社会主义文化建设的灵魂。"},{id:298,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义制度的最大优势是（  ）。",options:["人民当家作主","中国共产党领导","依法治国","民主集中制"],answer:"B",explanation:"中国共产党领导是中国特色社会主义制度的最大优势。"},{id:299,type:"single",subject:"subject1",module:"思想政治",question:"坚持和发展中国特色社会主义的总任务是实现（  ）。",options:["全面小康社会","社会主义现代化和中华民族伟大复兴","经济总量翻番","全面建成世界一流强国"],answer:"B",explanation:"坚持和发展中国特色社会主义的总任务是实现社会主义现代化和中华民族伟大复兴。"},{id:300,type:"single",subject:"subject1",module:"思想政治",question:"习近平总书记提出的'四个自信'是指道路自信、理论自信、制度自信和（  ）。",options:["文化自信","经济自信","军事自信","科技自信"],answer:"A",explanation:"'四个自信'包括道路自信、理论自信、制度自信、文化自信。"},{id:301,type:"single",subject:"subject1",module:"思想政治",question:"坚持党的领导、人民当家作主、依法治国有机统一的根本保证是（  ）。",options:["人民当家作主","依法治国","党的领导","三者并列"],answer:"C",explanation:"党的领导是人民当家作主和依法治国的根本保证。"},{id:302,type:"single",subject:"subject1",module:"思想政治",question:"建设社会主义文化强国，关键是（  ）。",options:["增强全民族文化创造活力","发展文化产业","提高经济增长速度","加强基础设施建设"],answer:"A",explanation:"建设社会主义文化强国，关键是增强全民族文化创造活力。"},{id:303,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义事业的总体布局是'五位一体'，不包括（  ）。",options:["经济建设","政治建设","文化建设","军事建设"],answer:"D",explanation:"'五位一体'包括经济建设、政治建设、文化建设、社会建设和生态文明建设。"},{id:304,type:"single",subject:"subject1",module:"思想政治",question:"马克思主义中国化的最新成果是（  ）。",options:["邓小平理论","'三个代表'重要思想","科学发展观","习近平新时代中国特色社会主义思想"],answer:"D",explanation:"习近平新时代中国特色社会主义思想是马克思主义中国化时代化的最新成果。"},{id:305,type:"single",subject:"subject1",module:"思想政治",question:"中华优秀传统文化是中华民族的（  ）和灵魂。",options:["根基","文化沃土","精神命脉","物质基础"],answer:"C",explanation:"中华优秀传统文化是中华民族的精神命脉和文化基因。"},{id:306,type:"single",subject:"subject1",module:"思想政治",question:"（  ）是检验真理的唯一标准。",options:["理论","实践","权威","经验"],answer:"B",explanation:"实践是检验真理的唯一标准，这是马克思主义认识论的核心观点。"},{id:307,type:"single",subject:"subject1",module:"思想政治",question:"新发展理念中的'绿色'注重解决的是（  ）问题。",options:["发展动力问题","发展不平衡问题","人与自然和谐共生问题","发展内外联动问题"],answer:"C",explanation:"绿色注重解决的是人与自然和谐共生问题。"},{id:308,type:"single",subject:"subject1",module:"思想政治",question:"推进社会主义文化强国建设，必须坚持（  ）的领导。",options:["政府","市场","中国共产党","文化企业"],answer:"C",explanation:"必须坚持中国共产党的领导，才能保证文化建设的正确方向。"},{id:309,type:"single",subject:"subject1",module:"思想政治",question:"我国的基本政治制度不包括（  ）。",options:["中国共产党领导的多党合作和政治协商制度","民族区域自治制度","基层群众自治制度","君主立宪制"],answer:"D",explanation:"我国基本政治制度包括多党合作和政治协商制度、民族区域自治制度和基层群众自治制度。"},{id:310,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于社会主义核心价值观国家层面价值目标的有（  ）。",options:["富强","民主","文明","和谐"],answer:["A","B","C","D"],explanation:"国家层面价值目标：富强、民主、文明、和谐。"},{id:311,type:"multi",subject:"subject1",module:"思想政治",question:"新发展理念包括（  ）。",options:["创新","协调","绿色","开放"],answer:["A","B","C","D"],explanation:"新发展理念：创新、协调、绿色、开放、共享。"},{id:312,type:"multi",subject:"subject1",module:"思想政治",question:"坚持中国特色社会主义文化自信，就要坚持（  ）。",options:["中国特色社会主义文化发展道路","马克思主义指导地位","全盘照搬西方文化","社会主义核心价值观引领文化建设"],answer:["A","B","D"],explanation:"文化自信不是全盘照搬西方文化。"},{id:313,type:"multi",subject:"subject1",module:"思想政治",question:"中国特色社会主义事业'五位一体'总体布局包括（  ）。",options:["经济建设","政治建设","文化建设","生态文明建设"],answer:["A","B","C","D"],explanation:"'五位一体'包括经济、政治、文化、社会和生态文明建设。"},{id:314,type:"multi",subject:"subject1",module:"思想政治",question:"习近平总书记强调的'四个意识'包括（  ）。",options:["政治意识","大局意识","核心意识","看齐意识"],answer:["A","B","C","D"],explanation:"'四个意识'：政治意识、大局意识、核心意识、看齐意识。"},{id:315,type:"multi",subject:"subject1",module:"思想政治",question:"中国特色社会主义文化的来源包括（  ）。",options:["中华优秀传统文化","革命文化","社会主义先进文化","西方文化"],answer:["A","B","C"],explanation:"中国特色社会主义文化源自中华优秀传统文化，熔铸于革命文化，发展于社会主义先进文化。"},{id:316,type:"multi",subject:"subject1",module:"思想政治",question:"以下属于社会主义核心价值观社会层面价值取向的有（  ）。",options:["自由","平等","公正","法治"],answer:["A","B","C","D"],explanation:"社会层面价值取向：自由、平等、公正、法治。"},{id:317,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于公民基本权利的有（  ）。",options:["选举权和被选举权","言论自由","人身自由","受教育权"],answer:["A","B","C","D"],explanation:"选举权、言论自由、人身自由、受教育权都是公民的基本权利。"},{id:318,type:"multi",subject:"subject1",module:"思想政治",question:"推进全面依法治国，要坚持（  ）有机统一。",options:["依法治国","依法执政","依法行政","依法办事"],answer:["A","B","C"],explanation:"全面依法治国要坚持依法治国、依法执政、依法行政有机统一。"},{id:319,type:"multi",subject:"subject1",module:"思想政治",question:"下列关于中华民族伟大复兴中国梦的表述正确的有（  ）。",options:["中国梦的本质是国家富强、民族振兴、人民幸福","中国梦归根到底是人民的梦","中国梦的实现需要全国各族人民的共同努力","中国梦只涉及经济领域"],answer:["A","B","C"],explanation:"中国梦不仅涉及经济，还涉及政治、文化、社会、生态等各领域。"},{id:320,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于宪法规定的公民基本义务的有（  ）。",options:["遵守宪法和法律","维护国家统一和民族团结","依法纳税","保卫祖国"],answer:["A","B","C","D"],explanation:"以上均为宪法规定的公民基本义务。"},{id:321,type:"multi",subject:"subject1",module:"思想政治",question:"关于我国社会主义民主政治，下列表述正确的有（  ）。",options:["人民当家作主是社会主义民主政治的本质特征","中国共产党领导是多党合作的首要前提","人民代表大会制度是我国的根本政治制度","协商民主是我国社会主义民主政治的特有形式"],answer:["A","B","C","D"],explanation:"四项表述均正确。"},{id:322,type:"multi",subject:"subject1",module:"思想政治",question:"中国特色社会主义法治体系包括（  ）。",options:["完备的法律规范体系","高效的法治实施体系","严密的法治监督体系","完善的党内法规体系"],answer:["A","B","C","D"],explanation:"中国特色社会主义法治体系包含五大体系。"},{id:323,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于社会主义核心价值观个人层面价值准则的有（  ）。",options:["爱国","敬业","诚信","友善"],answer:["A","B","C","D"],explanation:"个人层面价值准则：爱国、敬业、诚信、友善。"},{id:324,type:"multi",subject:"subject1",module:"思想政治",question:"习近平新时代中国特色社会主义思想明确的'十四个坚持'中，关于全面深化改革的要求包括（  ）。",options:["坚持全面深化改革","坚持新发展理念","坚持人民当家作主","坚持全面依法治国"],answer:["A","B"],explanation:"全面深化改革和新发展理念都属于'十四个坚持'的内容。"},{id:325,type:"multi",subject:"subject1",module:"思想政治",question:"推动中华优秀传统文化创造性转化、创新性发展，需要做到（  ）。",options:["使中华民族最基本的文化基因与当代文化相适应","与现代社会相协调","完全抛弃传统文化","以人们喜闻乐见、具有广泛参与性的方式推广"],answer:["A","B","D"],explanation:"推动传统文化发展不是完全抛弃，而是创造性转化。"},{id:326,type:"multi",subject:"subject1",module:"思想政治",question:"关于'两个一百年'奋斗目标，下列表述正确的有（  ）。",options:["到建党一百年时全面建成小康社会","到建国一百年时全面建成社会主义现代化强国","实现中华民族伟大复兴","实现共产主义"],answer:["A","B","C"],explanation:"'两个一百年'奋斗目标到2049年时建成社会主义现代化强国，实现中华民族伟大复兴。"},{id:327,type:"multi",subject:"subject1",module:"思想政治",question:"推进社会主义文化强国建设，需要（  ）。",options:["坚定文化自信","坚持马克思主义在意识形态领域的指导地位","培育和践行社会主义核心价值观","推动文化事业和文化产业发展"],answer:["A","B","C","D"],explanation:"以上均为推进社会主义文化强国建设的重要举措。"},{id:328,type:"judge",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，任何单位或者个人不得伪造、变造、出租、出借、买卖营业性演出许可证。",answer:"correct",options:["正确","错误"],explanation:"《条例》明确规定不得伪造、变造、出租、出借、买卖营业性演出许可证。"},{id:329,type:"judge",subject:"subject1",module:"法律法规",question:"演出场所经营单位为营业性演出活动提供演出场地，应当核验演出举办单位的消防安全合格证明。",answer:"wrong",options:["正确","错误"],explanation:"应当核验演出举办单位的营业性演出许可证和消防安全责任书等批准文件。"},{id:330,type:"judge",subject:"subject1",module:"法律法规",question:"根据《著作权法》，作者的署名权、修改权、保护作品完整权的保护期不受时间限制。",answer:"correct",options:["正确","错误"],explanation:"著作人身权中的署名权、修改权、保护作品完整权没有保护期限制。"},{id:331,type:"judge",subject:"subject1",module:"法律法规",question:"营业性演出广告的内容应当真实、合法，不得误导、欺骗观众。",answer:"correct",options:["正确","错误"],explanation:"《条例》规定演出广告应当真实合法，不得含有虚假内容。"},{id:332,type:"judge",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，演出经纪机构可以超出批准的业务范围从事演出经纪活动。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪机构应当在批准的业务范围内从事演出经纪活动。"},{id:333,type:"judge",subject:"subject1",module:"法律法规",question:"未经批准举办营业性演出的，由县级人民政府文化主管部门责令停止演出，没收违法所得，并处违法所得8倍以上10倍以下的罚款。",answer:"wrong",options:["正确","错误"],explanation:"处违法所得8倍以上10倍以下罚款，没有违法所得的处5万元以上10万元以下罚款。"},{id:334,type:"judge",subject:"subject1",module:"法律法规",question:"外国投资者可以在中国境内设立演出经纪机构和演出场所经营单位。",answer:"wrong",options:["正确","错误"],explanation:"外国投资者不得设立演出经纪机构，演出场所经营单位的设立有专门规定。"},{id:335,type:"judge",subject:"subject1",module:"法律法规",question:"根据《大型群众性活动安全管理条例》，大型群众性活动的预计参加人数达到1000人以上的应当申请安全许可。",answer:"wrong",options:["正确","错误"],explanation:"预计参加人数达到1000人以上的体育比赛活动才需申请，其他活动是达到2000人以上需申请。"},{id:336,type:"judge",subject:"subject1",module:"法律法规",question:"根据《反不正当竞争法》，经营者不得实施混淆行为，引人误认为是他人商品或者与他人存在特定联系。",answer:"correct",options:["正确","错误"],explanation:"反不正当竞争法禁止混淆行为。"},{id:337,type:"judge",subject:"subject1",module:"法律法规",question:"演出举办单位在演出期间发生事故的，应当立即启动应急预案，并向所在地县级人民政府文化主管部门报告。",answer:"correct",options:["正确","错误"],explanation:"演出举办单位应当制定应急预案，事故发生后立即启动并报告。"},{id:338,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，设立演出经纪机构，应当向所在地（ ）文化主管部门提出申请。",options:["县级","省级","市级","乡级"],answer:"B",explanation:"设立演出经纪机构应当向省级文化主管部门提出申请。"},{id:339,type:"single",subject:"subject1",module:"法律法规",question:"营业性演出许可证的有效期为（  ）。",options:["1年","2年","3年","5年"],answer:"B",explanation:"营业性演出许可证的有效期为2年。"},{id:340,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，公民作品的发表权保护期为作者终生及其死亡后（  ）年。",options:["30","50","60","70"],answer:"B",explanation:"公民作品的发表权保护期为作者终生及其死亡后50年。"},{id:341,type:"single",subject:"subject1",module:"法律法规",question:"举办营业性涉外演出，应当向（ ）提出申请。",options:["省级文化主管部门","文化部","县级文化主管部门","市级文化主管部门"],answer:"A",explanation:"举办涉外演出应当向省级文化主管部门提出申请。"},{id:342,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，擅自举办营业性演出的，没有违法所得的，处（ ）罚款。",options:["1万元以上3万元以下","3万元以上5万元以下","5万元以上10万元以下","10万元以上20万元以下"],answer:"C",explanation:"没有违法所得的处5万元以上10万元以下罚款。"},{id:343,type:"single",subject:"subject1",module:"法律法规",question:"根据《反不正当竞争法》，经营者不得采用财物或者其他手段贿赂（  ）。",options:["消费者","交易相对方的工作人员","竞争对手","政府部门"],answer:"B",explanation:"经营者不得采用财物或其他手段贿赂交易相对方的工作人员。"},{id:344,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，表演者权保护期为首次表演后（  ）年。",options:["30","50","60","70"],answer:"B",explanation:"表演者权的保护期为50年，截止于首次表演后第50年的12月31日。"},{id:345,type:"single",subject:"subject1",module:"法律法规",question:"演出场所经营单位应当在领取营业执照之日起（ ）日内向所在地省级文化主管部门备案。",options:["10","20","30","60"],answer:"B",explanation:"演出场所经营单位应在领取营业执照之日起20日内备案。"},{id:346,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，营业性演出需要变更演员的，应当重新报批，但（ ）除外。",options:["主要演员变更","增加演出场次","因不可抗力变更","更换主持人"],answer:"B",explanation:"增加演出场次不需要重新报批。"},{id:347,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，（  ）是指以文字、符号、数字等方式对作品进行固定。",options:["发表","复制","出版","署名"],answer:"B",explanation:"复制权是以印刷、复印、录音录像等方式将作品制作一份或多份的权利。"},{id:348,type:"single",subject:"subject1",module:"法律法规",question:"根据《大型群众性活动安全管理条例》，大型群众性活动的承办者应当在活动举办日的（ ）日前提出安全许可申请。",options:["10","15","20","30"],answer:"C",explanation:"承办者应当在活动举办日的20日前提出安全许可申请。"},{id:349,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，募捐义演的收入应当（  ）。",options:["归演出举办单位所有","全部捐赠公益事业","扣除成本后捐赠","按比例分配"],answer:"B",explanation:"募捐义演的演出收入应当全部用于捐赠公益事业。"},{id:350,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，下列不属于著作权的是（  ）。",options:["发表权","署名权","姓名权","修改权"],answer:"C",explanation:"姓名权属于人格权，不属于著作权。"},{id:351,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，演出举办单位应当为演出场所（  ）投保。",options:["公众责任险","财产险","人身意外险","工伤保险"],answer:"A",explanation:"演出举办单位应当为演出场所投保公众责任险。"},{id:352,type:"single",subject:"subject1",module:"法律法规",question:"根据《消防法》，消防安全重点单位应当（ ）至少进行一次防火检查。",options:["每月","每季度","每半年","每年"],answer:"C",explanation:"消防安全重点单位应当每半年至少进行一次防火检查。"},{id:353,type:"single",subject:"subject1",module:"法律法规",question:"根据《著作权法》，作品登记的效力是（  ）。",options:["取得著作权的必要条件","著作权的初步证明","获得法律保护的唯一依据","自动取得著作权"],answer:"B",explanation:"作品登记可以作为著作权归属的初步证明，著作权自作品创作完成之日起自动产生。"},{id:354,type:"single",subject:"subject1",module:"法律法规",question:"演出经纪人员资格证书有效期为（  ）。",options:["1年","2年","3年","5年"],answer:"D",explanation:"演出经纪人员资格证书有效期为5年。"},{id:355,type:"single",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，演出广告不得含有（  ）的内容。",options:["演出时间","演出地点","虚假宣传","演员阵容"],answer:"C",explanation:"演出广告不得含有虚假内容，不得误导、欺骗观众。"},{id:356,type:"multi",subject:"subject1",module:"法律法规",question:"根据《著作权法》，下列属于著作财产权的有（  ）。",options:["复制权","发行权","表演权","署名权"],answer:["A","B","C"],explanation:"署名权属于著作人身权，不属于财产权。"},{id:357,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，申请举办营业性演出应当提交的材料包括（  ）。",options:["演出申请书","与演出有关的各类证明","安全保卫工作方案和灭火、应急疏散预案","资金安排计划书"],answer:["A","B","C","D"],explanation:"以上均为申请举办营业性演出应提交的材料。"},{id:358,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，下列属于禁止演出内容的情形有（  ）。",options:["危害社会公德的","煽动民族仇恨的","宣扬邪教的","侮辱他人的"],answer:["A","B","C","D"],explanation:"四项均为《条例》明令禁止的演出内容。"},{id:359,type:"multi",subject:"subject1",module:"法律法规",question:"根据《反不正当竞争法》，下列属于不正当竞争行为的有（  ）。",options:["虚假宣传","商业贿赂","侵犯商业秘密","正当的市场竞争"],answer:["A","B","C"],explanation:"正当的市场竞争不属于不正当竞争行为。"},{id:360,type:"multi",subject:"subject1",module:"法律法规",question:"根据《著作权法》，著作权人享有的权利包括（  ）。",options:["发表权","署名权","修改权","保护作品完整权"],answer:["A","B","C","D"],explanation:"四项均为著作权人享有的著作人身权。"},{id:361,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，营业性演出不得有（  ）情形。",options:["以假唱欺骗观众","为演员提供虚假信息","扰乱演出秩序","以上都是"],answer:["A","B","C"],explanation:"根据条例规定，演出中不得假唱、提供虚假信息或扰乱秩序。"},{id:362,type:"multi",subject:"subject1",module:"法律法规",question:"根据《大型群众性活动安全管理条例》，承办者提交安全许可申请时应当提交（  ）。",options:["承办者合法成立的证明文件","安全责任人的身份证明","活动方案","灭火、应急疏散预案"],answer:["A","B","C","D"],explanation:"以上均为承办者应提交的安全许可申请材料。"},{id:363,type:"multi",subject:"subject1",module:"法律法规",question:"根据《著作权法》，下列受著作权法保护的作品有（  ）。",options:["文字作品","音乐作品","舞蹈作品","杂技艺术作品"],answer:["A","B","C","D"],explanation:"以上均属于著作权法保护的客体。"},{id:364,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，演出举办单位应当履行的义务包括（  ）。",options:["核验演出场所安全消防设施","为演出场所投保公众责任险","维护演出秩序","为演员购买保险"],answer:["A","B","C"],explanation:"为演员购买保险不是演出举办单位的法定义务。"},{id:365,type:"multi",subject:"subject1",module:"法律法规",question:"根据《合同法》，合同订立应当遵循（  ）原则。",options:["平等原则","自愿原则","公平原则","诚实信用原则"],answer:["A","B","C","D"],explanation:"四项均为合同订立应遵循的基本原则。"},{id:366,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，演出场所经营单位应当（  ）。",options:["确保演出场所符合安全标准","定期检查消防设施","配合做好安全保卫工作","审批演出内容"],answer:["A","B","C"],explanation:"审批演出内容是文化主管部门的职责，不是演出场所的义务。"},{id:367,type:"multi",subject:"subject1",module:"法律法规",question:"根据《消防法》，消防安全重点单位应当履行的职责包括（  ）。",options:["确定消防安全管理人","建立消防档案","实行每日防火巡查","组织防火检查"],answer:["A","B","C","D"],explanation:"四项均为消防安全重点单位应履行的职责。"},{id:368,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，下列属于演出经纪机构业务范围的有（  ）。",options:["演出项目的策划","演出活动的组织","演出票务的代理","直接从事演出表演"],answer:["A","B","C"],explanation:"演出经纪机构不直接从事演出表演，而是从事中介服务。"},{id:369,type:"multi",subject:"subject1",module:"法律法规",question:"根据《著作权法》，著作权中保护期为50年的权利包括（  ）。",options:["发表权","表演权","广播权","信息网络传播权"],answer:["B","C","D"],explanation:"发表权的保护期视不同主体而定，表演权、广播权、信息网络传播权保护期为50年。"},{id:370,type:"multi",subject:"subject1",module:"法律法规",question:"根据《营业性演出管理条例》，对擅自举办营业性演出的处罚措施包括（  ）。",options:["责令停止演出","没收违法所得","罚款","吊销许可证"],answer:["A","B","C","D"],explanation:"以上均可作为擅自举办营业性演出的处罚措施。"},{id:371,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所不得设在居民楼、博物馆、图书馆和被核定为文物保护单位的建筑物内。",answer:"correct",options:["正确","错误"],explanation:"《娱乐场所管理条例》对娱乐场所的设立地点有严格限制。"},{id:372,type:"judge",subject:"subject1",module:"文化市场法规",question:"互联网文化单位应当对提供的文化产品进行审查，不得含有违反法律法规的内容。",answer:"correct",options:["正确","错误"],explanation:"互联网文化单位负有内容审查的主体责任。"},{id:373,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《互联网上网服务营业场所管理条例》，互联网上网服务营业场所可以接纳未成年人进入营业场所。",answer:"wrong",options:["正确","错误"],explanation:"互联网上网服务营业场所不得接纳未成年人进入。"},{id:374,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例实施细则》，营业性演出活动的名称应当包含演出举办单位名称、演出内容和演出地点。",answer:"wrong",options:["正确","错误"],explanation:"演出名称只需体现演出内容，不强制包含举办单位和地点。"},{id:375,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《网络表演经营活动管理办法》，从事网络表演经营活动应当取得网络文化经营许可证。",answer:"correct",options:["正确","错误"],explanation:"从事网络表演经营活动需要取得相应的许可证。"},{id:376,type:"judge",subject:"subject1",module:"文化市场法规",question:"演出市场的文化产品具有商品属性，同时也具有意识形态属性。",answer:"correct",options:["正确","错误"],explanation:"文化产品既具有商品属性，又具有意识形态属性。"},{id:377,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，未经批准擅自出售演出门票的，由公安机关予以处罚。",answer:"wrong",options:["正确","错误"],explanation:"未经批准售票的违法行为由文化主管部门予以处罚。"},{id:378,type:"judge",subject:"subject1",module:"文化市场法规",question:"文化市场综合执法机构可以对演出场所进行日常巡查和检查。",answer:"correct",options:["正确","错误"],explanation:"文化市场综合执法机构有权对演出市场进行日常监管。"},{id:379,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出活动的安全责任由演出场所经营单位承担。",answer:"wrong",options:["正确","错误"],explanation:"安全责任由演出举办单位承担，演出场所经营单位负保障义务。"},{id:380,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，互联网文化产品包括网络音乐、网络表演、网络艺术品等。",answer:"correct",options:["正确","错误"],explanation:"互联网文化产品涵盖网络音乐、网络表演、网络艺术品等多种形式。"},{id:381,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所每日凌晨2时至上午8时不得营业。",options:["正确","错误"],answer:"A",explanation:"娱乐场所的营业时间有限制。"},{id:382,type:"single",subject:"subject1",module:"文化市场法规",question:"互联网上网服务营业场所的最低营业时间限制是（  ）。",options:["无限制","不得在8时至18时营业","不得在法定节假日营业","不得在凌晨2时至8时营业"],answer:"B",explanation:"互联网上网服务营业场所在8时至18时不得接纳未成年人，但对营业时间无此限制。"},{id:383,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出不得（  ）。",options:["向观众出售门票","利用人体缺陷招徕观众","举办跨省巡回演出","进行线上直播"],answer:"B",explanation:"利用人体缺陷招徕观众是被明令禁止的。"},{id:384,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，进口互联网文化产品应当报（  ）进行内容审查。",options:["文化部","省级文化主管部门","商务部","工信部"],answer:"A",explanation:"进口互联网文化产品应当报文化部进行内容审查。"},{id:385,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例实施细则》，个体演员和个体演出经纪人备案后，文化主管部门应当（  ）。",options:["发放许可证","予以公告","收取费用","进行考试"],answer:"B",explanation:"备案后文化主管部门应当予以公告。"},{id:386,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场综合执法的范围不包括（  ）。",options:["营业性演出","娱乐场所","餐饮服务","互联网文化"],answer:"C",explanation:"餐饮服务不属于文化市场综合执法范围。"},{id:387,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，设立娱乐场所应当向（ ）申请娱乐经营许可证。",options:["文化主管部门","工商行政部门","公安部门","消防部门"],answer:"A",explanation:"设立娱乐场所应向文化主管部门申请娱乐经营许可证。"},{id:388,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《网络表演经营活动管理办法》，网络表演平台应当配备（  ）管理人员。",options:["内容审核","财务","法律","技术"],answer:"A",explanation:"网络表演平台应当配备内容审核管理人员。"},{id:389,type:"single",subject:"subject1",module:"文化市场法规",question:"文化产品与一般商品的区别在于（  ）。",options:["价格更高","具有意识形态属性","质量更好","产量更大"],answer:"B",explanation:"文化产品除了商品属性外，还具有意识形态属性。"},{id:390,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，擅自变更演出内容的，由文化主管部门处以（ ）罚款。",options:["1万元以上3万元以下","3万元以上5万元以下","5万元以上10万元以下","10万元以上"],answer:"C",explanation:"擅自变更演出内容处5万元以上10万元以下罚款。"},{id:391,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网上网服务营业场所管理条例》，网吧经营单位应当对上网消费者的身份证等有效证件进行（  ）。",options:["登记","复印","拍照","扫描"],answer:"A",explanation:"网吧应当对上网消费者的有效证件进行核对、登记。"},{id:392,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出举办单位应当在演出前向观众公布（  ）。",options:["演出曲目","演员阵容","演出票价","以上都是"],answer:"D",explanation:"演出举办单位应当向观众公布演员、节目、票价等信息。"},{id:393,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，因假唱被查处的，演出举办单位将被处以（ ）罚款。",options:["1万元以上3万元以下","3万元以上5万元以下","5万元以上10万元以下","10万元以上"],answer:"C",explanation:"假唱行为处5万元以上10万元以下罚款。"},{id:394,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所不得在居民住宅区内设立，距学校最小距离为（  ）。",options:["100米","200米","500米","1000米"],answer:"B",explanation:"娱乐场所距学校不得少于200米。"},{id:395,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出经纪人资格证书的申请人应当（  ）。",options:["具有高中以上学历","具有大学本科以上学历","无年龄限制","必须有演出行业从业经历"],answer:"A",explanation:"演出经纪人员资格考试对学历要求为高中以上。"},{id:396,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场管理的核心目标是（  ）。",options:["经济效益最大化","保障文化安全和人民文化权益","限制文化消费","增加税收"],answer:"B",explanation:"文化市场管理的核心是保障文化安全和人民文化权益。"},{id:397,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出场所经营单位应当配备（  ）。",options:["专职消防安全管理人员","专业演员","演出策划人员","票务人员"],answer:"A",explanation:"演出场所应当配备专职消防安全管理人员。"},{id:398,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《网络文化经营活动管理暂行规定》，网络文化经营许可证有效期为（  ）年。",options:["1","2","3","5"],answer:"C",explanation:"网络文化经营许可证有效期为3年。"},{id:399,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，下列属于演出场所经营单位义务的是（  ）。",options:["审批演出内容","确保场所安全设施正常运行","审核演员资质","制定演出方案"],answer:"B",explanation:"演出场所经营单位的义务是确保安全设施正常运行。"},{id:400,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出的受众对象不包括（  ）。",options:["个人观众","企业团体","政府机关","以上均可以"],answer:"D",explanation:"营业性演出的观众可以包括个人、企业和政府机关等。"},{id:401,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，自办网络文化活动的单位应当依法取得（  ）。",options:["营业执照","网络文化经营许可证","ICP备案即可","不需要审批"],answer:"B",explanation:"从事互联网文化活动应当取得网络文化经营许可证。"},{id:402,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场中的政府监管不包括（  ）。",options:["政策制定","执法检查","直接经营","标准设定"],answer:"C",explanation:"政府监管包括政策制定、执法检查和标准设定，不包括直接经营。"},{id:403,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出不得有下列行为（  ）。",options:["假唱","假演奏","以上都是","以上都不是"],answer:["A","B","C"],explanation:"假唱和假演奏均为禁止行为。"},{id:404,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场综合执法机构依法对以下哪些场所进行监管（  ）。",options:["营业性演出场所","娱乐场所","互联网上网服务营业场所","网络表演平台"],answer:["A","B","C","D"],explanation:"以上均为文化市场综合执法的监管范围。"},{id:405,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出举办单位应当履行的义务包括（  ）。",options:["制定安全保卫方案","核验场所安全设施","购买公众责任险","审批演出内容"],answer:["A","B","C"],explanation:"审批演出内容是文化主管部门的职能。"},{id:406,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，互联网文化单位不得提供含有（  ）内容的文化产品。",options:["违反宪法确定的制度的","危害国家统一的","煽动民族仇恨的","宣传正能量的"],answer:["A","B","C"],explanation:"宣传正能量的内容是鼓励的。"},{id:407,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场的基本特征包括（  ）。",options:["具有商品属性和意识形态属性双重属性","受政策法规调控","具有区域差异性","完全由市场自发调节"],answer:["A","B","C"],explanation:"文化市场不是完全由市场自发调节的。"},{id:408,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所经营者不得有下列行为（  ）。",options:["贩卖毒品","设置赌博机","组织淫秽表演","播放健康音乐"],answer:["A","B","C"],explanation:"播放健康音乐是正常的经营活动。"},{id:409,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出场所应当具备的条件包括（  ）。",options:["符合安全标准","符合消防规范","有必要的设施设备","必须有LED大屏"],answer:["A","B","C"],explanation:"LED大屏不是演出场所的必备条件。"},{id:410,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《网络表演经营活动管理办法》，网络表演经营活动的监管要求包括（  ）。
