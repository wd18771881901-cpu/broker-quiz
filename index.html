",options:["表演者实名注册","内容审核","建立值班制度","保存表演记录"],answer:["A","B","C","D"],explanation:"以上均为网络表演经营活动的监管要求。"},{id:411,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场行政管理的方式包括（  ）。",options:["行政许可","行政处罚","行政强制","行政指导"],answer:["A","B","C","D"],explanation:"以上均为文化市场行政管理的常见方式。"},{id:412,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《互联网上网服务营业场所管理条例》，互联网上网服务营业场所应当遵守的规定有（  ）。",options:["不得接纳未成年人","核对登记身份证件","安装安全管理系统","24小时营业"],answer:["A","B","C"],explanation:"24小时营业不是强制要求。"},{id:413,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出活动的安全责任主体包括（  ）。",options:["演出举办单位","演出场所经营单位","演出经纪机构","公安部门"],answer:["A","B"],explanation:"安全责任主要由演出举办单位和演出场所经营单位承担。"},{id:414,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场监管的法律法规体系包括（  ）。",options:["《营业性演出管理条例》","《娱乐场所管理条例》","《互联网文化管理暂行规定》","《消费者权益保护法》"],answer:["A","B","C","D"],explanation:"以上均为文化市场监管相关法律法规。"},{id:415,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，变更营业性演出项目内容需要重新审批的情形包括（  ）。",options:["变更演出节目内容","变更主要演员","增加演出场次","变更演出时间"],answer:["A","B","D"],explanation:"增加演出场次不需要重新审批。"},{id:416,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，设立娱乐场所应当符合的条件包括（  ）。",options:["有合适的经营场所","有符合规定的设施","取得消防审批","不需要任何审批"],answer:["A","B","C"],explanation:"设立娱乐场所需要多项审批和符合条件。"},{id:417,type:"multi",subject:"subject1",module:"文化市场法规",question:"互联网文化市场的主要特点包括（  ）。",options:["传播速度快","覆盖范围广","监管难度大","无任何风险"],answer:["A","B","C"],explanation:"互联网文化市场存在监管难度大的特点。"},{id:418,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人的核心职能是为演出项目提供中介服务并获取佣金。",answer:"correct",options:["正确","错误"],explanation:"演出经纪人的核心职能是中介服务。"},{id:419,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪合同一旦签订，就绝对不能变更或解除。",answer:"wrong",options:["正确","错误"],explanation:"合同可以依法变更、转让和解除。"},{id:420,type:"judge",subject:"subject2",module:"经纪实务",question:"佣金是经纪人从事经纪活动的合法收入，与回扣在性质上不同。",answer:"correct",options:["正确","错误"],explanation:"佣金是合法的经纪报酬，回扣是不正当的利益输送。"},{id:421,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人可以只代表演出方，不能同时代表演出场所方。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人可以在合规前提下为多方提供服务。"},{id:422,type:"judge",subject:"subject2",module:"经纪实务",question:"演出项目的宣传方案应当根据目标受众特点制定有针对性的推广策略。",answer:"correct",options:["正确","错误"],explanation:"宣传方案需要针对目标受众特点精准推广。"},{id:423,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人在谈判中应当充分了解双方需求，寻求利益平衡点。",answer:"correct",options:["正确","错误"],explanation:"经纪人需要平衡各方利益促成交易。"},{id:424,type:"judge",subject:"subject2",module:"经纪实务",question:"演出票务的销售价格可以随意定价，不受任何限制。",answer:"wrong",options:["正确","错误"],explanation:"演出票价应当合理定价，不得囤票炒票。"},{id:425,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪活动中的合同应当采用书面形式订立。",answer:"correct",options:["正确","错误"],explanation:"根据规定，演出经纪合同应当以书面形式订立。"},{id:426,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人在签订合同时应当审核对方的主体资格和履约能力。",answer:"correct",options:["正确","错误"],explanation:"签订合同时应审查对方资质，防范交易风险。"},{id:427,type:"judge",subject:"subject2",module:"经纪实务",question:"演出项目的宣传费用越高，宣传效果就一定越好。",answer:"wrong",options:["正确","错误"],explanation:"宣传效果取决于策略和执行，不是单纯靠费用。"},{id:428,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪人不需要了解市场需求和观众偏好。",answer:"wrong",options:["正确","错误"],explanation:"了解市场需求和观众偏好是经纪人的基本能力。"},{id:429,type:"judge",subject:"subject2",module:"经纪实务",question:"演出项目巡演时，各地票房收入不需要单独核算。",answer:"wrong",options:["正确","错误"],explanation:"巡演各地票房应当分别核算，以便进行项目管理。"},{id:430,type:"judge",subject:"subject2",module:"经纪实务",question:"演出经纪合同中应当明确约定佣金的比例和支付方式。",answer:"correct",options:["正确","错误"],explanation:"佣金比例和支付方式是经纪合同的重要条款。"},{id:431,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人在经纪活动中获取报酬的主要形式是（  ）。",options:["工资","佣金","分红","奖金"],answer:"B",explanation:"佣金是演出经纪人的主要报酬形式。"},{id:432,type:"single",subject:"subject2",module:"经纪实务",question:"下列不属于演出经纪人基本素质要求的是（  ）。",options:["法律知识","沟通协调能力","舞台表演技能","市场分析能力"],answer:"C",explanation:"舞台表演技能不是经纪人的必备素质。"},{id:433,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪合同中最重要的条款是（  ）。",options:["字体大小","佣金条款","纸张质量","打印方式"],answer:"B",explanation:"佣金条款是经纪合同中最核心的条款。"},{id:434,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目定价时应考虑的首要因素是（  ）。",options:["场地租金","市场需求","经纪人的偏好","演员的要求"],answer:"B",explanation:"市场需求是定价的首要考虑因素。"},{id:435,type:"single",subject:"subject2",module:"经纪实务",question:"根据《经纪人管理办法》，经纪人从事经纪活动应当遵循的原则不包括（  ）。",options:["自愿","公平","诚实信用","利润最大化"],answer:"D",explanation:"利润最大化不是经纪活动的法定原则。"},{id:436,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人收到当事人佣金后应当（  ）。",options:["据为己有","开具发票并依法纳税","全部上交公司","分给同事"],answer:"B",explanation:"收取佣金应当开具发票并依法纳税。"},{id:437,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目推广时，首先应当确定的是（  ）。",options:["宣传预算","目标受众","宣传渠道","宣传时间"],answer:"B",explanation:"首先确定目标受众，再制定有针对性的推广方案。"},{id:438,type:"single",subject:"subject2",module:"经纪实务",question:"下列属于演出经纪人执业规范的是（  ）。",options:["向当事人隐瞒交易信息","如实向当事人报告经纪业务进展","同时代理双方进行私下交易","收取额外好处费"],answer:"B",explanation:"如实报告业务进展是经纪人的执业规范。"},{id:439,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪活动中，信息费与佣金的区别在于（  ）。",options:["金额不同","性质不同","支付方式不同","没有区别"],answer:"B",explanation:"信息费是提供信息的报酬，佣金是完成经纪业务的报酬，性质不同。"},{id:440,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目的可行性分析不包括（  ）。",options:["市场分析","成本预算","经纪人的个人喜好","风险评估"],answer:"C",explanation:"经纪人个人喜好不属于可行性分析的范畴。"},{id:441,type:"single",subject:"subject2",module:"经纪实务",question:"根据合同法，经纪合同属于（  ）。",options:["买卖合同","委托合同或居间合同","赠与合同","劳动合同"],answer:"B",explanation:"经纪合同本质上属于委托合同或居间合同。"},{id:442,type:"single",subject:"subject2",module:"经纪实务",question:"演出经纪人进行市场调研时，应当收集的信息包括（  ）。",options:["观众消费习惯","竞品演出情况","市场价格水平","以上都是"],answer:"D",explanation:"以上均为市场调研应收集的信息。"},{id:443,type:"single",subject:"subject2",module:"经纪实务",question:"演出项目谈判中，经纪人首先应当（  ）。",options:["直接报价","了解对方需求","威胁对方","拒绝谈判"],answer:"B",explanation:"谈判首先应当了解对方需求和底线。"},{id:444,type:"single",subject:"subject2",module:"经纪实务",question:"演出票务管理中 买演出版权","管理演出场所"],answer:"B",explanation:"居间是为委托人提供订立合同的机会或媒介服务。"},{id:456,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人的主要业务包括（  ）。",options:["演出项目策划","艺人经纪","票务代理","舞台表演"],answer:["A","B","C"],explanation:"舞台表演不是经纪人的业务范围。"},{id:457,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪合同的必要条款包括（  ）。",options:["双方当事人信息","经纪项目内容","佣金条款","违约责任"],answer:["A","B","C","D"],explanation:"以上均为经纪合同的必要条款。"},{id:458,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人应当具备的专业素质包括（  ）。",options:["法律知识","市场分析能力","沟通协调能力","舞台表演能力"],answer:["A","B","C"],explanation:"舞台表演能力不是经纪人必须具备的素质。"},{id:459,type:"multi",subject:"subject2",module:"经纪实务",question:"演出项目可行性分析应包括（  ）。",options:["市场需求分析","成本收益预算","风险评估","经纪人个人兴趣"],answer:["A","B","C"],explanation:"经纪人个人兴趣不属于可行性分析的内容。"},{id:460,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪活动中的不正当竞争行为包括（  ）。",options:["虚假宣传","商业诽谤","恶意串通","正当竞争"],answer:["A","B","C"],explanation:"正当竞争不属于不正当竞争行为。"},{id:461,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪合同可以解除的情形包括（  ）。",options:["双方协商一致","一方严重违约","不可抗力","经纪人单方面决定"],answer:["A","B","C"],explanation:"经纪人不能单方面随意解除合同。"},{id:462,type:"multi",subject:"subject2",module:"经纪实务",question:"演出项目推广的主要渠道包括（  ）。",options:["社交媒体","传统媒体","户外广告","口碑传播"],answer:["A","B","C","D"],explanation:"以上均为常见的演出推广渠道。"},{id:463,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人进行市场调研的途径包括（  ）。",options:["问卷调查","访谈","数据分析","凭感觉判断"],answer:["A","B","C"],explanation:"凭感觉不是科学的市场调研方法。"},{id:464,type:"multi",subject:"subject2",module:"经纪实务",question:"演出票务管理中需要关注的问题有（  ）。",options:["票价制定","票务分销","防伪措施","退换票政策"],answer:["A","B","C","D"],explanation:"以上均为票务管理需要关注的方面。"},{id:465,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪合同纠纷的解决方式包括（  ）。",options:["协商","调解","仲裁","诉讼"],answer:["A","B","C","D"],explanation:"以上均为合法的纠纷解决方式。"},{id:466,type:"multi",subject:"subject2",module:"经纪实务",question:"演出项目成本构成通常包括（  ）。",options:["艺人出场费","场地租赁费","宣传推广费","票务印刷费"],answer:["A","B","C","D"],explanation:"以上均为演出项目成本的组成部分。"},{id:467,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人执业规范要求经纪人不得（  ）。",options:["向当事人隐瞒重要信息","收取约定之外的报酬","利用虚假信息诱使交易","依法收取佣金"],answer:["A","B","C"],explanation:"依法收取佣金是合法的执业行为。"},{id:468,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪活动中，佣金支付方式可以是（  ）。",options:["按固定金额支付","按比例支付","按场次支付","不支付佣金"],answer:["A","B","C"],explanation:"不支付佣金不符合经纪活动的基本原则。"},{id:469,type:"multi",subject:"subject2",module:"经纪实务",question:"演出项目的风险控制措施包括（  ）。",options:["购买保险","制定应急预案","合理预算","不做任何准备"],answer:["A","B","C"],explanation:"不做准备不能有效控制风险。"},{id:470,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人在代理境外艺人时需要处理的事项包括（  ）。",options:["办理工作签证","演出审批","合同翻译","安排住宿交通"],answer:["A","B","C","D"],explanation:"以上均为代理境外艺人时需要处理的事项。"},{id:471,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪活动中，合同的订立应当遵循（  ）原则。",options:["平等自愿","公平","诚实信用","欺诈对方"],answer:["A","B","C"],explanation:"欺诈违反了合同订立的基本原则。"},{id:472,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人应当为客户保密的信息包括（  ）。",options:["商业计划","个人隐私","财务信息","所有信息都公开"],answer:["A","B","C"],explanation:"经纪人应当为客户保密相关信息。"},{id:473,type:"multi",subject:"subject2",module:"经纪实务",question:"演出项目成功的关键因素包括（  ）。",options:["优质的演出内容","合理的价格策略","有效的宣传推广","良好的观众体验"],answer:["A","B","C","D"],explanation:"以上均为演出项目成功的关键因素。"},{id:474,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪人需要了解的法律法规包括（  ）。",options:["《营业性演出管理条例》","《著作权法》","《合同法》","《经纪人管理办法》"],answer:["A","B","C","D"],explanation:"以上均为演出经纪人应了解的法律法规。"},{id:475,type:"multi",subject:"subject2",module:"经纪实务",question:"演出经纪业务的流程一般包括（  ）。",options:["项目策划","合同签订","项目执行","项目总结"],answer:["A","B","C","D"],explanation:"以上均为经纪业务的基本流程。"},{id:476,type:"judge",subject:"subject2",module:"演出管理",question:"演出项目管理中，舞美设计是舞台视觉效果的重要组成部分。",answer:"correct",options:["正确","错误"],explanation:"舞美设计直接影响舞台的视觉呈现效果。"},{id:477,type:"judge",subject:"subject2",module:"演出管理",question:"舞台灯光中，追光灯主要用于照亮整个舞台。",answer:"wrong",options:["正确","错误"],explanation:"追光灯用于追踪特定演员，不是照亮整个舞台。"},{id:478,type:"judge",subject:"subject2",module:"演出管理",question:"演出场地的安全疏散通道在演出期间可以临时堆放杂物。",answer:"wrong",options:["正确","错误"],explanation:"安全疏散通道在任何时候都不得堆放杂物。"},{id:479,type:"judge",subject:"subject2",module:"演出管理",question:"舞台的硬景是指可以折叠、卷起的布景。",answer:"wrong",options:["正确","错误"],explanation:"硬景是用木板、金属等硬质材料制作的立体布景，软景才是可折叠的。"},{id:480,type:"judge",subject:"subject2",module:"演出管理",question:"演出项目中，艺术总监负责剧目创作生产的艺术质量把控。",answer:"correct",options:["正确","错误"],explanation:"艺术总监是剧目艺术质量的总负责人。"},{id:481,type:"judge",subject:"subject2",module:"演出管理",question:"LED大屏属于演出舞台的灯光设备。",answer:"wrong",options:["正确","错误"],explanation:"LED大屏属于视频显示设备，不属于灯光设备。"},{id:482,type:"judge",subject:"subject2",module:"演出管理",question:"演出项目的制作成本越高，演出质量就一定越好。",answer:"wrong",options:["正确","错误"],explanation:"演出质量不仅取决于成本，还取决于创意、执行等多方面因素。"},{id:483,type:"judge",subject:"subject2",module:"演出管理",question:"演出中使用的音响设备不需要考虑防火安全。",answer:"wrong",options:["正确","错误"],explanation:"所有舞台设备都需要考虑防火安全。"},{id:484,type:"judge",subject:"subject2",module:"演出管理",question:"演出场馆的容量应当与核准的观众人数一致。",answer:"correct",options:["正确","错误"],explanation:"场馆容量必须与核准的观众人数一致，不能超售。"},{id:485,type:"judge",subject:"subject2",module:"演出管理",question:"演出项目的巡演需要考虑各地的市场需求差异。",answer:"correct",options:["正确","错误"],explanation:"巡演应当根据当地市场特点进行差异化调整。"},{id:486,type:"single",subject:"subject2",module:"演出管理",question:"舞台灯光的基本功能不包括（  ）。",options:["照明","烘托气氛","引导观众视线","录制音乐"],answer:"D",explanation:"录制音乐不属于舞台灯光的功能。"},{id:487,type:"single",subject:"subject2",module:"演出管理",question:"演出场馆的安全出口宽度应当根据（  ）确定。",options:["场馆外观","观众容量","舞台大小","票价高低"],answer:"B",explanation:"安全出口宽度应当根据场馆观众容量来确定。"},{id:488,type:"single",subject:"subject2",module:"演出管理",question:"下列属于舞台特殊效果设备的是（  ）。",options:["追光灯","LED大屏","雪花机","调音台"],answer:"C",explanation:"雪花机属于舞台特殊效果设备。"},{id:489,type:"single",subject:"subject2",module:"演出管理",question:"演出项目管理中，负责整体艺术质量把控的是（  ）。",options:["制作人","艺术总监","舞台监督","灯光师"],answer:"B",explanation:"艺术总监负责剧目创作生产的艺术质量把控。"},{id:490,type:"single",subject:"subject2",module:"演出管理",question:"舞台常规灯具不包括（  ）。",options:["成像灯","追光灯","冷焰火","染色灯"],answer:"C",explanation:"冷焰火属于特效设备，不属于常规灯具。"},{id:491,type:"single",subject:"subject2",module:"演出管理",question:"演出场馆消防设施中，灭火器的配置标准由（  ）规定。",options:["演出公司","消防法规","观众要求","演员决定"],answer:"B",explanation:"灭火器配置标准由消防法规规定。"},{id:492,type:"single",subject:"subject2",module:"演出管理",question:"下列属于舞台视频设备的是（  ）。",options:["调音台","LED大屏","染色灯","雾机"],answer:"B",explanation:"LED大屏属于舞台视频设备。"},{id:493,type:"single",subject:"subject2",module:"演出管理",question:"演出项目的艺术总监与制作人的区别在于（  ）。",options:["艺术总监负责艺术质量，制作人负责统筹管理","两者职责完全相同","制作人是艺术总监的下属","没有区别"],answer:"A",explanation:"艺术总监负责艺术质量，制作人负责项目的统筹管理和运营。"},{id:494,type:"single",subject:"subject2",module:"演出管理",question:"舞台监督的主要职责是（  ）。",options:["设计舞美","统筹协调演出各环节","撰写剧本","售票"],answer:"B",explanation:"舞台监督的核心职责是统筹协调演出的各环节。"},{id:495,type:"single",subject:"subject2",module:"演出管理",question:"演出安全管理的原则是（  ）。",options:["美观第一","安全第一，预防为主","成本最低","效率至上"],answer:"B",explanation:"演出安全管理遵循安全第一、预防为主的原则。"},{id:496,type:"single",subject:"subject2",module:"演出管理",question:"演出场馆的声学设计主要考虑（  ）。",options:["外观美观","混响时间和声场均匀度","座椅舒适度","灯光效果"],answer:"B",explanation:"声学设计的核心是混响时间和声场均匀度。"},{id:497,type:"single",subject:"subject2",module:"演出管理",question:"下列不属于演出设备的是（  ）。",options:["音响系统","灯光系统","售票系统","视频系统"],answer:"C",explanation:"售票系统不属于舞台演出设备。"},{id:498,type:"single",subject:"subject2",module:"演出管理",question:"演出项目中，负责后台各部门协调的是（  ）。",options:["导演","舞台监督","场记","主持人"],answer:"B",explanation:"舞台监督负责后台各部门的协调工作。"},{id:499,type:"single",subject:"subject2",module:"演出管理",question:"演出场馆的日常维护不包括（  ）。",options:["消防设施检查","座椅维修","演出内容审批","空调系统维护"],answer:"C",explanation:"演出内容审批是文化主管部门的职责。"},{id:500,type:"single",subject:"subject2",module:"演出管理",question:"舞台设计中，'暗场'是指（  ）。",options:["灯光全开","灯光全部关闭或降至最低","只开追光灯","灯光闪烁"],answer:"B",explanation:"暗场是指舞台灯光全部关闭或降至最低的演出状态。"},{id:501,type:"single",subject:"subject2",module:"演出管理",question:"演出中发生安全事故时，应当首先（  ）。",options:["追究责任","保障观众和演职人员安全","继续演出","通知媒体"],answer:"B",explanation:"安全事故发生时，首先应保障人员安全。"},{id:502,type:"single",subject:"subject2",module:"演出管理",question:"下列属于演出场馆固定设施的是（  ）。",options:["临时搭建的舞台","场馆的防火门","租赁的音响设备","移动灯光架"],answer:"B",explanation:"防火门属于场馆的固定安全设施。"},{id:503,type:"single",subject:"subject2",module:"演出管理",question:"演出舞台的'台口'是指（  ）。",options:["舞台后方","舞台两侧","舞台面向观众的最前端","舞台顶部"],answer:"C",explanation:"台口是指舞台面向观众的最前端区域。"},{id:504,type:"single",subject:"subject2",module:"演出管理",question:"演出项目中，舞美制作的依据是（  ）。",options:["导演的舞美设计方案","演员个人喜好","观众的服装","场地的颜色"],answer:"A",explanation:"舞美制作以导演的舞美设计方案为依据。"},{id:505,type:"single",subject:"subject2",module:"演出管理",question:"演出安全管理中，'应急预案'的制定应当包括（  ）。",options:["应急疏散路线","救援措施","以上都是","以上都不是"],answer:"C",explanation:"应急预案应包括疏散路线和救援措施等内容。"},{id:506,type:"multi",subject:"subject2",module:"演出管理",question:"舞台灯光的基本功能包括（  ）。",options:["照明","营造氛围","引导观众视线","创造空间感"],answer:["A","B","C","D"],explanation:"舞台灯光具有照明、渲染、引导和创造空间感等功能。"},{id:507,type:"multi",subject:"subject2",module:"演出管理",question:"演出场馆的安全设施包括（  ）。",options:["消防栓","灭火器","安全出口标志","应急照明"],answer:["A","B","C","D"],explanation:"以上均为演出场馆必备的安全设施。"},{id:508,type:"multi",subject:"subject2",module:"演出管理",question:"舞台常规灯具包括（  ）。",options:["成像灯","追光灯","染色灯","冷焰火"],answer:["A","B","C"],explanation:"冷焰火属于特效设备。"},{id:509,type:"multi",subject:"subject2",module:"演出管理",question:"演出项目管理的主要环节包括（  ）。",options:["项目策划","项目制作","项目演出","项目总结"],answer:["A","B","C","D"],explanation:"以上均为项目管理的主要环节。"},{id:510,type:"multi",subject:"subject2",module:"演出管理",question:"演出安全管理制度应包括（  ）。",options:["安全责任制","安全检查制度","应急疏散预案","消防演练计划"],answer:["A","B","C","D"],explanation:"以上均为安全管理制度的重要内容。"},{id:511,type:"multi",subject:"subject2",module:"演出管理",question:"舞美设计的基本要素包括（  ）。",options:["布景","灯光","服装","道具"],answer:["A","B","C","D"],explanation:"布景、灯光、服装、道具均为舞美设计的基本要素。"},{id:512,type:"multi",subject:"subject2",module:"演出管理",question:"演出场馆的声学要求包括（  ）。",options:["合适的混响时间","均匀的声场分布","无明显的声学缺陷","不需要考虑噪声控制"],answer:["A","B","C"],explanation:"噪声控制也是声学设计的重要内容。"},{id:513,type:"multi",subject:"subject2",module:"演出管理",question:"演出中需要协调的部门包括（  ）。",options:["灯光组","音响组","演员组","票务组"],answer:["A","B","C","D"],explanation:"以上部门都需要协调配合。"},{id:514,type:"multi",subject:"subject2",module:"演出管理",question:"演出安全应急预案应包括的内容有（  ）。",options:["应急组织机构","应急疏散路线","应急处置措施","善后处理方案"],answer:["A","B","C","D"],explanation:"以上均为应急预案应包含的内容。"},{id:515,type:"multi",subject:"subject2",module:"演出管理",question:"舞台视频设备的种类包括（  ）。",options:["LED大屏","投影设备","视频切换器","录音设备"],answer:["A","B","C"],explanation:"录音设备属于音响设备。"},{id:516,type:"multi",subject:"subject2",module:"演出管理",question:"演出项目成本控制的主要措施包括（  ）。",options:["精确预算","合理采购","严格控制变更","偷工减料"],answer:["A","B","C"],explanation:"偷工减料不是合理的成本控制措施。"},{id:517,type:"multi",subject:"subject2",module:"演出管理",question:"演出场馆的日常安全检查应关注（  ）。",options:["消防设施","电气线路","安全通道","以上都是"],answer:["A","B","C","D"],explanation:"以上均为日常安全检查的内容。"},{id:518,type:"multi",subject:"subject2",module:"演出管理",question:"演出舞美工程的主要组成部分包括（  ）。",options:["灯光工程","音响工程","视频工程","票务销售"],answer:["A","B","C"],explanation:"票务销售不属于舞美工程。"},{id:519,type:"multi",subject:"subject2",module:"演出管理",question:"演出安全管理中，安全责任的承担主体包括（  ）。",options:["演出举办单位","演出场所经营单位","演出经纪机构","观众个人"],answer:["A","B","C"],explanation:"观众不需要承担演出安全管理责任。"},{id:520,type:"multi",subject:"subject2",module:"演出管理",question:"演出项目的巡演准备包括（  ）。",options:["确定巡演路线","安排交通运输","准备演出设备","不需要额外准备"],answer:["A","B","C"],explanation:"巡演需要充分的准备工作。"},{id:521,type:"multi",subject:"subject2",module:"演出管理",question:"舞台监督在演出中负责的工作包括（  ）。",options:["协调各部门","控制演出节奏","处理突发情况","设计舞美"],answer:["A","B","C"],explanation:"舞美设计不是舞台监督的职责。"},{id:522,type:"multi",subject:"subject2",module:"演出管理",question:"演出场馆的观众服务设施包括（  ）。",options:["卫生间","休息区","导视系统","以上都是"],answer:["A","B","C","D"],explanation:"以上均为观众服务设施。"},{id:523,type:"judge",subject:"subject2",module:"艺术基础",question:"戏曲是中国传统的戏剧形式，融合了唱、念、做、打等多种表演手段。",answer:"correct",options:["正确","错误"],explanation:"戏曲是中国传统戏剧的代表性艺术形式。"},{id:524,type:"judge",subject:"subject2",module:"艺术基础",question:"话剧是以对话和动作为主要表现手段的戏剧形式。",answer:"correct",options:["正确","错误"],explanation:"话剧以对话和动作为主要表现手段。"},{id:525,type:"judge",subject:"subject2",module:"艺术基础",question:"音乐剧是一种融合了音乐、歌曲、舞蹈和对白的舞台艺术形式。",answer:"correct",options:["正确","错误"],explanation:"音乐剧综合了多种艺术表现手段。"},{id:526,type:"judge",subject:"subject2",module:"艺术基础",question:"芭蕾舞起源于法国。",answer:"wrong",options:["正确","错误"],explanation:"芭蕾舞起源于意大利，在法国和俄罗斯得到发展。"},{id:527,type:"judge",subject:"subject2",module:"艺术基础",question:"歌剧是一种以歌唱为主的音乐戏剧形式。",answer:"correct",options:["正确","错误"],explanation:"歌剧是以歌唱和音乐为主要表现手段的戏剧形式。"},{id:528,type:"judge",subject:"subject2",module:"艺术基础",question:"演出经纪人不需要了解不同艺术门类的特点和区别。",answer:"wrong",options:["正确","错误"],explanation:"经纪人应当了解各种艺术门类的特点以便开展经纪活动。"},{id:529,type:"judge",subject:"subject2",module:"艺术基础",question:"交响乐通常由弦乐、木管、铜管和打击乐四个声部组成。",answer:"correct",options:["正确","错误"],explanation:"交响乐团一般由这四个乐器组组成。"},{id:530,type:"judge",subject:"subject2",module:"艺术基础",question:"京剧是中国戏曲的代表剧种，有'国粹'之称。",answer:"correct",options:["正确","错误"],explanation:"京剧有'国粹'之称，是中国最具代表性的戏曲剧种。"},{id:531,type:"judge",subject:"subject2",module:"艺术基础",question:"杂技不属于舞台表演艺术的范畴。",answer:"wrong",options:["正确","错误"],explanation:"杂技属于舞台表演艺术的重要门类。"},{id:532,type:"judge",subject:"subject2",module:"艺术基础",question:"艺术的审美功能是艺术最基本的功能之一。",answer:"correct",options:["正确","错误"],explanation:"审美功能是艺术的基本功能。"},{id:533,type:"judge",subject:"subject2",module:"艺术基础",question:"音乐的基本要素包括节奏、旋律、和声和音色。",answer:"correct",options:["正确","错误"],explanation:"节奏、旋律、和声和音色是音乐的四大基本要素。"},{id:534,type:"single",subject:"subject2",module:"艺术基础",question:"京剧的四大行当不包括（  ）。",options:["生","旦","净","舞"],answer:"D",explanation:"京剧四大行当为生、旦、净、丑。"},{id:535,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于中国传统音乐的是（  ）。",options:["交响乐","古琴曲","爵士乐","摇滚乐"],answer:"B",explanation:"古琴曲是中国传统音乐的代表。"},{id:536,type:"single",subject:"subject2",module:"艺术基础",question:"话剧起源于（  ）。",options:["中国","古希腊","日本","印度"],answer:"B",explanation:"话剧起源于古希腊的戏剧形式。"},{id:537,type:"single",subject:"subject2",module:"艺术基础",question:"芭蕾舞的标志性技术动作是（  ）。",options:["翻跟头","足尖站立","劈叉","倒立"],answer:"B",explanation:"足尖站立是芭蕾舞最具代表性的技术特征。"},{id:538,type:"single",subject:"subject2",module:"艺术基础",question:"交响乐之父是（  ）。",options:["莫扎特","海顿","贝多芬","巴赫"],answer:"B",explanation:"海顿被尊称为'交响乐之父'。"},{id:539,type:"single",subject:"subject2",module:"艺术基础",question:"歌剧的典型特征是以（  ）为主要表现手段。",options:["对白","歌唱和音乐","舞蹈","杂技"],answer:"B",explanation:"歌剧以歌唱和音乐为主要表现手段。"},{id:540,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于中国民族乐器的是（  ）。",options:["小提琴","二胡","钢琴","萨克斯"],answer:"B",explanation:"二胡是中国传统的民族乐器。"},{id:541,type:"single",subject:"subject2",module:"艺术基础",question:"戏曲表演中的'唱念做打'中，'念'指的是（  ）。",options:["唱腔","念白","舞蹈","武打"],answer:"B",explanation:"'念'指戏曲中的念白，即不带曲调的念诵。"},{id:542,type:"single",subject:"subject2",module:"艺术基础",question:"音乐剧与歌剧的主要区别在于（  ）。",options:["音乐剧更注重音乐","音乐剧融合了流行音乐元素和对白","歌剧没有音乐","两者没有区别"],answer:"B",explanation:"音乐剧融合了流行音乐、爵士乐等元素，更多使用对白而非咏叹调。"},{id:543,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于西方古典音乐时期代表人物的是（  ）。",options:["周杰伦","贝多芬","刘德华","周杰伦和刘德华"],answer:"B",explanation:"贝多芬是西方古典音乐时期的代表人物。"},{id:544,type:"single",subject:"subject2",module:"艺术基础",question:"中国戏曲的代表性剧种不包括（  ）。",options:["京剧","豫剧","话剧","越剧"],answer:"C",explanation:"话剧不属于中国戏曲，它是一种独立的戏剧形式。"},{id:545,type:"single",subject:"subject2",module:"艺术基础",question:"舞蹈的基本要素不包括（  ）。",options:["动作","节奏","乐谱","表情"],answer:"C",explanation:"乐谱属于音乐的要素，不是舞蹈的基本要素。"},{id:546,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于民间舞蹈的是（  ）。",options:["芭蕾舞","秧歌","现代舞","国标舞"],answer:"B",explanation:"秧歌是中国传统的民间舞蹈。"},{id:547,type:"single",subject:"subject2",module:"艺术基础",question:"演出艺术的基本要素包括（  ）。",options:["演员、观众、场地","演员、观众、作品","导演、编剧、演员","投资方、演员、观众"],answer:"B",explanation:"演出艺术的基本要素是演员、观众和作品。"},{id:548,type:"single",subject:"subject2",module:"艺术基础",question:"相声属于（  ）艺术门类。",options:["音乐","舞蹈","曲艺","戏剧"],answer:"C",explanation:"相声属于曲艺艺术门类。"},{id:549,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于现代舞代表人物的是（  ）。",options:["邓肯","柴可夫斯基","梅兰芳","莎士比亚"],answer:"A",explanation:"邓肯是现代舞的创始人和代表人物。"},{id:550,type:"single",subject:"subject2",module:"艺术基础",question:"京剧脸谱中，红色通常代表（  ）。",options:["忠勇正义","奸诈狡猾","刚直不阿","阴险凶恶"],answer:"A",explanation:"京剧脸谱中红色代表忠勇正义的人物性格。"},{id:551,type:"single",subject:"subject2",module:"艺术基础",question:"歌剧的咏叹调主要用于表达（  ）。",options:["故事情节","角色的情感","舞蹈动作","场景布置"],answer:"B",explanation:"咏叹调主要用于表达角色的内心情感。"},{id:552,type:"single",subject:"subject2",module:"艺术基础",question:"音乐的体裁不包括（  ）。",options:["交响曲","协奏曲","素描","奏鸣曲"],answer:"C",explanation:"素描是绘画的体裁，不是音乐的。"},{id:553,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于舞台美术范畴的是（  ）。",options:["剧本创作","舞美设计","音乐创作","导演编排"],answer:"B",explanation:"舞美设计是舞台美术的核心内容。"},{id:554,type:"single",subject:"subject2",module:"艺术基础",question:"中国画的基本技法不包括（  ）。",options:["工笔","写意","素描","白描"],answer:"C",explanation:"素描属于西方绘画技法，不是中国画的基本技法。"},{id:555,type:"single",subject:"subject2",module:"艺术基础",question:"曲艺艺术的特征包括（  ）。",options:["说唱叙述","以第三人称讲述为主","演员少道具简单","以上都是"],answer:"D",explanation:"以上均为曲艺艺术的特征。"},{id:556,type:"single",subject:"subject2",module:"艺术基础",question:"下列属于世界三大戏剧体系的是（  ）。",options:["斯坦尼斯拉夫斯基体系","布莱希特体系","梅兰芳体系","以上都是"],answer:"D",explanation:"斯坦尼体系、布莱希特体系和梅兰芳体系并称世界三大戏剧体系。"},{id:557,type:"single",subject:"subject2",module:"艺术基础",question:"演出经纪人了解艺术基础知识的目的是（  ）。",options:["自己上台表演","更好地开展经纪业务","创作艺术作品","评定艺术水平"],answer:"B",explanation:"了解艺术基础有助于经纪人更好地开展业务。"},{id:558,type:"multi",subject:"subject2",module:"艺术基础",question:"中国戏曲的主要剧种包括（  ）。",options:["京剧","昆曲","话剧","豫剧"],answer:["A","B","D"],explanation:"话剧不属于戏曲剧种。"},{id:559,type:"multi",subject:"subject2",module:"艺术基础",question:"舞台表演艺术的基本要素包括（  ）。",options:["演员","观众","作品","经纪人"],answer:["A","B","C"],explanation:"经纪人不属于舞台表演艺术的基本要素。"},{id:560,type:"multi",subject:"subject2",module:"艺术基础",question:"京剧的四大行当包括（  ）。",options:["生","旦","净","丑"],answer:["A","B","C","D"],explanation:"京剧四大行当为生、旦、净、丑。"},{id:561,type:"multi",subject:"subject2",module:"艺术基础",question:"音乐的基本要素包括（  ）。",options:["节奏","旋律","和声","音色"],answer:["A","B","C","D"],explanation:"节奏、旋律、和声和音色是音乐的四大基本要素。"},{id:562,type:"multi",subject:"subject2",module:"艺术基础",question:"舞蹈的类型包括（  ）。",options:["芭蕾舞","现代舞","民间舞","书法"],answer:["A","B","C"],explanation:"书法不属于舞蹈类型。"},{id:563,type:"multi",subject:"subject2",module:"艺术基础",question:"话剧的舞台设计要素包括（  ）。",options:["布景","灯光","音效","以上都是"],answer:["A","B","C","D"],explanation:"布景、灯光、音效均为话剧舞台设计要素。"},{id:564,type:"multi",subject:"subject2",module:"艺术基础",question:"中国民族乐器包括（  ）。",options:["二胡","古琴","琵琶","小提琴"],answer:["A","B","C"],explanation:"小提琴是西洋乐器。"},{id:565,type:"multi",subject:"subject2",module:"艺术基础",question:"下列属于中国传统艺术形式的有（  ）。",options:["戏曲","书法","国画","油画"],answer:["A","B","C"],explanation:"油画是西方艺术形式。"},{id:566,type:"multi",subject:"subject2",module:"艺术基础",question:"演出艺术的审美特征包括（  ）。",options:["直观性","即时性","互动性","永久性"],answer:["A","B","C"],explanation:"演出艺术具有即时性，不是永久性的。"},{id:567,type:"multi",subject:"subject2",module:"艺术基础",question:"交响乐队的乐器组包括（  ）。",options:["弦乐组","木管组","铜管组","打击乐组"],answer:["A","B","C","D"],explanation:"交响乐队由弦乐、木管、铜管和打击乐四个乐器组组成。"},{id:568,type:"multi",subject:"subject2",module:"艺术基础",question:"歌剧的基本构成要素包括（  ）。",options:["音乐","剧本","舞蹈","以上都是"],answer:["A","B","C","D"],explanation:"歌剧融合了音乐、剧本和舞蹈等要素。"},{id:569,type:"multi",subject:"subject2",module:"艺术基础",question:"曲艺的主要形式包括（  ）。",options:["相声","评书","快板","歌剧"],answer:["A","B","C"],explanation:"歌剧不属于曲艺形式。"},{id:570,type:"multi",subject:"subject2",module:"艺术基础",question:"下列属于古典音乐作曲家的有（  ）。",options:["莫扎特","贝多芬","巴赫","周杰伦"],answer:["A","B","C"],explanation:"周杰伦是当代流行音乐人。"},{id:571,type:"multi",subject:"subject2",module:"艺术基础",question:"舞美设计的基本内容涉及（  ）。",options:["布景设计","灯光设计","服装设计","以上都是"],answer:["A","B","C","D"],explanation:"布景、灯光、服装均为舞美设计的内容。"},{id:572,type:"multi",subject:"subject2",module:"艺术基础",question:"京剧脸谱中不同颜色代表不同的人物性格，下列正确的有（  ）。",options:["红色代表忠勇正义","白色代表奸诈狡猾","黑色代表刚直不阿","红色代表奸诈"],answer:["A","B","C"],explanation:"红色不代表奸诈。"},{id:573,type:"multi",subject:"subject2",module:"艺术基础",question:"音乐剧的特点包括（  ）。",options:["融合音乐、舞蹈和对白","风格多样化","注重娱乐性","只有古典音乐风格"],answer:["A","B","C"],explanation:"音乐剧不限于古典音乐风格。"},{id:574,type:"multi",subject:"subject2",module:"艺术基础",question:"了解艺术基础知识对演出经纪人的帮助体现在（  ）。",options:["准确判断艺术价值","更好地与艺术团队沟通","制定合理的经纪策略","亲自进行艺术创作"],answer:["A","B","C"],explanation:"经纪人不需要亲自进行艺术创作。"},{id:575,type:"judge",subject:"subject1",module:"历年真题",question:"根据《民法典》，自然人从出生时起到死亡时止，具有民事权利能力。",answer:"correct",options:["正确","错误"],explanation:"《民法典》第十三条规定，自然人从出生时起到死亡时止，具有民事权利能力。"},{id:576,type:"judge",subject:"subject1",module:"历年真题",question:"演出经纪人在经纪活动中，可以接受委托人的委托同时代理双方当事人。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人在代理双方时应当取得双方同意并披露信息，不得私下双面代理。"},{id:577,type:"judge",subject:"subject1",module:"历年真题",question:"社会主义核心价值观中，'诚信'属于个人层面的价值准则。",answer:"correct",options:["正确","错误"],explanation:"爱国、敬业、诚信、友善属于个人层面的价值准则。"},{id:578,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出不得以假唱、假演奏手段欺骗观众。",answer:"correct",options:["正确","错误"],explanation:"《条例》明确禁止假唱、假演奏。"},{id:579,type:"judge",subject:"subject1",module:"历年真题",question:"全国演出经纪人员资格认定考试由文化和旅游部组织实施。",answer:"correct",options:["正确","错误"],explanation:"考试由文化和旅游部统一组织。"},{id:580,type:"judge",subject:"subject1",module:"历年真题",question:"根据《反不正当竞争法》，经营者不得实施混淆行为引人误认为是他人商品。",answer:"correct",options:["正确","错误"],explanation:"《反不正当竞争法》禁止商业混淆行为。"},{id:581,type:"judge",subject:"subject1",module:"历年真题",question:"根据《民法典》，演出经纪合同属于委托合同的一种。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪合同属于中介合同（原居间合同），不属于委托合同。"},{id:582,type:"judge",subject:"subject1",module:"历年真题",question:"新时代我国社会主要矛盾是人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。",answer:"correct",options:["正确","错误"],explanation:"党的十九大作出的重大判断。"},{id:583,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出场所经营单位应当自领取营业执照之日起20日内到文化主管部门备案。",answer:"wrong",options:["正确","错误"],explanation:"演出场所经营单位应当自领取营业执照之日起20日内备案，但不是到文化主管部门，而是到所在地县级文化主管部门。"},{id:584,type:"judge",subject:"subject1",module:"历年真题",question:"根据《著作权法》，改编已有作品产生的作品，其著作权由改编人享有。",answer:"correct",options:["正确","错误"],explanation:"改编作品的著作权由改编人享有，但行使著作权时不得侵犯原作品著作权。"},{id:585,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，申请举办营业性涉港澳台演出，提交申请的截止日期为演出日期前（  ）日。",options:["7","10","20","30"],answer:"C",explanation:"申请举办营业性涉港澳台演出，应当在演出日期20日前提交申请。"},{id:586,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，下列不属于著作人身权的是（  ）。",options:["署名权","修改权","复制权","保护作品完整权"],answer:"C",explanation:"复制权属于著作财产权。"},{id:587,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪机构变更名称、住所等的，应当到（  ）办理变更登记。",options:["工商部门","原发证机关","文化部","公安部门"],answer:"B",explanation:"应当到原发证机关办理变更登记。"},{id:588,type:"single",subject:"subject1",module:"历年真题",question:"根据《民法典》，限制民事行为能力人的年龄标准是（  ）。",options:["6周岁以上","8周岁以上","10周岁以上","18周岁以上"],answer:"B",explanation:"《民法典》规定8周岁以上为限制民事行为能力人。"},{id:589,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，募捐义演的演出收入除扣除必要成本外应当（  ）。",options:["归演出举办单位","全部捐赠公益事业","按比例分配","上交文化部门"],answer:"B",explanation:"募捐义演收入除必要成本外全部捐赠公益事业。"},{id:590,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，表演者权保护期为（  ）。",options:["20年","30年","50年","作者终生"],answer:"C",explanation:"表演者权保护期为50年。"},{id:591,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出举办单位在演出前应向观众公布的演出信息不包括（  ）。",options:["演员","节目","票价","演员的个人信息"],answer:"D",explanation:"演员的个人信息属于隐私，不需要向观众公布。"},{id:592,type:"single",subject:"subject1",module:"历年真题",question:"根据《消防法》，消防安全重点单位应当（ ）进行一次防火检查。",options:["每月","每季度","每半年","每年"],answer:"C",explanation:"消防安全重点单位应当每半年进行一次防火检查。"},{id:593,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，擅自变更演员、节目内容的，由文化主管部门处（  ）罚款。",options:["1万元以上3万元以下","3万元以上5万元以下","5万元以上10万元以下","10万元以上20万元以下"],answer:"C",explanation:"擅自变更演出内容处5万元以上10万元以下罚款。"},{id:594,type:"single",subject:"subject1",module:"历年真题",question:"根据《大型群众性活动安全管理条例》，预计参加人数达到（  ）人以上的应申请安全许可。",options:["500","1000","2000","5000"],answer:"B",explanation:"预计参加人数达到1000人以上的应申请安全许可。"},{id:595,type:"single",subject:"subject1",module:"历年真题",question:"根据《反不正当竞争法》，下列不属于不正当竞争行为的是（  ）。",options:["虚假宣传","商业贿赂","降价促销","侵犯商业秘密"],answer:"C",explanation:"合理的降价促销不属于不正当竞争行为。"},{id:596,type:"single",subject:"subject1",module:"历年真题",question:"根据《民法典》合同编，合同终止后，当事人应当遵循的原则是（  ）。",options:["自由原则","诚信原则","公平原则","等价原则"],answer:"B",explanation:"合同终止后当事人应遵循诚信原则，履行后合同义务。"},{id:597,type:"single",subject:"subject1",module:"历年真题",question:"中国特色社会主义最本质的特征是（  ）。",options:["改革开放","中国共产党领导","依法治国","人民当家作主"],answer:"B",explanation:"中国特色社会主义最本质的特征是中国共产党领导。"},{id:598,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出许可证有效期（  ）年。",options:["1","2","3","5"],answer:"B",explanation:"营业性演出许可证有效期为2年。"},{id:599,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，法人作品的著作权保护期为（  ）年。",options:["30","50","70","永久"],answer:"B",explanation:"法人作品保护期为50年。"},{id:600,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，下列属于禁止演出内容的有（  ）。",options:["危害社会公德","扰乱社会秩序","宣扬邪教","侮辱他人"],answer:["A","B","C","D"],explanation:"均为禁止演出内容。"},{id:601,type:"multi",subject:"subject1",module:"历年真题",question:"根据《著作权法》，下列受著作权法保护的作品有（  ）。",options:["文字作品","音乐作品","杂技艺术作品","法律条文"],answer:["A","B","C"],explanation:"法律条文不受著作权法保护。"},{id:602,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出举办单位的义务包括（  ）。",options:["制定安全保卫方案","投保公众责任险","维护演出秩序","审批演出内容"],answer:["A","B","C"],explanation:"审批演出内容是文化主管部门的职责。"},{id:603,type:"multi",subject:"subject1",module:"历年真题",question:"社会主义核心价值观包括国家、社会和个人三个层面，下列属于社会层面价值取向的有（  ）。",options:["自由","平等","公正","法治"],answer:["A","B","C","D"],explanation:"自由、平等、公正、法治是社会层面价值取向。"},{id:604,type:"multi",subject:"subject1",module:"历年真题",question:"根据《民法典》，下列属于民事法律行为生效要件的有（  ）。",options:["行为人具有相应行为能力","意思表示真实","不违反法律强制性规定","不违背公序良俗"],answer:["A","B","C","D"],explanation:"四项均为民事法律行为生效要件。"},{id:605,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪人是连接演出产品生产者和消费者的桥梁和纽带。",answer:"correct",options:["正确","错误"],explanation:"经纪人的核心职能是中介服务。"},{id:606,type:"judge",subject:"subject2",module:"历年真题",question:"演出项目的宣传推广应覆盖演出前、演出中和演出后全周期。",answer:"wrong",options:["正确","错误"],explanation:"宣传推广主要在演出前和演出中，演出后主要是总结和口碑维护。"},{id:607,type:"judge",subject:"subject2",module:"历年真题",question:"舞台监督负责演出现场的全面统筹和调度。",answer:"correct",options:["正确","错误"],explanation:"舞台监督是演出现场的核心调度人员。"},{id:608,type:"judge",subject:"subject2",module:"历年真题",question:"演出票务实行实名制的目的是为了防止黄牛倒票。",answer:"correct",options:["正确","错误"],explanation:"实名制购票是打击黄牛倒票的重要手段。"},{id:609,type:"judge",subject:"subject2",module:"历年真题",question:"经纪合同只能采用书面形式订立。",answer:"wrong",options:["正确","错误"],explanation:"经纪合同可以采用书面形式、口头形式或其他形式。"},{id:610,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪人应当为委托人保守商业秘密。",answer:"correct",options:["正确","错误"],explanation:"保密义务是经纪人职业道德的基本要求。"},{id:611,type:"judge",subject:"subject2",module:"历年真题",question:"演出场所经营单位对场所内的演出安全负总责。",answer:"wrong",options:["正确","错误"],explanation:"演出举办单位对演出安全负总责，演出场所经营单位负保障义务。"},{id:612,type:"judge",subject:"subject2",module:"历年真题",question:"芭蕾舞的标志性技术特征是足尖站立。",answer:"correct",options:["正确","错误"],explanation:"足尖站立是芭蕾舞最具代表性的技术特征。"},{id:613,type:"judge",subject:"subject2",module:"历年真题",question:"演出项目的风险评估应当在项目策划阶段完成。",answer:"correct",options:["正确","错误"],explanation:"风险评估应在策划阶段进行，以便制定应对策略。"},{id:614,type:"judge",subject:"subject2",module:"历年真题",question:"佣金是经纪人从事经纪活动的合法报酬。",answer:"correct",options:["正确","错误"],explanation:"佣金是经纪人完成经纪业务后依法获取的报酬。"},{id:615,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪人在经纪活动中获取报酬的主要形式是（  ）。",options:["工资","佣金","分红","奖金"],answer:"B",explanation:"佣金是经纪人的主要报酬形式。"},{id:616,type:"single",subject:"subject2",module:"历年真题",question:"京剧四大行当'生旦净丑'中，'净'角是指（  ）。",options:["男性角色","女性角色","花脸角色","滑稽角色"],answer:"C",explanation:"'净'即花脸，是京剧中的男性角色行当之一。"},{id:617,type:"single",subject:"subject2",module:"历年真题",question:"下列不属于舞台特殊效果设备的是（  ）。",options:["雪花机","冷焰火","染色灯","热焰火"],answer:"C",explanation:"染色灯属于常规灯光设备。"},{id:618,type:"single",subject:"subject2",module:"历年真题",question:"演出项目可行性分析的首要步骤是（  ）。",options:["预算编制","市场调研","合同签订","票务销售"],answer:"B",explanation:"市场调研是可行性分析的首要步骤。"},{id:619,type:"single",subject:"subject2",module:"历年真题",question:"演出场所安全出口的数量应根据（  ）确定。",options:["场馆外观","观众容量","舞台大小","票价"],answer:"B",explanation:"安全出口数量应与观众容量匹配。"},{id:620,type:"single",subject:"subject2",module:"历年真题",question:"音乐剧的核心表现手段是（  ）。",options:["纯舞蹈","纯歌唱","音乐、歌曲和舞蹈的结合","纯对白"],answer:"C",explanation:"音乐剧融合了音乐、歌曲、舞蹈和对白。"},{id:621,type:"single",subject:"subject2",module:"历年真题",question:"根据《经纪人管理办法》，经纪活动应当遵循的原则不包括（  ）。",options:["自愿","公平","诚实信用","利润优先"],answer:"D",explanation:"利润优先不是法定的经纪活动原则。"},{id:622,type:"single",subject:"subject2",module:"历年真题",question:"下列属于演出经纪合同必要条款的是（  ）。",options:["字体格式","佣金比例","纸张规格","打印份数"],answer:"B",explanation:"佣金条款是经纪合同的核心必要条款。"},{id:623,type:"single",subject:"subject2",module:"历年真题",question:"演出安全管理的首要原则是（  ）。",options:["经济效益","安全第一","观众至上","演员优先"],answer:"B",explanation:"演出安全管理的首要原则是安全第一。"},{id:624,type:"single",subject:"subject2",module:"历年真题",question:"中国戏曲中被称为'百戏之祖'的是（  ）。",options:["京剧","昆曲","豫剧","越剧"],answer:"B",explanation:"昆曲被称为'百戏之祖'。"},{id:625,type:"single",subject:"subject2",module:"历年真题",question:"下列属于交响乐队打击乐器组的是（  ）。",options:["小提琴","长笛","定音鼓","大提琴"],answer:"C",explanation:"定音鼓属于打击乐器组。"},{id:626,type:"single",subject:"subject2",module:"历年真题",question:"演出项目巡演前的准备工作不包括（  ）。",options:["确定巡演路线","安排交通运输","经纪人个人形象设计","准备演出设备"],answer:"C",explanation:"经纪人个人形象设计不属于巡演准备工作。"},{id:627,type:"single",subject:"subject2",module:"历年真题",question:"歌剧与音乐剧的根本区别在于（  ）。",options:["表演语言","音乐风格","使用流行音乐和对白的程度","舞台设计"],answer:"C",explanation:"音乐剧更多使用流行音乐和对白，歌剧以古典美声和咏叹调为主。"},{id:628,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪业务档案保存期限不少于（  ）。",options:["1年","3年","5年","10年"],answer:"C",explanation:"经纪业务档案应保存5年以上。"},{id:629,type:"single",subject:"subject2",module:"历年真题",ques subject2",module:"历年真题",question:"演出经纪业务档案应保存（  ）以上。",options:["1年","3年","5年","10年"],answer:"C",explanation:"经纪业务档案保存期限不少于5年。"},{id:689,type:"judge",subject:"subject1",module:"历年真题",question:"营业性演出的广告不得含有虚假内容。",answer:"correct",options:["正确","错误"],explanation:"《条例》规定演出广告不得虚假宣传。"},{id:690,type:"judge",subject:"subject1",module:"历年真题",question:"演出场所经营单位不需要定期检查消防安全设施。",answer:"wrong",options:["正确","错误"],explanation:"演出场所应当定期检查消防安全设施。"},{id:691,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪人可以同时在多家经纪机构执业。",answer:"wrong",options:["正确","错误"],explanation:"演出经纪人员不得同时在两家以上机构执业。"},{id:692,type:"judge",subject:"subject2",module:"历年真题",question:"交响乐队由弦乐、木管、铜管和打击乐四个声部组成。",answer:"correct",options:["正确","错误"],explanation:"交响乐队的标准编制包括这四个声部。"},{id:693,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出需要审批的情形包括（  ）。",options:["变更演员","变更演出内容","增加演出场次","A和B"],answer:["D"],explanation:"变更演员和演出内容需要重新审批。"},{id:694,type:"multi",subject:"subject2",module:"历年真题",question:"演出经纪合同纠纷的解决方式有（  ）。",options:["协商","调解","仲裁","以上都是"],answer:["A","B","C","D"],explanation:"以上均为合法的纠纷解决方式。"},{id:695,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出场所经营单位应当投保（  ）。",options:["财产险","公众责任险","人身险","工伤保险"],answer:"B",explanation:"演出场所应当投保公众责任险。"},{id:696,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，作品登记的作用是（  ）。",options:["获得著作权","作为著作权归属的初步证明","延长保护期","扩大保护范围"],answer:"B",explanation:"作品登记是著作权归属的初步证明。"},{id:697,type:"single",subject:"subject1",module:"历年真题",question:"根据《反不正当竞争法》，虚假宣传是指经营者对其商品作（  ）。",options:["真实宣传","虚假或引人误解的宣传","夸大宣传但不失实","保守的宣传"],answer:"B",explanation:"虚假宣传是对商品作虚假或引人误解的表示。"},{id:698,type:"single",subject:"subject2",module:"历年真题",question:"中国画的三大基本技法是（  ）。",options:["素描、油画、水彩","工笔、写意、白描","水墨、彩墨、油墨","写实、抽象、印象"],answer:"B",explanation:"工笔、写意、白描是中国画的基本技法。"},{id:699,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪合同中最重要的约定是（  ）。",options:["佣金条款","服务内容","双方信息","违约责任"],answer:"A",explanation:"佣金条款是经纪合同的核心约定。"},{id:700,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出内容不得危害社会公德。",answer:"correct",options:["正确","错误"],explanation:"危害社会公德是禁止的演出内容。"},{id:701,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，募捐义演的收入应当全部用于公益事业。",answer:"wrong",options:["正确","错误"],explanation:"募捐义演收入除必要成本外用于公益事业。"},{id:702,type:"judge",subject:"subject2",module:"历年真题",question:"舞台设计中，'暗场'指灯光全部关闭或降至最低的演出状态。",answer:"correct",options:["正确","错误"],explanation:"暗场是舞台灯光降至最低的状态。"},{id:703,type:"multi",subject:"subject1",module:"历年真题",question:"著作权包括著作人身权和（  ）。",options:["署名权","著作财产权","表演者权","邻接权"],answer:["B"],explanation:"著作权包括著作人身权和著作财产权。"},{id:704,type:"multi",subject:"subject2",module:"历年真题",question:"演出项目成本通常包括（  ）。",options:["艺人出场费","场地费","宣传费","以上都是"],answer:["A","B","C","D"],explanation:"均为演出项目成本构成。"},{id:705,type:"judge",subject:"subject1",module:"思想政治",question:"根据新发展理念，'开放'注重的是解决发展内外联动问题。",answer:"correct",options:["正确","错误"],explanation:"开放理念注重内外联动。"},{id:706,type:"judge",subject:"subject1",module:"思想政治",question:"我国宪法规定的根本制度是社会主义制度。",answer:"correct",options:["正确","错误"],explanation:"宪法第一条明确规定我国的根本制度。"},{id:707,type:"judge",subject:"subject1",module:"思想政治",question:"习近平总书记强调，文化是一个国家、一个民族的灵魂。",answer:"correct",options:["正确","错误"],explanation:"文化兴国运兴，文化强民族强。"},{id:708,type:"judge",subject:"subject1",module:"思想政治",question:"中国特色社会主义政治发展道路的核心是坚持党的领导、人民当家作主、依法治国有机统一。",answer:"correct",options:["正确","错误"],explanation:"三者有机统一是中国特色社会主义政治发展道路的核心。"},{id:709,type:"judge",subject:"subject1",module:"思想政治",question:"马克思主义中国化的第一次历史性飞跃的理论成果是邓小平理论。",answer:"wrong",options:["正确","错误"],explanation:"第一次历史性飞跃是毛泽东思想。"},{id:710,type:"judge",subject:"subject1",module:"思想政治",question:"推进文化自信自强，应当坚持把社会效益放在首位。",answer:"correct",options:["正确","错误"],explanation:"文化建设要把社会效益放在首位。"},{id:711,type:"single",subject:"subject1",module:"思想政治",question:"马克思主义中国化时代化的最新理论成果是（  ）。",options:["邓小平理论","'三个代表'重要思想","科学发展观","习近平新时代中国特色社会主义思想"],answer:"D",explanation:"最新成果是习近平新时代中国特色社会主义思想。"},{id:712,type:"single",subject:"subject1",module:"思想政治",question:"党的二十大报告指出，新时代新征程中国共产党的中心任务是（  ）。",options:["全面建设小康社会","全面深化改革","以中国式现代化全面推进中华民族伟大复兴","构建新发展格局"],answer:"C",explanation:"中心任务是以中国式现代化全面推进中华民族伟大复兴。"},{id:713,type:"single",subject:"subject1",module:"思想政治",question:"我国基本政治制度中，被称为'中国共产党领导的多党合作和政治协商制度'的是（  ）。",options:["人民代表大会制度","多党合作和政治协商制度","民族区域自治制度","基层群众自治制度"],answer:"B",explanation:"这是我国的一项基本政治制度。"},{id:714,type:"single",subject:"subject1",module:"思想政治",question:"社会主义核心价值观中，'和谐'属于（  ）层面的价值目标。",options:["国家","社会","个人","企业"],answer:"A",explanation:"和谐是国家层面价值目标之一。"},{id:715,type:"single",subject:"subject1",module:"思想政治",question:"习近平在文艺工作座谈会上指出，（  ）是文艺工作者的立身之本。",options:["经济效益","艺术创新","德艺双馨","市场营销"],answer:"C",explanation:"德艺双馨是文艺工作者的立身之本。"},{id:716,type:"single",subject:"subject1",module:"思想政治",question:"根据宪法规定，国家机构实行（  ）的原则。",options:["首长负责制","委员会制","民主集中制","分权制衡"],answer:"C",explanation:"我国国家机构实行民主集中制原则。"},{id:717,type:"single",subject:"subject1",module:"思想政治",question:"新发展理念中，'共享'注重解决的是（  ）问题。",options:["发展动力","发展不平衡","社会公平正义","人与自然和谐"],answer:"C",explanation:"共享注重解决社会公平正义问题。"},{id:718,type:"single",subject:"subject1",module:"思想政治",question:"习近平总书记提出的'两个确立'是指确立习近平同志党中央的核心、全党的核心地位，确立习近平新时代中国特色社会主义思想的（  ）。",options:["指导地位","理论基础","实践意义","历史地位"],answer:"A",explanation:"'两个确立'中包括确立习近平新时代中国特色社会主义思想的指导地位。"},{id:719,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义文化的根本任务（ ）。",options:["发展文化产业","满足人民日益增长的精神文化需求","追求经济利润","全盘西化"],answer:"B",explanation:"根本任务是满足人民精神文化需求。"},{id:720,type:"single",subject:"subject1",module:"思想政治",question:"党的二十大报告提出，（  ）是全面建设社会主义现代化国家的首要任务。",options:["科技创新","高质量发展","文化自信","乡村振兴"],answer:"B",explanation:"高质量发展是首要任务。"},{id:721,type:"single",subject:"subject1",module:"思想政治",question:"根据宪法，中华人民共和国主席由（  ）选举产生。",options:["全国人民代表大会","国务院","全国政协","中央军事委员会"],answer:"A",explanation:"国家主席由全国人民代表大会选举产生。"},{id:722,type:"single",subject:"subject1",module:"思想政治",question:"推进马克思主义中国化时代化的根本途径是（  ）。",options:["照搬书本","与具体实际相结合、同中华优秀传统文化相结合","完全否定传统","全盘学习西方"],answer:"B",explanation:"'两个结合'是推进马克思主义中国化时代化的根本途径。"},{id:723,type:"single",subject:"subject1",module:"思想政治",question:"我国社会主要矛盾发生变化，但没有改变我们对我国社会主义所处历史阶段的判断，即我国仍处于并将长期处于（  ）。",options:["新民主主义阶段","社会主义初级阶段","共产主义初级阶段","社会主义中级阶段"],answer:"B",explanation:"我国仍处于并将长期处于社会主义初级阶段。"},{id:724,type:"single",subject:"subject1",module:"思想政治",question:"习近平总书记指出，全面深化改革的总目标是完善和发展中国特色社会主义制度、推进（  ）。",options:["经济高速增长","国家治理体系和治理能力现代化","文化强国建设","军事强国建设"],answer:"B",explanation:"全面深化改革总目标是推进国家治理体系和治理能力现代化。"},{id:725,type:"single",subject:"subject1",module:"思想政治",question:"中国特色社会主义制度的最大优势是（  ）。",options:["经济总量大","中国共产党领导","人口众多","历史悠久"],answer:"B",explanation:"中国共产党领导是中国特色社会主义制度的最大优势。"},{id:726,type:"single",subject:"subject1",module:"思想政治",question:"党的二十大报告指出，（  ）是全面建设社会主义现代化国家的基础性、战略性支撑。",options:["农业","教育、科技、人才","军事","文化"],answer:"B",explanation:"教育、科技、人才是基础性、战略性支撑。"},{id:727,type:"single",subject:"subject1",module:"思想政治",question:"推动构建人类命运共同体，核心是（  ）。",options:["中国优先发展","建设持久和平、共同繁荣的和谐世界","军事扩张","经济制裁他国"],answer:"B",explanation:"构建人类命运共同体核心是建设和谐世界。"},{id:728,type:"multi",subject:"subject1",module:"思想政治",question:"习近平文化思想的'七个着力'包括（  ）。",options:["着力加强党对宣传思想文化工作的领导","着力建设具有强大凝聚力和引领力的社会主义意识形态","着力培育和践行社会主义核心价值观","着力提升新闻舆论传播力引导力"],answer:["A","B","C","D"],explanation:"'七个着力'涵盖文化建设各领域。"},{id:729,type:"multi",subject:"subject1",module:"思想政治",question:"党的二十大报告提出的'三个务必'是指（  ）。",options:["务必不忘初心、牢记使命","务必谦虚谨慎、艰苦奋斗","务必敢于斗争、善于斗争","务必追求GDP增长"],answer:["A","B","C"],explanation:"GDP增长不是'三个务必'的内容。"},{id:730,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于党的二十大报告提出的战略部署的有（  ）。",options:["实施科教兴国战略","实施人才强国战略","实施创新驱动发展战略","实施经济独占战略"],answer:["A","B","C"],explanation:"经济独占不是国家战略。"},{id:731,type:"multi",subject:"subject1",module:"思想政治",question:"推动中华优秀传统文化创造性转化、创新性发展需要（  ）。",options:["坚守中华文化立场","使传统文化与当代文化相适应","使传统文化与现代社会相协调","完全抛弃传统文化"],answer:["A","B","C"],explanation:"创造性转化不是抛弃传统文化。"},{id:732,type:"multi",subject:"subject1",module:"思想政治",question:"建设社会主义文化强国，必须（  ）。",options:["坚持马克思主义指导地位","培育和践行社会主义核心价值观","推动文化事业和文化产业发展","照搬西方文化模式"],answer:["A","B","C"],explanation:"不应照搬西方文化模式。"},{id:733,type:"multi",subject:"subject1",module:"思想政治",question:"中国特色社会主义法治体系的组成部分包括（  ）。",options:["完备的法律规范体系","高效的法治实施体系","严密的法治监督体系","有力的法治保障体系"],answer:["A","B","C","D"],explanation:"以上均为中国特色社会主义法治体系的组成部分。"},{id:734,type:"multi",subject:"subject1",module:"思想政治",question:"根据宪法规定，公民的基本权利包括（  ）。",options:["选举权和被选举权","宗教信仰自由","人身自由","受教育权"],answer:["A","B","C","D"],explanation:"以上均为公民的基本权利。"},{id:735,type:"multi",subject:"subject1",module:"思想政治",question:"新发展格局强调的'双循环'是指（  ）。",options:["国内大循环为主体","国内国际双循环相互促进","仅依靠国内市场","仅依靠国际贸易"],answer:["A","B"],explanation:"双循环包括国内大循环和国际循环。"},{id:736,type:"multi",subject:"subject1",module:"思想政治",question:"习近平在文化传承发展座谈会上提出的'两个结合'是指（  ）。",options:["马克思主义基本原理同中国具体实际相结合","同中华优秀传统文化相结合","同西方文化相结合","同宗教文化相结合"],answer:["A","B"],explanation:"'两个结合'不包括与西方文化或宗教文化结合。"},{id:737,type:"multi",subject:"subject1",module:"思想政治",question:"下列属于文化自信表现的有（  ）。",options:["对中华文化价值的充分肯定","对中华文化生命力的坚定信念","全盘否定外来文化","推动中华文化创新发展"],answer:["A","B","D"],explanation:"文化自信不是全盘否定外来文化。"},{id:738,type:"multi",subject:"subject1",module:"思想政治",question:"我国宪法确立的基本政治制度包括（  ）。",options:["人民代表大会制度","中国共产党领导的多党合作和政治协商制度","民族区域自治制度","基层群众自治制度"],answer:["B","C","D"],explanation:"人民代表大会制度是根本政治制度，不是基本政治制度。"},{id:739,type:"multi",subject:"subject1",module:"思想政治",question:"党的二十大报告提出的中国式现代化的特征包括（  ）。",options:["人口规模巨大的现代化","全体人民共同富裕的现代化","物质文明和精神文明相协调的现代化","人与自然和谐共生的现代化"],answer:["A","B","C","D"],explanation:"以上均为中国式现代化的特征。"},{id:740,type:"multi",subject:"subject1",module:"思想政治",question:"关于全面从严治党，下列表述正确的有（  ）。",options:["是新时代党的自我革命","以加强党的长期执政能力建设为主线","以保持党的先进性和纯洁性为落脚点","可以放松对党员的要求"],answer:["A","B","C"],explanation:"全面从严治党不能放松对党员的要求。"},{id:741,type:"multi",subject:"subject1",module:"思想政治",question:"推进文化事业和文化产业发展的措施包括（  ）。",options:["健全现代公共文化服务体系","健全现代文化产业体系","加大文化遗产保护力度","推动文旅融合发展"],answer:["A","B","C","D"],explanation:"以上均为推动文化发展的措施。"},{id:742,type:"multi",subject:"subject1",module:"思想政治",question:"中国特色社会主义道路自信、理论自信、制度自信、文化自信的依据是（  ）。",options:["改革开放取得的伟大成就","中国特色社会主义实践的成功","中华文明的深厚底蕴","西方国家的认可"],answer:["A","B","C"],explanation:"文化自信的依据不依赖于西方国家的认可。"},{id:743,type:"judge",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，互联网文化单位不得提供含有危害国家统一内容的文化产品。",answer:"correct",options:["正确","错误"],explanation:"这是互联网文化管理的基本要求。"},{id:744,type:"judge",subject:"subject1",module:"文化市场法规",question:"互联网上网服务营业场所营业时间不受限制。",answer:"wrong",options:["正确","错误"],explanation:"网吧营业时间有限制。"},{id:745,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所与学校、医院、机关的距离不得少于（  ）米。",options:["100","150","200","500"],answer:"C",explanation:"不得少于200米。"},{id:746,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，文艺表演团体应当自领取营业执照之日起（  ）日内向文化主管部门备案。",options:["10","20","30","60"],answer:"B",explanation:"应自领取营业执照之日起20日内备案。"},{id:747,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，网络文化经营许可证有效期（  ）年。",options:["1","2","3","5"],answer:"C",explanation:"有效期3年。"},{id:748,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场综合执法机构可以对下列哪项进行处罚（  ）。",options:["刑事案件","行政违法行为","民事纠纷","个人恩怨"],answer:"B",explanation:"文化市场综合执法负责行政处罚。"},{id:749,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《网络表演经营活动管理办法》，网络表演直播平台应当保存表演记录至少（  ）日。",options:["30","60","90","180"],answer:"B",explanation:"应当保存表演记录至少60日。"},{id:750,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，个体演出经纪人实行（  ）制度。",options:["审批制","备案制","特许制","注册制"],answer:"B",explanation:"个体演出经纪人实行备案制度。"},{id:751,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所的经营许可证由（  ）颁发。",options:["文化主管部门","公安部门","工商部门","消防部门"],answer:"A",explanation:"由文化主管部门颁发娱乐经营许可证。"},{id:752,type:"single",subject:"subject1",module:"文化市场法规",question:"下列属于文化市场管理对象的是（  ）。",options:["餐饮行业","营业性演出","房地产交易","汽车销售"],answer:"B",explanation:"营业性演出是文化市场管理的对象。"},{id:753,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网上网服务营业场所管理条例》，接纳未成年人上网的处罚是（  ）。",options:["警告","罚款并可能停业整顿","奖励","无处罚"],answer:"B",explanation:"接纳未成年人将被处罚。"},{id:754,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出经纪人员资格证书考试由（  ）组织。",options:["省级文化部门","文化和旅游部","教育部","人社部"],answer:"B",explanation:"由文化和旅游部统一组织。"},{id:755,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场管理的目的是（  ）。",options:["限制文化消费","维护文化安全和文化市场秩序","禁止一切娱乐活动","增加政府收入"],answer:"B",explanation:"核心目的是维护文化安全和市场秩序。"},{id:756,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，擅自将营业性演出记录进行商业录像的处罚标准是（  ）。",options:["不予处罚","处5万元以上10万元以下罚款","处1万元罚款","刑事拘留"],answer:"B",explanation:"商业性录像将被处以5万元以上10万元以下罚款。"},{id:757,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，互联网文化产品应当经过（  ）审查。",options:["不需要","文化行政部门","教育部门","公安部门"],answer:"B",explanation:"互联网文化产品应经过文化行政部门审查。"},{id:758,type:"single",subject:"subject1",module:"文化市场法规",question:"文化市场行政管理的手段包括（  ）。",options:["行政许可","行政处罚","行政检查","以上都是"],answer:"D",explanation:"以上均为行政管理手段。"},{id:759,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，临时搭建舞台应当经（  ）批准。",options:["文化部门","消防部门","城管部门","文化部门和消防部门"],answer:"D",explanation:"临时搭建舞台需经文化和消防等部门批准。"},{id:760,type:"single",subject:"subject1",module:"文化市场法规",question:"网络音乐的内容审核主体是（  ）。",options:["用户自行审核","网络音乐提供者","电信运营商","不需要审核"],answer:"B",explanation:"网络音乐提供者承担内容审核主体责任。"},{id:761,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出不得出现的情形包括（  ）。",options:["危害社会稳定","煽动民族仇恨","宣扬淫秽色情","侮辱歧视观众"],answer:["A","B","C","D"],explanation:"以上均为禁止的演出情形。"},{id:762,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场综合执法范围包括（  ）。",options:["营业性演出","网吧","娱乐场所","网络文化"],answer:["A","B","C","D"],explanation:"以上均在综合执法范围内。"},{id:763,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《互联网上网服务营业场所管理条例》，互联网上网服务营业场所应当遵守的规定有（  ）。",options:["不得接纳未成年人","核对登记上网消费者身份证件","安装安全管理软件","24小时营业"],answer:["A","B","C"],explanation:"不要求24小时营业。"},{id:764,type:"multi",subject:"subject1",module:"文化市场法规",question:"互联网文化市场的监管特点包括（  ）。",options:["传播速度快","覆盖范围广","监管难度大","完全可控"],answer:["A","B","C"],explanation:"互联网文化市场监管具有较大难度。"},{id:765,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《娱乐场所管理条例》，娱乐场所不得有下列行为（  ）。",options:["贩卖毒品","设置赌博机","播放淫秽内容","提供正常餐饮服务"],answer:["A","B","C"],explanation:"正常餐饮服务是允许的。"},{id:766,type:"multi",subject:"subject1",module:"文化市场法规",question:"演出市场监管的重点内容包括（  ）。",options:["演出内容审核","演出票务管理","演出安全管理","税收管理"],answer:["A","B","C"],explanation:"税收管理不是演出市场监管重点。"},{id:767,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出场所的安全责任包括（  ）。",options:["确保消防设施正常","保证疏散通道畅通","审批演出内容","制定安全应急预案"],answer:["A","B","D"],explanation:"演出内容审批是文化主管部门职责。"},{id:768,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化产品区别于普通商品的特点包括（  ）。",options:["具有意识形态属性","兼具经济效益和社会效益","完全不受监管","文化附加值高"],answer:["A","B","D"],explanation:"文化产品受到监管。"},{id:769,type:"multi",subject:"subject1",module:"文化市场法规",question:"网络表演经营活动管理要求包括（  ）。",options:["表演者实名制","内容审核制度","未成年人保护措施","不需要记录保存"],answer:["A","B","C"],explanation:"需要保存表演记录。"},{id:770,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出举办单位的安全义务包括（  ）。",options:["制定应急预案","配置安全设施","组织安全演练","购买公众责任险"],answer:["A","B","C","D"],explanation:"以上均为演出举办单位的安全义务。"},{id:771,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场信用管理体系建设的措施包括（  ）。",options:["建立信用档案","实施信用分级分类监管","建立联合惩戒机制","对违法者不予追究"],answer:["A","B","C"],explanation:"对违法行为必须追究。"},{id:772,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《互联网文化管理暂行规定》，互联网文化活动分为（  ）。",options:["经营性","非经营性","半经营性","临时性"],answer:["A","B"],explanation:"互联网文化活动分为经营性和非经营性两类。"},{id:773,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场行政执法的基本原则包括（  ）。",options:["合法行政","合理行政","程序正当","高效便民"],answer:["A","B","C","D"],explanation:"以上均为依法行政的基本原则。"},{id:774,type:"multi",subject:"subject1",module:"文化市场法规",question:"营业性演出广告的发布要求包括（  ）。",options:["内容真实合法","不得含有虚假信息","不得误导观众","需经工商审批"],answer:["A","B","C"],explanation:"演出广告不需要工商审批。"},{id:775,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出市场信用管理的措施包括（  ）。",options:["建立经营主体信用档案","实施信用等级评定","公布信用黑名单","取消所有演出活动"],answer:["A","B","C"],explanation:"信用管理不是取消所有演出活动。"},{id:776,type:"multi",subject:"subject1",module:"文化市场法规",question:"文化市场安全生产管理的'三同时'原则是指（  ）。",options:["同时设计","同时施工","同时投入生产和使用","同时拆除"],answer:["A","B","C"],explanation:"'三同时'指安全设施与主体工程同时设计、施工和投入使用。"},{id:777,type:"multi",subject:"subject1",module:"文化市场法规",question:"互联网文化产品进口需要经过的审查程序包括（  ）。",options:["内容审查","文化部审批","海关监管","无需任何审查"],answer:["A","B","C"],explanation:"进口文化产品需要经过审查。"},{id:778,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出举办单位变更演出时间、地点的，应当在演出日期前（  ）日报原发证机关。",options:["3","5","10","15"],answer:"C",explanation:"变更演出时间地点应提前10日报批。"},{id:779,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《合同法》，因不可抗力不能履行合同的，当事人可以（  ）。",options:["必须继续履行","全部免除责任","根据不可抗力影响部分或全部免除责任","承担全部违约责任"],answer:"C",explanation:"因不可抗力可部分或全部免除责任。"},{id:780,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《著作权法》，广播电台、电视台播放他人已发表的作品，（  ）支付报酬。",options:["不需要","应当","可以不","由观众支付"],answer:"B",explanation:"播放他人已发表作品应当支付报酬。"},{id:781,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《消防法》，公众聚集场所在投入使用前应当向（  ）申请消防安全检查。",options:["文化部门","公安机关消防机构","工商部门","建设部门"],answer:"B",explanation:"应向公安机关消防机构申请。"},{id:782,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，营业性演出活动不得为未经批准的营业性演出活动（  ）。",options:["提供场地","发放传单","做广告","以上都是"],answer:"A",explanation:"不得为未经批准的演出活动提供场地。"},{id:783,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《大型群众性活动安全管理条例》，承办者发现安全风险时应（  ）。",options:["隐瞒不报","立即报告公安机关","继续活动","自己处理"],answer:"B",explanation:"发现安全风险应立即报告公安机关。"},{id:784,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《著作权法》，著作权的集体管理组织由（  ）设立。",options:["文化部","国务院著作权管理部门","工商部门","民政部门"],answer:"B",explanation:"由国务院著作权管理部门许可设立。"},{id:785,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《民法典》，演出经纪合同属于（  ）合同。",options:["买卖","中介","运输","承揽"],answer:"B",explanation:"《民法典》中演出经纪合同属于中介合同。"},{id:786,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出经纪机构设立的条件不包括（  ）。",options:["有3名以上持证演出经纪人员","有固定的办公场所","有100万以上注册资本","有与业务相适应的资金"],answer:"C",explanation:"设立演出经纪机构不要求100万以上注册资本。"},{id:787,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，举办演出需要提交的文件中，安全保卫工作方案和灭火、应急疏散预案由（  ）提供。",options:["演出举办单位","演出场所经营单位","公安部门","消防部门"],answer:"B",explanation:"由演出场所经营单位提供安全保卫和应急预案。"},{id:788,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《著作权法》，著作权集体管理组织与使用者签订的许可使用合同，应当报（  ）备案。",options:["文化部","国务院著作权管理部门","工商部门","法院"],answer:"B",explanation:"应报国务院著作权管理部门备案。"},{id:789,type:"single",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演员签约的经纪合同期限一般不超过（  ）年。",options:["3","5","8","10"],answer:"D",explanation:"经纪合同期限一般不超过10年。"},{id:790,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，需要到文化主管部门备案的情形包括（  ）。",options:["个体演出经纪人备案","个体演员备案","演出场所经营单位备案","文艺表演团体备案"],answer:["A","B","C","D"],explanation:"以上均需备案。"},{id:791,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《合同法》，合同可以终止的情形包括（  ）。",options:["债务已经履行","合同被解除","债务相互抵销","债权人免除债务"],answer:["A","B","C","D"],explanation:"以上均为合同终止的法定情形。"},{id:792,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《著作权法》，邻接权的主体包括（  ）。",options:["表演者","录音制品制作者","广播电台、电视台","出版者"],answer:["A","B","C","D"],explanation:"以上均为邻接权主体。"},{id:793,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《大型群众性活动安全管理条例》，安全许可申请应当提交的材料包括（  ）。",options:["承办者合法成立的证明","安全责任人的身份证明","活动方案和说明","安全工作方案"],answer:["A","B","C","D"],explanation:"以上均为需提交的材料。"},{id:794,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，演出经纪机构不得有下列行为（  ）。",options:["超范围经营","伪造变造许可证","出租出借许可证","依法开展经纪活动"],answer:["A","B","C"],explanation:"依法开展经纪活动是合法的。"},{id:795,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《著作权法》，合理使用他人作品的情形包括（  ）。",options:["个人学习研究使用","为介绍评论适当引用","免费表演已发表作品","出版发行他人作品"],answer:["A","B","C"],explanation:"出版发行需要经著作权人许可。"},{id:796,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《消防法》，演出场所应当履行的消防安全职责包括（  ）。",options:["制定消防安全制度","组织防火检查","配置消防器材","不需要消防培训"],answer:["A","B","C"],explanation:"演出场所需要进行消防培训。"},{id:797,type:"multi",subject:"subject1",module:"文化市场法规",question:"根据《营业性演出管理条例》，擅自举办营业性演出的处罚包括（  ）。",options:["责令停止演出","没收违法所得","罚款","追究刑事责任（情节严重）"],answer:["A","B","C","D"],explanation:"情节严重的可能追究刑事责任。"},{id:798,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出活动的安全责任主体是（  ）。",options:["演出场所","演出举办单位","观众","经纪人"],answer:"B",explanation:"演出举办单位是安全责任主体。"},{id:799,type:"single",subject:"subject1",module:"历年真题",question:"文化市场的双重属性是指（  ）。",options:["商品属性和意识形态属性","经济属性和政治属性","文化属性和社会属性","法律属性和道德属性"],answer:"A",explanation:"双重属性指商品属性和意识形态属性。"},{id:800,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，申请举办演出需要提交安全保卫方案和（  ）。",options:["财务报表","灭火和应急疏散预案","演员简历","场地装修方案"],answer:"B",explanation:"需要提交灭火和应急疏散预案。"},{id:801,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，以下关于著作权的表述正确的是（  ）。",options:["著作权需要登记才能取得","著作权自作品创作完成之日起自动取得","外国人的作品不受保护","著作权保护期为永久"],answer:"B",explanation:"著作权自动取得，无需登记。"},{id:802,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出不得（  ）。",options:["正常演出","假唱假演奏","即兴发挥","观众互动"],answer:"B",explanation:"假唱假演奏被明令禁止。"},{id:803,type:"single",subject:"subject1",module:"历年真题",question:"根据《反不正当竞争法》，下列属于不正当竞争行为的是（  ）。",options:["正常降价促销","虚假宣传","改进产品质量","提高服务水平"],answer:"B",explanation:"虚假宣传属于不正当竞争。"},{id:804,type:"single",subject:"subject1",module:"历年真题",question:"根据《民法典》，不满（  ）周岁的未成年人为无民事行为能力人。",options:["6","8","10","18"],answer:"B",explanation:"不满8周岁的未成年人为无民事行为能力人。"},{id:805,type:"single",subject:"subject1",module:"历年真题",question:"演出经纪机构设立需要取得（  ）。",options:["营业执照即可","营业性演出许可证","不需要任何许可","仅网上备案"],answer:"B",explanation:"需要取得营业性演出许可证。"},{id:806,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，文艺表演团体申请演出需要提交的材料不包括（  ）。",options:["演出申请书","安全保卫方案","演员的个人日记","与演出相关的证明文件"],answer:"C",explanation:"演员个人日记不是必须提交的材料。"},{id:807,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，改编他人作品应取得（  ）同意。",options:["不需要","原著作权人","仅经纪人","仅出版社"],answer:"B",explanation:"改编作品应取得原著作权人许可。"},{id:808,type:"single",subject:"subject1",module:"历年真题",question:"社会主义核心价值观在社会层面的价值取向是自由、平等、公正和（  ）。",options:["富强","民主","法治","文明"],answer:"C",explanation:"社会层面价值取向是自由、平等、公正、法治。"},{id:809,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪人员的资格证书每（  ）年换发一次。",options:["2","3","5","10"],answer:"C",explanation:"演出经纪人员资格证书每5年换发一次。"},{id:810,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，下列关于保护期的表述正确的是（  ）。",options:["署名权保护期为50年","表演者权保护期为50年","复制权保护期为永久","发表权保护期为永久"],answer:"B",explanation:"表演者权保护期为50年。"},{id:811,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，临时搭建舞台看台的，应经（  ）批准。",options:["仅文化部门","仅公安部门","文化和公安部门","不需要批准"],answer:"C",explanation:"临时搭建应经文化和公安部门批准。"},{id:812,type:"single",subject:"subject1",module:"历年真题",question:"根据《民法典》，法人作品著作权的保护期为（  ）年。",options:["30","50","70","100"],answer:"B",explanation:"法人作品保护期为50年。"},{id:813,type:"judge",subject:"subject1",module:"历年真题",question:"演出场所的消防设施应当定期检查。",answer:"correct",options:["正确","错误"],explanation:"消防设施需要定期检查维护。"},{id:814,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，募捐义演收入可以全部归举办单位所有。",answer:"wrong",options:["正确","错误"],explanation:"募捐义演收入除成本外应捐赠公益事业。"},{id:815,type:"judge",subject:"subject1",module:"历年真题",question:"文化市场综合执法不受任何法律约束。",answer:"wrong",options:["正确","错误"],explanation:"执法必须依法进行。"},{id:816,type:"judge",subject:"subject1",module:"历年真题",question:"根据《民法典》，自然人从出生时起到死亡时止具有民事权利能力。",answer:"correct",options:["正确","错误"],explanation:"这是《民法典》的基本规定。"},{id:817,type:"judge",subject:"subject1",module:"历年真题",question:"演出经纪活动中的回扣与佣金性质相同。",answer:"wrong",options:["正确","错误"],explanation:"回扣和佣金性质完全不同。"},{id:818,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，申请举办营业性演出应提交的材料有（  ）。",options:["演出申请书","安全保卫方案","灭火应急疏散预案","与演出有关的证明文件"],answer:["A","B","C","D"],explanation:"以上均为申请应提交的材料。"},{id:819,type:"multi",subject:"subject1",module:"历年真题",question:"根据《著作权法》，下列属于著作财产权的是（  ）。",options:["复制权","发行权","信息网络传播权","署名权"],answer:["A","B","C"],explanation:"署名权属于著作人身权。"},{id:820,type:"multi",subject:"subject1",module:"历年真题",question:"根据《反不正当竞争法》，不正当竞争行为的种类包括（  ）。",options:["虚假宣传","商业贿赂","侵犯商业秘密","正当竞争"],answer:["A","B","C"],explanation:"正当竞争不是不正当竞争。"},{id:821,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出场所经营单位的安全保障义务包括（  ）。",options:["确保安全设施正常运行","保证疏散通道畅通","制定应急预案","审批演出内容"],answer:["A","B","C"],explanation:"审批演出内容不是场所的义务。"},{id:822,type:"multi",subject:"subject1",module:"历年真题",question:"根据《合同法》，合同有效的要件包括（  ）。",options:["当事人具有相应民事行为能力","意思表示真实","不违反法律","不违背公序良俗"],answer:["A","B","C","D"],explanation:"以上均为合同有效要件。"},{id:823,type:"multi",subject:"subject1",module:"历年真题",question:"根据《消防法》，消防安全重点单位应履行（  ）。",options:["制定消防安全制度","组织防火检查","组织消防演练","配置消防器材"],answer:["A","B","C","D"],explanation:"以上均为消防安全重点单位应履行的职责。"},{id:824,type:"multi",subject:"subject1",module:"历年真题",question:"文化市场的监管手段包括（  ）。",options:["行政许可","行政处罚","行政强制","行政指导"],answer:["A","B","C","D"],explanation:"以上均为文化市场监管手段。"},{id:825,type:"multi",subject:"subject1",module:"历年真题",question:"根据《民法典》，下列属于民事法律行为的有（  ）。",options:["签订演出经纪合同","购买演出门票","参加演出活动","公安机关执法"],answer:["A","B","C"],explanation:"公安机关执法是行政行为。"},{id:826,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出场所经营单位发现安全隐患时应（  ）。",options:["继续演出","立即整改","忽略不报","自行处理"],answer:"B",explanation:"发现隐患应立即整改。"},{id:827,type:"single",subject:"subject1",module:"历年真题",question:"根据《合同法》，演出经纪合同中双方的权利义务应当（  ）。",options:["完全不对称","对等","完全由经纪方决定","完全由委托方决定"],answer:"B",explanation:"合同双方权利义务应当对等。"},{id:828,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，表演者对其表演享有的权利不包括（  ）。",options:["表明表演者身份","许可他人现场直播","修改作品内容","许可他人录音录像"],answer:"C",explanation:"修改作品内容属于著作权人权利。"},{id:829,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，募捐义演应当取得（  ）的批准。",options:["民政部门","文化主管部门","工商部门","不需要批准"],answer:"B",explanation:"募捐义演应取得文化主管部门批准。"},{id:830,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪合同中应约定的核心条款是（  ）。",options:["纸张规格","佣金条款","字体颜色","打印份数"],answer:"B",explanation:"佣金条款是核心条款。"},{id:831,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，外国演员来华演出，其入境手续应经（  ）批准。",options:["工商部门","文化主管部门和公安部门","仅文化部门","不需要批准"],answer:"B",explanation:"外国演员来华需经文化和公安部门批准。"},{id:832,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪机构应当在取得许可证之日起（  ）日内到工商部门登记。",options:["10","20","30","60"],answer:"C",explanation:"应在30日内到工商部门登记。"},{id:833,type:"single",subject:"subject1",module:"历年真题",question:"根据《大型群众性活动安全管理条例》，安全责任人的确定方式是（  ）。",options:["公安机关指定","承办者自行确定并报备","不需要确定","由观众推选"],answer:"B",explanation:"由承办者确定安全责任人。"},{id:834,type:"single",subject:"subject1",module:"历年真题",question:"根据《著作权法》，摄影作品著作权的保护期为（  ）年。",options:["30","50","70","永久"],answer:"B",explanation:"摄影作品保护期为50年。"},{id:835,type:"single",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出广告的审核主体是（  ）。",options:["工商部门","文化主管部门","公安部门","广告发布者自行审核"],answer:"D",explanation:"广告发布者应对广告内容自行审核。"},{id:836,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪机构可以代理其他经纪机构的业务。",answer:"wrong",options:["正确","错误"],explanation:"经纪机构不得超范围经营。"},{id:837,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，营业性演出可以赠票。",answer:"correct",options:["正确","错误"],explanation:"赠票本身不违法，但不得以赠票形式变相售票。"},{id:838,type:"judge",subject:"subject1",module:"历年真题",question:"根据《著作权法》，表演者权的保护期为表演者终生。",answer:"wrong",options:["正确","错误"],explanation:"表演者权保护期为50年，不是表演者终生。"},{id:839,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出场所经营单位应当制定观众安全事故应急预案。",answer:"correct",options:["正确","错误"],explanation:"这是演出场所的法定义务。"},{id:840,type:"judge",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪人员不得同时在两个以上经纪机构执业。",answer:"correct",options:["正确","错误"],explanation:"经纪人员不得兼职。"},{id:841,type:"judge",subject:"subject1",module:"历年真题",question:"文化市场综合执法可以代替公安机关的刑事侦查。",answer:"wrong",options:["正确","错误"],explanation:"综合执法不能代替刑事侦查。"},{id:842,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出经纪机构可以从事的业务包括（  ）。",options:["演出居间","演出行纪","演出代理","直接演出表演"],answer:["A","B","C"],explanation:"经纪机构不直接从事演出表演。"},{id:843,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，演出举办单位的法律责任包括（  ）。",options:["承担演出安全责任","承担演出内容责任","为演出场所投保公众责任险","为观众购买保险"],answer:["A","B","C"],explanation:"演出举办单位不需要为观众购买保险。"},{id:844,type:"multi",subject:"subject1",module:"历年真题",question:"根据《营业性演出管理条例》，变更演出项目需要重新审批的情形有（  ）。",options:["变更主要演员","变更演出节目内容","变更演出时间地点","增加演出场次"],answer:["A","B","C"],explanation:"增加演出场次不需要重新审批。"},{id:845,type:"multi",subject:"subject1",module:"历年真题",question:"根据《著作权法》，不受著作权法保护的对象包括（  ）。",options:["法律法规","时事新闻","历法、通用数表","原创文学作品"],answer:["A","B","C"],explanation:"原创文学作品受著作权法保护。"},{id:846,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪人最重要的职业素养是（  ）。",options:["外貌形象","法律意识和职业道德","编程能力","财务能力"],answer:"B",explanation:"法律意识和职业道德是最重要的素养。"},{id:847,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪合同中，双方的权利义务应遵循（  ）原则。",options:["单方决定","等价有偿","不对等","由经纪方单方面决定"],answer:"B",explanation:"应遵循等价有偿原则。"},{id:848,type:"single",subject:"subject2",module:"历年真题",question:"舞台灯光中，用于照亮特定演员跟随移动的灯具是（  ）。",options:["染色灯","追光灯","成像灯","PAR灯"],answer:"B",explanation:"追光灯用于追踪特定演员。"},{id:849,type:"single",subject:"subject2",module:"历年真题",question:"演出项目的目标市场定位应首先分析（  ）。",options:["经纪人个人喜好","观众需求和市场特点","场地装修风格","演员个人要求"],answer:"B",explanation:"市场定位应基于观众需求。"},{id:850,type:"single",subject:"subject2",module:"历年真题",question:"演出场所声学设计中，'混响时间'是指（  ）。",options:["声音传播速度","声源停止后声音衰减60dB所需时间","音乐播放时长","观众入场时间"],answer:"B",explanation:"混响时间是声学设计的核心参数。"},{id:851,type:"single",subject:"subject2",module:"历年真题",question:"下列属于曲艺艺术的是（  ）。",options:["话剧","相声","芭蕾舞","交响乐"],answer:"B",explanation:"相声属于曲艺艺术门类。"},{id:852,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪人代表委托方签订演出合同时，应当注意审查合同对方的（  ）。",options:["外貌形象","主体资格和履约能力","性别年龄","籍贯住址"],answer:"B",explanation:"应审查对方主体资格和履约能力。"},{id:853,type:"single",subject:"subject2",module:"历年真题",question:"根据演出市场规律，演出票价的制定应考虑的因素不包括（  ）。",options:["演出成本","市场需求","竞争对手价格","经纪人个人收入目标"],answer:"D",explanation:"定价应基于市场和成本，不是经纪人个人目标。"},{id:854,type:"single",subject:"subject2",module:"历年真题",question:"下列属于舞台美术（舞美）范畴的是（  ）。",options:["剧本创作","布景和灯光设计","音乐创作","导演排练"],answer:"B",explanation:"布景和灯光属于舞美范畴。"},{id:855,type:"single",subject:"subject2",module:"历年真题",question:"演出安全管理中，'预防为主'的含义是（  ）。",options:["出了事故再处理","提前制定预案和预防措施","不制定预案","等事故发生再应对"],answer:"B",explanation:"预防为主强调提前预防。"},{id:856,type:"single",subject:"subject2",module:"历年真题",question:"演出经纪人开展经纪活动的基本前提是（  ）。",options:["具备演出经纪人员资格证书","个人形象好","有大量资金","有知名演员资源"],answer:"A",explanation:"取得资格证书是开展经纪活动的基本前提。"},{id:857,type:"single",subject:"subject2",module:"历年真题",question:"下列属于音乐体裁的是（  ）。",options:["交响曲","素描","话剧","雕塑"],answer:"A",explanation:"交响曲是音乐体裁。"},{id:858,type:"single",subject:"subject2",module:"历年真题",question:"演出项目的成本构成中，比例最大的是（  ）。",options:["经纪人佣金","艺人出场费","宣传推广费","场地租赁费"],answer:"B",explanation:"艺人出场费通常占比最大。"},{id:859,type:"single",subject:"subject2",module:"历年真题",question:"京剧'生旦净丑'中，'旦'是指（  ）。",options:["男性角色","女性角色","花脸角色","滑稽角色"],answer:"B",explanation:"'旦'是京剧中的女性角色行当。"},{id:860,type:"single",subject:"subject2",module:"历年真题",question:"演出场馆的安全疏散能力应根据（  ）确定。",options:["场馆外观","观众容量","舞台灯光数量","票务收入"],answer:"B",explanation:"疏散能力应与观众容量匹配。"},{id:861,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪合同中的违约条款对双方都适用。",answer:"correct",options:["正确","错误"],explanation:"违约条款应平等适用于合同双方。"},{id:862,type:"judge",subject:"subject2",module:"历年真题",question:"舞台监督只需要在演出当天到场即可。",answer:"wrong",options:["正确","错误"],explanation:"舞台监督需要参与演出全程的筹备和执行。"},{id:863,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪人可以代收委托方的演出收入后随意支配。",answer:"wrong",options:["正确","错误"],explanation:"经纪人不得截留或挪用委托方收入。"},{id:864,type:"judge",subject:"subject2",module:"历年真题",question:"演出场馆的安全出口在演出期间必须保持畅通。",answer:"correct",options:["正确","错误"],explanation:"安全出口任何时候都必须保持畅通。"},{id:865,type:"judge",subject:"subject2",module:"历年真题",question:"演出票务实行实名制是为了防止黄牛炒票。",answer:"correct",options:["正确","错误"],explanation:"实名制购票是打击黄牛的重要手段。"},{id:866,type:"judge",subject:"subject2",module:"历年真题",question:"演出经纪合同可以约定排他性代理条款。",answer:"correct",options:["正确","错误"],explanation:"合同可以约定独家代理。"},{id:867,type:"multi",subject:"subject2",module:"历年真题",question:"演出经纪合同的主要内容包括（  ）。",options:["服务范围和期限","佣金标准和支付方式","双方权利义务","违约责任和争议解决方式"],answer:["A","B","C","D"],explanation:"以上均为合同主要内容。"},{id:868,type:"multi",subject:"subject2",module:"历年真题",question:"舞台工程的技术专业包括（  ）。",options:["灯光","音响","布景","导演编排"],answer:["A","B","C"],explanation:"导演编排不属于舞台工程技术。"},{id:869,type:"multi",subject:"subject2",module:"历年真题",question:"演出经纪人的基本能力要求包括（  ）。",options:["沟通协调能力","市场分析能力","法律知识","舞台表演能力"],answer:["A","B","C"],explanation:"舞台表演不是经纪人必备能力。"},{id:870,type:"multi",subject:"subject2",module:"历年真题",question:"演出项目巡演需要考虑的因素包括（  ）。",options:["市场需求差异","交通运输安排","场馆条件","经纪人个人行程"],answer:["A","B","C"],explanation:"经纪人个人行程不是巡演需要考虑的主要因素。"},{id:871,type:"multi",subject:"subject2",module:"历年真题",question:"演出安全管理的措施包括（  ）。",options:["制定应急预案","配置安全设施","组织安全演练","忽略安全隐患"],answer:["A","B","C"],explanation:"不应忽略安全隐患。"},{id:872,type:"multi",subject:"subject2",module:"历年真题",question:"中国戏曲的基本表演手段包括（  ）。",options:["唱","念","做","打"],answer:["A","B","C","D"],explanation:"唱念做打是戏曲四大基本功。"},{id:873,type:"multi",subject:"subject2",module:"历年真题",question:"演出经纪业务的风险控制措施包括（  ）。",options:["购买保险","制定应急预案","严格合同管理","不签订合同"],answer:["A","B","C"],explanation:"不签合同不是风险控制措施。"},{id:874,type:"multi",subject:"subject2",module:"历年真题",question:"舞蹈的基本类
